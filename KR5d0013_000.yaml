front:
  text: 古文龍虎經注疏奏劄映一臣真一伏見保義郎王道所撰古文龍虎經注疏三卷事顯而言直理明而義詳深得參同契金碧經之密意其說外丹皆不以五金八石諸雜類為藥材止取天地之精日月之華混合造化以成神丹此與陰真人無質生質是還丹凡鉛凡汞不勞弄之語正同臣山林老褐雖道學膚淺無可採取然於道書講之舊矣古語有云三折肱為良醫臣與王道相識甚久議論亦詳因其以所撰來就臣印
  hash: sha256:7fb92b2029665a9a99af8c3f658aa3a567d33616140101f23e1a52cbf626f387
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0013_HFL_000-001a, image: hfl/0620/0620-004.png}
body:
  text: 證與臣得之於師者首尾符契是用昧死繕寫上進恭望宴間略垂省覽自今而後願飾尚藥如金石雜類反惡之劑不使上御以保萬壽實天下幸甚臣以此區區愚忠仰報聖恩伏惟幸聽干冒天威臣下情震懼之至注疏序臣道曰道家之學有所謂內外丹者實性命之所繫得之者小則駐景延年大則登仙入妙其徒以書傳無慮千萬卷內丹則莫不以神氣為本外丹則莫不以鉛汞為宗故古歌云紅鉛黑汞大丹頭相符紅黑是真修紅鉛取精黑取髓解得紅黑藥無比將紅入黑保長生用黑入紅天仙已顚倒兩般總成還火龍變化為天仙此外丹之要㫖也古今學道之士皆以鉛汞為大藥曾不知真鉛真汞果是何物臣自志學之年則喜聞其事裒集丹書研詠義味夜以繼日至忘寢食惟是紙上之語曾無發明紹興壬申有道人為臣言鉛汞者但以山石間所採礦銀為真鉛朱砂中所抽水銀為真汞教臣停取一斤許以鼎器火候煉之臣以為信然遂以會稽天慶觀治丹室依其所指試為之費歲月耗資財竟無成效非臣心之不誠實方之不良也閲乾道甲申復有道人為臣言真鉛不露體真汞不呈形又言真鉛不見銀真砂不見汞以二物和合為一分九鼎火而取之名曰黃芽依法煉之變為黃輿紫粉亦號明窗塵服之聚精斂神却除萬病以臣觀之此蓋青霞子昔所造一中丹耳至淳熙癸巳乃遇真師始悟前所得者皆非真鉛真汞也古歌云真鉛內産五金內生在杳冥天地先又云聖人奪得造化意手摶日月安爐裹微微騰倒天地精攢簇陰陽走神鬼日魂月魄若箇識識者便是神仙子煉之餌之千日餘身已無陰那得死真師以其祕方口訣授臣言下有悟如夢之覺後讀諸家之書無不相契洞然明白由是而知日魂月魄為真鉛真汞從無質以生有質萬物動靜莫不由之若安爐立鼎製造神室摶日月運水火不失天符之㫖則大藥神丹可得矣臣三十年間凡三遇人後得真師始契妙道臣以一介武辨隸職王府家貧俸薄未能結真友採丹材鑄鼎器造神室屏跡山林以從事於斯也然專心致志晨夕以之須因暇日閲古文龍虎經以行世之本謬誤為多遂用得之於真師者釐而正之分章定句為注解復以魏伯陽參同契證其義申而為疏以辨藥地之真僞金石之異同去繁撮要始終相貫集為一編三卷上卷十三章中卷六章下卷十四章總三十三章非敢傳之于後世始示同志之丹友耳臣踈遠之人不識忌諱冒昧萬死謹因高士周真一印證繕寫上進伏惟萬機之暇留神觀省使臣有萬世一遇之幸成就素志是不獨臣之私願亦真師之付囑云淳熙十二年四月初一日保義郎臣王道誠惶誠恐稽首頓首百拜謹叙
