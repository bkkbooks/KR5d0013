front:
  text: 古文龍虎經注疏卷下映三
  hash: sha256:f73221ae95b961c3b539ea5ed4d136398674f2007cf8d9c0f6397ee33be8e463
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0013_HFL_003-001a, image: hfl/0620/0620-094.png}
body:
  text: 宋保義郎差充皇弟少傅恩平郡王府指揮使臣王道注疏太乙宫養素齋道士臣周真一即證神室先施行章第二十神室先施行金丹然後成可不堅乎煉化之器包褁飛凝開闔靈户希夷之府造化泉窟注曰神室先施行金丹然後成者既立神室而得其法則金液有必成之理也可不堅乎煉化之器包褁飛凝者煉丹之士必先須堅備鼎器使其中靈汞結凝不得飛走方可成丹也開闔靈户希夷之府造化泉窟者神室有上下之釜開則為二闔則為一其中空虛水火才交神物便生故號希夷白金為母而生水銀號曰金液此丹之府庫窟宅也疏曰北方之水生成白金謂之真鉛乃至陰之精包合陽和隨混沌分判之氣各歸一元古之至人法象天地生成之道還陽和之氣於真鉛之中合自然之用製所成藥此真元之氣也非世間凡物可為若修煉得法製度有理則何患不成大丹乎龍虎二物俱生鉛中用水火升降故使金木交希夷之府日月會造化之窟白金為母包褁衆靈而産至寶矣陽氣發坤章第二十一陽氣發坤日晷南極五生連珠日月合璧金砂依分呼吸相應注曰陽氣發坤日晷南極者亥月之末純坤卦終至乎月之初夜半子時坤卦下生一陽爻為復卦乃陽火初生之時也至丑歷寅以至於巳陽氣至南方極盛則陰生於五月也五星連珠日月合璧者五星運行周天有若連珠遲疾留伏逆順進退也日月躔度一月一爻其合如璧與五星共為表裏以證金火一歲之用也金砂依分呼吸相應者金砂乃日月之精也水火升降一消一息則金砂在鼎中一浮一沉隨象呼吸與外來符火相應也疏曰真鉛母也坤也太陰之體常黑遇陽火而方生形質形質既生而歷六十四卦逐三百八十四爻變化萬狀皆隨日月五行星度之數也若以金銀雜類為丹則安得隨陰陽四時而生乎華蓋上臨章第二十二華蓋上臨三台下輔統録之司當密其固詰責能否注曰華蓋上臨三台下輔統録之司當密其因詰責能否者華蓋十六星其形如蓋在紫微宫中以蔭帝座三台六星在紫微宫外主調順陰陽燮理萬物喻水火居金鼎上下若燮調得理則神精降內三台為統録之司百寮之帥宰相之位文盈文昌也或五星應縮失次日月進退失節則四敘不應風雨不時是致萬物不生亦猶煉丹之士運火失節使鼎內或乾或溢變異不常必敗丹事若總諸節候如運諸掌固密鼎器不使有虞若一不理則詰責運符之能否也參同契曰文昌總録詰責台輔百官有司各典所部是也疏曰世之學道者多矣然得妙理者萬無一二或假其名以資姦利或燒變黃白勾合庚艮者有之或妄指古文修煉五金八石以僥幸大藥費歲月耗精神終無成效愚者益其過智者損其行耽執至死曾不悔悟迷迷相傳無有休止至有失其職業散其資財棄父母之養割妻孥之愛漂流凍餒世世有之殊不知金丹大藥非凡鉛凡汞所作乃天地之精神日月之魂魄患不造其閫域耳火鍊中宫土章第二十三火鍊中宫土金入北方水水土金三物變化六十日自然之要先存後亡或火數多分兩違則或水銀不定同處别居剛柔抗衡不相涉入非火之咎譴責於土注曰火鍊中宫土金入北方水者火日也金月也金火二性順五行六律之氣而生故火生土金生水各吐其精而為神藥也參同契曰日合五行精月受六律紀是也水火金三物變化六十日者中宫只有金母一味而水土二位得火候而和合若一月火候金液不依母數則再須一月起火也參同契曰五六三十度度竟復終始是也自然之要先存後亡者金液神丹全在火候火是藥之父母藥是火之子孫乃天地之氣自然而生也或火力停均而生金汞或火力失度返致散失存亡不定必在六十日之內以度其始終也參同契曰原始要終存亡之緒是也或火數多分兩違則者陽火數多神精返傷致使金汞嬌逸亢滿鼎中違失軌度也參同契曰或君嬌逸充滿違道是也或水銀不定同處别居者水銀乃金液也若火數差殊則水銀在鼎室之內隨火不定不依軌轍而行則或同或别以於不測也參同契曰或臣邪佞行不順軌是也剛柔抗衡不相涉入非火之咎譴責於土者金砂不依數生剛柔不相涉入非特火之過也亦是宫中金母不純而精氣少失必在此故不責火而責土也參同契曰或臣盈縮乖變悔吝執法刺譏詰過移主是也疏曰煉丹之士須明日月之行度知陰陽之升降曉火候之抽添辨藥物之真偽方有必成之理兹實在於運符之人若昧於此執法不定却言傳授不真證則師主不能自悟好學之士宜戒之焉土鎮中宫章第二十四土鎮中宫籠罩四方三光合度以致太平五臟內養四肢調和水涸火滅含曜內朗金水相榮閉塞流暉調和溫水發之俱化道近可求注曰土鎮中宫籠罩四方者土戊己也母也母居中宫召四方和氣歸於神室之內化成金液也參同契曰辰極喻金母蓋能優遊以懷來臣庶也故曰辰極受正優遊任下是也三光合度以致太平者三光則日月星也若三光進退不失於上則天下太平令行禁止國無亂逆之患也丹之內運亦有三光蓋陽火陰水與金胎是象日月星也故外運亦有三光分在動靜爻尅之內陰陽符火之中若運符得理則無逃逸之害如治國之致太平也參同契曰克明正德國無害道是也五臟內養四肢調和者若運行符火盡合同天度數則鼎室之內真人之身五臟四肢調和安順虛無恬淡以至於終故無夭傷之患也參同契曰內以養己安靜虛無是也水涸火滅合曜內朗者夫煉大丹火候巳時亥時則火滅至此二時金火水之精氣各得其情光耀遍於一室之中朗照真人之體也參同契曰原本隱明內照形軀是也金木相榮閉塞流輝者龍虎之氣相交金木之情契合金來尅木木被金制反能榮盛致使流輝鎖於鼎中靈根閉於室內皆自金母養育而成也金母變化不常此之微妙非口訣難得參同契曰閉塞其兊築固靈根是也調和溫水發之俱化道近可求者金母在鼎內吸三光之氣來日月星之精孳生聖胎其狀莫測而子株靈汞在神室之中隱伏難見若火不失其時水不失其候水火俱進升降有法隨順天機樞鈴法象則金汞自然而眷戀龍虎情性以交結擬象求之變化之理其道可見也參同契曰三光陸沉溫養子株視之不見近而易求是也疏曰天人之理可以類推若三光之精未見四象之氣未分玄黃混沌清濁未判真鉛之氣混沌其中既分清為天用濁為地陰陽之和以為人三才定位真鉛之氣居於中央當戊己之位又為神藥之母籠罩四方金木水火之氣而結為金液也五行之中金來尅木木中有火火返尅金金火相尅互相榮盛水來尅火火中有土土返尅水水土相配互為變化此相生相殺之理皆在口訣不以書傳若以天道求之則一味元和之氣耳水土獨相配章第二十五水土獨相配翡翠生景雲黃黑混元精紫華敷太陽水能生萬物聖人獨知之注曰水土獨相配翡翠生景雲者水則玄水土則金母也太陽之火與金母相交則神室之內木精化氣而生景雲漸結流珠潤澤丹宫以化金液也參同契曰黃中漸通理潤澤達肌膚者是也黃黑混元精紫華敷太陽者黃黑亦水土也水土之氣相制而生太陽元精若法象始終得其妙理也則太陽元精漸垂於有無之間以生鄞鄂也紫華敷腴黃液蕩漾是神藥未堅實也參同契曰初正則終循幹立未可恃是也水能生萬物聖人獨知之者水一數也玄天生水而居北方水中生金金復能生水聖人知之擬象而成神丹非凡愚可測也參同契曰一者以掩蔽俗人莫知之是也疏曰乾坤二體互相包褁天一生水曰玄水地五生土曰真土水土相交是生萬物聖人知此造化遂擬天地而立神室凖陰陽而行水火依約爻象中遷四時則元精出焉神汞生焉金德尚白鍊鉛章第二十六金德尚白鍊鉛以求黃色焉感化生中宫黃金銷不飛灼土煙雲起注曰金德尚白鍊鉛以求黃色焉者鍊鉛為白金白金為神室神室中有金水金水既為火所化而色變黃名曰黃輿參同契曰下有太陽氣伏蒸須臾間先液而後凝號曰黃輿焉是也感化生中宫黃金銷不飛灼土煙雲起者金液將生隨水火凝於器中本從金生化而成液感結中宫則黃金之液自然不飛走矣火灼金華渾氣清徹或為輕煙薄霧在鼎室之內變化無常或鍾乳倒懸或大牙參錯或變化日月之象而魂魄皆現或化龍虎之形而金木相交神精萬狀不可名言若以五金八石諸雜物作之者安能臻此神化哉疏曰世間萬物不能壞者唯黃金耳自開闢以來惟金體不虧損故黃金之母曰真鉛真鉛者先天之一物混沌未判鉛氣在其中及天地分形鉛體亦現天地萬物若無鉛氣則不能成妙用故真鉛之氣靡所不在也且黑金生白金白金生黃金黃金為至藥若人服之則壽齊天地與道同體故金德之精為衆靈之主萬物之宗也有無互相制章第二十七有無互相制上有青龍居兩無宗一有靈化妙難窺注曰有無互相制上有青龍居者有者白金也無者火氣也故有無之作互相制伏金火相交而生靈汞於中宫汞即青龍也參同契曰上閉即稱有下閉即稱無無上以奉上上有神德居是也兩無宗一有靈化妙難窺者兩無者陰陽氣也日月之魂魄也一有者亦神胎也神胎之中無諸雜物但空體氣已因水火之氣引日月之精全陰陽之粹入於神胎金液靈化莫能窺測神室上下水火之氣因金母翕育相須而生參同契曰此兩孔竅法金氣以相須是也疏曰金液名黃輿者乃九轉之名也古之人服丹藥先齋戒清靜於內然後方服外丹庶得內外兼濟真氣薰蒸遍於四肢易以返老還童為純陽之身與天齊年也鍊銀於鉛章第二十八鍊銀於鉛神物自生銀者金精鉛包北靈水者道樞陰陽之始故懷銀精鉛化黃丹寄位五金為鉛外黑色稟北方內懷銀精被褐懷玉外似狂夫注曰鍊銀於鉛神物自生者白金未現其形隱於北方玄水之中若知白金在黑鉛之內取之為大藥之基運動法象則神物自然生矣參同契曰知白守黑神明自來是也銀有金精鉛包北靈者金精乃白金也玄水之基乃真鉛也常包北方真水銀也參同契曰白者金精黑者水基是也水者道樞陰陽之始故懷銀精者白金自水而産用為神器水體不絶金水兩情為之樞紐陰陽之本故為銀精銀精則藥也參同契曰水者道樞其數名一陰陽之始是也鉛化黃丹寄位五金者鉛亦名玄位居坎方水火金木之氣隱於鉛內為五金八石之主流珠遇之而為根本皆水火之氣結成也參同契曰玄含黃芽五金之主北方河車是也為鉛外黑色稟北方內懷銀精者鉛外貌黑惡而內有金華常居北方壬癸之位也參同契曰故鉛外黑內懷金華是也被褐懷玉外似狂夫是此意也疏曰大鼎者藥也藥者鼎也藥鼎一也金液之道若以非類而成則世人服之者升仙多矣故參同契曰挺除武都八石棄損則知大丹不用五金八石曾青雌雄之類斷可見矣或謂金丹自赤而變紫色者不過曾青雌雄之氣染入而已且夫自然元氣發生草木枝葉花果顔色艷異豈是曾青雌雄所染哉故古詩云花發保奇異緑葉問紅苞誰人將此染爭知造化燒枝莖花葉所發乃自然變化而成者莫非水火土之氣也金丹之道亦然順天地生成之理合金木自然之方若以水火土歸於一家豈無變化乎五金八石硝礬銅粉等衆術之中用者有之至若金汞靈液則此等諸類無所施焉使修煉大丹之士知此玄奧之道與夫真鉛所産之地則金液無不成之理故劉知古真人云龍虎者金汞也金汞相包得自然之性服之者豈不神異哉銀為鉛母章第二十九銀為鉛母母隱鉛中鉛者銀子子藏銀胞真素渺邈似有似無灰池炎灼鉛沉銀浮潔白見寶可造黃輿注曰銀為鉛母母隱鉛中者銀者金也鉛者水也謂水生在金金為水母金返藏形於鉛水中也參同契曰金為水母母隱子胎是也鉛者銀子子藏銀胞者鉛者子也水也銀者母也金也金既生水而子水復居鉛母之知故曰黑鉛也參同契曰水者金子子藏母胞是也謂黑鉛變質之後寄位西方當隱迹於水中得水滋養愈見生成名曰黑鉛潔白成金而作神室因陽火激發而子水却於白金中流出名曰真水銀也大哉真物是為生天生地之一氣也真素渺邈似有似無者真素者真汞也在母胎中被外迫逐或有或無浮沉不定為鼎室所蔽不能視其形儀也參同契曰髣佛大淵乍沉乍浮是也潔白見寶可造黃輿者灰池煅煉以為白金取白金而為神室可以造黃輿也參同契曰採之類白造之則朱是也疏曰金液之要在乎神水華池華池即金母也金者西方白金也其金有液汞者是太易流珠二物雖各有象本同一原至人以金養汞變為丹砂是返本還元歸自然之性白金神母養成大丹丹成後津液不絶故言念液好道之士審而詳之不以山澤金銀和合水銀便為之養汞也殼為金精章第三十殼為金精水還黃液徑寸之質以混三才天地未分象若雞子注曰殼為金精水還黃液者真鉛煉為白金以白金為鼎器是金精之母其中有水銀可以變黃液也參同契曰煉為表衛白裏貞居是也徑寸之質以混三才者神室中空方圓寸餘上釜為天下釜為地中安靈汞以象三才參同契曰方圓徑寸混而相扶是也天地未分象若雞子者天地未開闢之前混沌若雞子之形日月之精交於其中萬象之形固已垂矣至人指神室象混沌以體三才之用進陽火陰符以留日月之精真鉛生天地之先採之有法造之有理非可妄為也參同契曰先天地生巍巍尊高是也疏曰白金既露狀若白馬牙又性好食木精本從北方水中因煅煉之後潔白如雪實為丹之寶也陶真人曰以寶煉寶志士得道葛稚川曰石液鬼隱金精山在審此亦是潔白見寶也既言潔白又言見寶則可以造金液神丹也今之人燒朱砂水銀縱得伏火終有本性雖使服之安有丹砂入五內霧散若風之效哉圓高中起章第三十一圓高中起狀似蓬壼關閉微密神運其中爐竈取象固蜜全堅委曲相制以使無虞自然之理神化無方注曰圓高中起狀似蓬壼者修大丹先須壇爐竈鼎上下相接如蓬壼之狀也參同契曰傍有垣闕狀似蓬壼是也關閉微密神運其中者鼎內周旋四通以來火氣關閉濟會不使走失也參同契曰環匝關閉四通踟蹰是也爐竈取象固密全堅者壇上有爐爐上有竈竈中有鼎鼎中有神室神室中有金水互相包褁以閼姦邪又使靈汞以易也參同契曰守御固密閼絶姦邪是也委曲相制以使無虞者金鼎懸於竈中虛其四向以疏火氣安水於金鼎之上運火於金鼎之下壇爐鼎竈遞相包褁以防非常也參同契曰曲閣相連以戒不虞是也自然之理神化無方者凡造大藥皆是日月星辰之精五行四象之氣而為金液非有他道也疏曰至人憫夫不知道者利欲汨沒以至於死不明身之所往性之所存此金液之要所以傳也且黃帝老子亦修此道為後來之師故服丹長生隱顯變化入火不焦入水不濡者此也軒轅之前御世之君皆兼此道以相禪授不獨遊方之外而進此道也後世澆薄不純其法頗祕得之者稀至周之時老君降世將度函谷始以金液之法獨傳關令尹真人因得流行於世有緣相值則遞相傳授不絶道種今世之人則不然以富貴驕其身名利役其性酒肉窒其氣色欲迷其情四樂之外惟畏死而已遂妄意延年盡禮於方術之士以求不死之藥有姦利之輩聞風競至偃蹇自如以為其師緘默不言以示祕奧偽之亂真未易識測其實以傍門小術依託為至道以金石草木借名為真藥曾無奇效使夫後來不信金液之法亦不足怪也磁石吸鐵章第三十二磁石吸鐵隔礙潛通何况雞子配合而生金土之德常與汞俱注曰磁石吸鐵隔礙潛通者磁石之力全者可引數片之鐵於器物之外此物類相感者也參同契曰幽玄遠渺隔礙相連是也何况雞子配合而生者以白金造神室而象雞子之形如天地之配合運動水火而靈汞自生參同契曰類如雞子黑白相扶是也且天地之中有太陽玄精變化萬狀注於萬物之上隨大順小莫不由之至人製而食之以駐景修仙也欲製之法唯白金一物力能制之方肯留戀同為變化也金土之德常與汞俱者金乾土坤也乾坤情動而生鉛汞二物相得始成金液亦不飛走參同契曰動靜休息常與俱是也疏曰古之真人玄奧之法在修金鼎但金鼎難造若能之者可以召萬化之氣和金液之精矣假令混沌之前形質未分天地之狀已若雞子取其根本立為至道故先天地首萬物道術之中唯此最先得之者獨立長世神形亦不壞也火記不虛作章第三十三火記不虛作鄭重解前文丹術既著不復重擬故演此訣以附火記焉注曰火記不虛作鄭重解前文者火記有六百篇次第連接運十月火候也每月三十日晝夜各一卦計有六十卦十月計六百卦也二八月亦有篇數緣卯月益水安金酉月行火止水與寅申月同故不在其數此古文龍虎經言火記上古之人口口相傳非虛作之文故鄭重而言之丹法云傳法不傳火者此也丹術既著不復重擬者火記作之於前故於此經不復言也故演此訣以附火記焉者此經只以古文而傳不著作者之姓氏蓋古之得道者恐火記沉匿後人不能修金液之道遂作此經以附之耳疏曰世之學道者不得金液之根元而執傍門曲徑迷悮一生有兀坐存想咽津納唾拍太淵一竅想臍下泓池或默聽靈響之音而分為鉛汞將心腎相交而名曰水火此皆初地之學也復有對境接氣行房中補養之術男女相交作人元大丹之法氣血將盛返至禍患棄腐形骸化成灰土此等數多皆為背道欲進却退欲速轉遲蒙昧至真乖違天理以此觀之深可憐憫此經以龍虎為首者龍者日也虎者月也日月是乾坤運動之祖發生萬物之本乾天金體其色青碧包含陽和五行四象三光二氣皆運其中古之人效天地之運動日月之纒離安爐立鼎攝二景之光召龍虎之氣而歸神室制而成藥號曰金丹故以龍虎為名也魏夫人云雲芽之靈者龍呤方泉景雲絡霄虎嘯虛無衝風四振陽燧昭明朱火鬱起方諸見陰玄液可得此皆自然而然也金丹變化之道其實皆一也若以五金八石及諸鉛礦并存想採取陰丹而望白日飛升不亦難乎且此經上中下三篇有鄙俚之談或字不正皆後人託名以竄其中今削去之以魏真人參同契相準分為三十三章使後來學者不失其次敘也雖然山林高逸朝市大隱可以深造其道者亦豈無望於參同即證哉古文龍虎經注卷下參同契大丹火候攢簇周天火候圖攢簇周天大數以合年月日時隨順陰陽抽添水火使龍精漸垂於鼎內金液流暢於胎中火候周天數金丹最要機年中隨月變日內遂時移四計如同處三神似有知火金真祕訣此外更何施參同契大丹火候金火相交生藥圖日火月金晦夜合交精氣相紐生成萬物一月數終又復如初開闢以來循環無端水火相交濟萌芽從此芳金華施畢昴玉兔現心房魄減從辛始魂藏入艮鄉道終歸五六復卦又重張古文龍虎經注疏後序真人彭曉作金錀匙云余始分擘參同契章義畢偶溫故經覽太白真人歌遂起意撰黑鉛水虎紅鉛火龍二篇其略曰夫黑鉛水虎者是天地發生之根乃有質而有氣也夫紅鉛火龍者是天地發生之本乃有氣而無質也撢賾兩論萬古不易之語也以道觀之有質者非五金八石硝霜漿露陰道一九之術也無質者非六欲七情灰心兀坐存想三一之法也是以古人言有質者真鉛也太陰月之精也為天地萬物育形之母無質者真汞也太陽日之光也為天地萬物發生之父鉛汞二體互相孳胤循環不絶可謂生天生地生萬物之宗祖也故我真人上士莫不留心注意採取太陰之精設其法象誘會太陽之氣歸於神室之中結為金液神丹太陰之精乃金華黃芽也太陽之氣乃流珠姹女也故經云太陽流珠常欲去人卒得金華轉而相因又云河上姹女靈而最神將欲制之黃芽為根流珠姹女其性不定易得飛走若不以鼎器方便呼召安肯等間住於雜物之上哉故造夫丹先制真鉛擬象天地而為神室上釜天為雄為乾為離為日為火為陽為木下釜象地為雌為坤為坎為月為水為陰為金兩釜相合象若雞子其中空虛縱廣寸餘以安靈汞又坤母金妻也乾父木夫也火龍既交於神室之下則金虎情合於中交合不已孳産無窮而木中生魂金中生魄魂魄凝然化而為氣漸生鄞鄂交結流珠名曰金液故古歌云束身斂魂充虎飢虎來食啖生髓脂髓脂即金液也又須尋靈山選福地造丹房建星壇安爐竈鑄鼎室結合真友總覽紀綱若頭頭具備方得從事於斯也故真一子作參同契後序云術士又須自徹聲色節嗜欲去名利投靈山絶常交結仙友隱密潛修晝夜不怠方可希望也或不如是則虛勞勤尓陰真人曰不得地莫妄為須隱密審護持保守莫失天地機此藥變化不思議又曰莫辭得失一志而修還丹可冀兹豈設虛言而惑後世哉道昨遇師旨頗歷歲月實緣官小家貧俸薄俗事紛冗食指稍衆荏苒至斯未能撥置然而志不墮而心愈堅者姑欲以待便風終成其事耳所有火候一十九圖並具于參同契下卷之末兹不復録也止將攢簇周天火候圖金火相交生藥圖二本附於此經之末以明龍虎之動靜證金木之玄功也道曾於乙巳歲三月十八日悮蒙今上皇帝宣見問以修生養性之事道謹用注疏龍虎經補注參同契義理進對躬承玉音訓以高義從容移時幸無疏虞乃宿生千載之慶繼於當年四月中旬託承受官御藥叨沐寵光以注疏龍虎經繕寫修進訖道踈遠寒微深不自揆僣為注疏罪不容逃賴聖主不即斥逐過蒙省覽道死且不朽矣所有補注參同契章句頗多注義稍廣不得同時投進加之俸薄乏力修寫瞻望宸極無緣上達顒顒之心但切馳仰後來頗有增損數字謹别抄録命工鋟木用傳同志或有見之者不妨縱轡以先進也或曰古文龍虎上經文奧理深不可輕議今公注疏文踈理淺恐未必然即答之曰道自童稚以來涉獵篇卷曾無懈怠于今五旬有六又遇明師口訣非不精研也若將妄語以惑後人昭昭上天豈敢欺哉
