  - {type: variant, offset: 6297, length: 1243, content: 古文龍虎經註卷下參同契大丹火候攢簇周天火候圖攢簇周天大數以合年月日時隨順陰陽抽添水火使龍精漸垂於鼎内金液流暢於胎中火候周天數金丹最要機年中隨月變日内遂時移四計如同處三神似有知火金眞祕訣此外更何施參同契大丹火候金火相交生藥圖日火月金晦夜合交精氣相紐生成萬物一月數終又復如初開闢以來循環無端水火相交濟萌芽從此芳金華施畢昴玉兔現心房魄减從辛始魂藏入艮郷道終歸五六復卦又重張古文龍虎經註䟽後序眞人彭曉作金錀匙云余始分擘參同契章義畢偶温故經覽太白眞人謌遂起意撰黑鉛水虎紅鉛火龍二篇其略曰夫黑鉛水虎者是天地發生之根乃有質而有炁也夫紅鉛火龍者是天地發生之本乃有炁而無質也撢賾兩論萬古不易之語也以道觀之有質者非五金八石硝霜漿露陰道一九之術也無質者非六欲七情灰心兀坐存想三一之法也是以古人言有質者眞鉛也太陰月之精也爲天地萬物育形之母無質者眞汞也太陽日之光也爲天地萬物發生之父鉛汞二體互相孳胤循環不絶可謂生天生地生萬物之宗祖也故我眞人上士莫不留心注意採取太陰之精設其法象誘會太陽之炁歸於神室之中結爲金液神丹太陰之精乃金華黄芽也太陽之炁乃流珠姹女也故經云太陽流珠常欲去人卒得金華轉而相因又云河上姹女靈而最神將欲制之黄芽爲根流珠姹女其性不定易得飛走若不以鼎器方便呼召安肯等閑住於雜物之上哉故造夫丹先制眞鉛擬象天地而爲神室上釜天爲雄爲乾爲離爲日爲火爲陽爲木下釜象地爲雌爲坤爲坎爲月爲水爲陰爲金兩釜相合象若雞子其中空虚縱廣寸餘以安靈汞又坤母金妻也乾父木夫也火龍既交於神室之下則金虎情合於中交合不已孳産無窮而木中生魂金中生魄魂魄凝然化而爲炁漸生鄞鄂交結流珠名曰金液故古謌云束身歛魂充虎飢虎來食啖生髓脂髓脂即金液也又須尋靈山選福地造丹房建星壇安爐竈鑄鼎室結合眞友總覽紀綱若頭頭具備方得從事於斯也故眞一子作參同契後序云術士又須自徹聲色節嗜欲去名利投靈山絶常交結仙友隱密潜修晝夜不怠方可希望也或不如是則虚勞勤尓陰眞人曰不得地莫妄爲須隱密審護持保守莫失天地機此藥變化不思議又曰莫辭得失一志而修還丹可冀兹豈設虚言而惑後世哉道昨遇師㫖頗歷歲月實縁官小家貧俸薄俗事紛冗食指稍衆荏苒至斯未能撥置然而志不墮而心愈堅者姑欲以待便風終成其事耳所有火候一十九圖並具于參同契下卷之末兹不復録也止將攢簇周天火候圖金火相交生藥圖二本附於此經之末以明龍虎之動靜證金木之玄功也道曾於乙巳歲三月十八日悮蒙今上皇帝宣見問以修生養性之事道謹用註䟽龍虎經補註參同契義理進對躬承玉音訓以高義從容移時幸無䟽虞迺宿生千載之慶繼於當年四月中旬託承受官御藥叨沐寵光以註䟽龍虎經繕寫修進訖道踈遠寒微深不自揆僣爲註䟽罪不容逃賴聖主不即斥逐過蒙省覽道死且不朽矣所有補註參同契章句頗多註義稍廣不得同時投進加之俸薄乏力修寫瞻望宸極無縁上達顒顒之心但切馳仰後來頗有增損數字謹别抄録命工鋟木用傳同志或有見之者不妨縱轡以先進也或曰古文龍虎上經文奥理深不可輕議今公註疏文踈理淺恐未必然即答之曰道自童稚以來涉獵篇卷曾無懈怠于今五旬有六又遇明師口訣非不精研也若將妄語以惑後人昭昭上天豈敢欺哉, CK-KZ: ''}
