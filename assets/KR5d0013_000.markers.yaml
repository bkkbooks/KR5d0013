  - {type: variant, offset: 919, length: 1, content: 叙, WYG: 序古文龍虎經註疏原序進古文龍虎經註疏奏劄臣真一伏見保義郎王道所撰龍虎經註疏三卷事顯而言直理明而義詳深得㕘同契金碧經之宻意其說外丹皆非以五金八石諸雜𩔖為藥材止取天地之精日月之華混合造化以成神丹此與陰真人無質生質是還丹凡鉛凡汞不勞弄之語正同臣山林老褐雖學道膚淺無可採取然於道書講之舊矣古語有云三折肱為良醫臣與王道相識甚久議論以詳因其以所譔來就臣印證與臣得之於師者首尾符契是用昧死繕寫上進恭望燕閒略垂省鑒自今而後願飭尚藥如金石雜𩔖反惡之劑不使上御以保萬壽實天下幸甚臣以此區區愚忠仰冒聖恩伏惟幸聽干冒天威臣下情震懼之至太乙宫養素菴道士臣周真一劄子進古文龍虎經註疏奏劄}
