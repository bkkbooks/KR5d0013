  - {type: variant, offset: 21, length: 227, content: 所撰古文龍虎經注䟽三卷事顯而言直理明而義詳深得參同契金碧經之密意其說外丹皆不以五金八石諸雜類爲藥材止取天地之精日月之華混合造化以成神丹此與陰眞人無質生質是還丹凡鉛凡汞不勞弄之語正同臣山林老褐雖道學膚淺無可採取然於道書講之舊矣古語有云三折肱爲良醫臣與王道相識甚久議論亦詳因其以所撰來就臣印證與臣得之於師者首尾符契是用昧死繕寫上進恭望宴閑略垂省覽自今而後願飾尚藥如金石雜類反惡之劑不使上御以保萬壽實天下幸甚臣以此區區愚忠仰報聖恩伏惟幸聽干冒天威臣下情震懼之至, CK-KZ: ''}
