  - {type: variant, offset: 919, length: 1, content: 叙, CK-KZ: 序經進古文龍虎經註疏奏劄臣眞一復見保義郎王道所譔龍虎經註疏三卷事顯而言直理明而義詳深得參同契金碧經之密意其說外丹皆非以五金八石諸雜類爲藥材上取天地之精日月之華混合造化以成神丹此與陰眞人無質生質是還丹凡鉛凡汞不勞弄之語正同臣山林老褐須學道膚淺無可採取然於道書講之舊矣古語有云三折肱爲良醫臣與王道相識甚久議論以詳因其以所譔來就臣印證與臣得之於師者首尾符契是用昧死繕寫上進恭望燕閑畧垂省覽自今而後願飭尚藥如金石雜類反惡之劑不使上御以保萬夀實天下幸甚臣以此區區愚忠仰冒聖恩伏惟幸聽干冒大威臣下情震懼之至太乙宮養素齋道士臣周眞一劄子}
