body:
  text: 古文龍虎經註疏卷中宋王道撰故演作丹意章第十四故演作丹意乾坤不復言丹砂流汞父戊巳黄金母鍾律還二六斗柄建三九赤童戲朱雀變化為青龍臣道註曰故演作丹意乾坤不復言者前篇言大丹之意置立神室妙盡其理故於此篇不復言也丹砂流汞父戊巳黄金母者丹砂日也流汞日之魂也戊巳月也黄金月之魄也丹砂戊巳能生此二味魂魄而為至藥故謂之父母也鍾律還二六斗樞建三九者二六者乃子寅辰午申戌為六律丑夘巳未酉亥為六吕又子為黄鍾午為賓之𩔖主十二時也三九亦十二也斗之所指為建正月建寅二月建夘經歴十二辰也㕘同契曰消息應鍾律升降據斗樞是也赤童戲朱雀變化為青龍者赤童日也朱雀火也火既運動則日生汞於神室之中故名為青龍也古詩云五行顛倒術龍從火裏出是也臣道疏曰夫太極生兩儀兩儀生四象四象生八卦八卦定吉凶故乾天也其靜而専其動而直坤地也其靜而翕其動而闢故經云乾坤天地之體坎離天地之用道生天天生地地生萬物是以乾坤動靜生乎萬物者也天也者虛也陽也剛也日也父也地也者實也陰也柔也月也母也自虛而下皆地也自實而上皆天也是以虛實相通而有六爻之變故乾用七九坤用六八也四象之數通乾坤之數而老少陰陽之䇿見矣四而通六得二十四故為老陰一爻之䇿四而通八得三十二為少陰一爻之䇿四而通七得二十八為少陽一爻之䇿四而通九得三十六為老陽一爻之䇿四變之䇿乾坤之成數也六九之變六爻之生數也以老陰老陽九六隨乾坤二卦為變而老陰少陽七八不入也乾有六爻而地得其三坤有六爻而天得其三乾坤二卦為天地變通之體常混而為一布於六虛之内隨陰陽二氣升降變化於六爻之中方其乾之動也直而不屈陽火赫赫發乎地下變坤下爻而為復是曰初九為陽六爻之主微陽方生二變為臨陽氣方行三變則陰陽交通而成泰萬物萌甲破地而出四變為大壯萬物叢生五變為夬則萬卉見真以至上九變為純乾陽光熹熹遍布夘酉之南草木茂盛陽光升於上五色曜於首井泉若氷是為乾卦周足之時也方其坤之動也闢而不塞陰靜肅肅發于天上變乾下爻而為姤是曰初六為陰六爻之主微陰方生二變為遯陰氣方行三變則陰陽不通而成否萬物成實結而埀下四變為觀萬物衰落五變為剝則萬卉歸藏以至於上六變為純坤則陰精澟澟遍布夘酉之南草木萎黄陰精沉於下五色藏於根井泉若温是為坤卦周足之時也故經曰日入地中結精之象再變為復發生萬物者也是知乾坤二體隨陰陽之氣以變動升降于六虛一晦一明循環晝夜日往月來如環無端而莫知乎紀極也惟一味元和之氣以成變化爾上古至人知天地之消息陰陽之舒慘故托易象法乾坤准陰陽擬水火召天地至和之氣引日月純粹之精歸于神室之内以變金液㸃化凡軀而作聖體功徳備具位號真人孰不謂之神乎坤初變成震章第十五坤初變成震三日月出庚東西分夘酉龍虎自相尋坤再變成兌八日月出丁上弦金半斤坤三變成乾十五三陽備圓照東方甲金水温太陽赤髓流為汞姹女弄金璫月盈自合臣道註曰坤初變成震三日月出庚者朔前夜半子時運行陽火之初日月合璧于畢之上乾交坤之下爻而為震卦震卦主事一陽爻生于下則月至三日現于庚方也㕘同契曰三日出為爽震受庚西方是也東西分夘酉龍虎自相尋者東西二八之門日月出入之方金水正位既經五日運行火候則龍虎之氣兩相慕戀聚于鼎中也坤再變成兌八日月出丁上弦金半斤者自六日至八日成上弦乾交坤之二爻為兌卦主事二陽爻生於中則月光得半弦平如繩而月現于丁方喻鼎中金火各半也㕘同契曰八日兌受丁上弦平如繩是也坤三變成乾十五三陽備圓照東方甲者自十一日到十五日乾交坤之上爻而為乾卦主事三陽爻生于上則月光圓滿而月現于甲方喻鼎中金徳圓滿得火候也㕘同契曰十五乾體就盛滿甲東方是也金水温太陽赤髓流為汞姹女弄金璫月盈自合者金液神丹至此太陽之精盛滿神室之内金火之氣而化為汞汞與其母兩相留戀以變金體蟾蜍兎魄互相包裹光曜鼎中姹女之體自成首飾化現金璫喻鼎中金氣漸榮而變成丹㕘同契曰蟾蜍與兎魄日月無雙明蟾蜍視卦節者吐生光是也太陰自初一日至十五日光滿至十六日自合也㕘同契曰七八道巳訖屈折低下降是也十六轉相減章第十六十六轉相減乾初缺成㢲平明月現辛乾再損成艮二十三下弦下弦水半斤月出于丙南乾三損成坤成坤三十日東北喪其明月没于乙地坤乙月既晦土水金將化坤生震龍臣道註曰十六轉相減乾初缺成㢲平明月現辛者謂十六日以後坤交乾之下爻而為㢲卦㢲卦主事一陰爻發生于下陽火初退陰符始生平明則月現於辛方也亦如陽火初進之時月生三日同也㕘同契曰十六轉受統㢲辛現平明是也乾再損成艮二十三下弦下弦水半斤月出于丙南者自十六日陰符退至二十三日坤交乾之中爻而為艮卦艮卦主事二陰爻生于中則月現于丙方復與上弦同義盖鼎中金水各半也㕘同契曰艮直于丙南下弦二十三是也乾三損成坤成坤三十日東北喪其明月没于乙地者自二十六至二十八日坤交乾之上爻而為坤卦坤卦主事三陰爻生于上月光將盡則月現于乙方至于東北陽光既盡是謂喪明也㕘同契曰坤乙三十日東方喪其明是也坤乙月既晦土木金將化坤生震龍者自二十八日至三十日陰符到此消盡隂陽之氣各停土與金水相合為液六陽之氣不合于月太陰之體全黒循歴東北再經畢之上日月相合水火重施復如其初又以復卦為首坤而生震卦也震屬木位在東方故稱龍也又陽火為龍㕘同契曰節盡相禪與體復生龍是也臣道疏曰自子至巳陽火六時而為進震兌乾主之太陰行度為金液之象也復臨泰壯夬乾為太陽行度陽火之象也自午至亥陰符六時而為退㢲艮坤主之太陰行度為金液之象也姤遯否觀剝坤為太陰行度陰符之象也鼎中金水之變十二爻十二時主之天上月華之動六卦十二時主之㕘同契曰言之甚詳但人不能洞察之耳修真之士欲煉此大丹必上知天文下知地理中知人情方能變通造化手握陰陽運日月于爐中而孳生龍虎交乾坤于室内而長養精津金母無虚育之勞木父有成功之逸金液化現砂汞成形九轉數終陽光變是黄轝立號明牕塵不惟㸃石化金服之與天齊老變化之妙無以加矣乾坤括終始章第十七乾坤括終始故曰震龍也如上三十日坤生震兌乾乾生㢲艮坤八卦布列曜運移不失中臣道註曰乾坤括終始故曰震龍也乾坤二卦為衆卦之父母二卦相索而成八卦乾先索坤之下爻而為震卦以為朔自一日夜半子時陽火發生之始坤又索乾之下爻而為㢲卦自十六日夜子時陰符發生之始也乾納甲壬坤納乙癸㕘同契曰壬癸配甲乙乾坤括始終是也如上三十日坤生震兌乾乾生㢲艮坤者坤生震卦而為初五日直符次生兌卦而為中五日直符又生乾卦而為末五日直符太陽立十五日圓滿于甲上鼎中金液亦盛盖隨卦後而増也乾生㢲卦而為初五日直符次生艮卦而為中五日直符又生坤卦而為末五日直符太陰立十五日光盡于東北艮鄉鼎中金液盛實亦隨卦後而成也乾坤自相生滅為三十日一月之候也㕘同契曰七八數十五九六亦相當四者合三十陽氣索滅藏是也八卦布列曜運移不失中者如上八卦布列于一月三十日中運動陽火陰符一一輳歸神室之内為大丹金液之變化㕘同契曰八卦布列曜運移不失中是也臣道疏曰人之一身亦體天地其中陰陽升降亦與造化之符契但以六慾七情發之于外而精氣耗損于内終日汨汨不知省覺也能知此道隨順陰陽恬淡守素則天地外交而身中内合一一皆應其升降若少思慮無戕賊亦自然延年矣況安爐立鼎法象天地召日月之至精引陰陽之和氣成神藥而服之安得不為仙哉造金液者須知乾坤八卦約一月三十日行度之數日行一度而月行十三度雖一月一終終而同宮謂之合朔日行三十度月行三百九十五度歴十二月再與日合于斗宿之上為冬至之日也故至人以日月度之數為一月運火之期前十五日震兌乾主之後十五日㢲艮坤主之坎離定位陽火陰符隨時進退皆依約爻象也調火六十日章第十八調火六十日變化自為証神室有所象雞子為形容五岳峙潜洞際㑹有樞轄臣道註曰調火六十日變化自為証者元精在鼎中難覩其狀如一月數終開鼎視之或金華降少玉液結遲乃陰符陽火有太過不及之患再須一月運行結丹之火候也故元精在鼎中受外來符火一一變化難覩其狀以十二時爻象火候即知其動靜沉浮㕘同契曰元精𣺌難覩推度效符徴是也神室有所象雞子為形容者古之至人仰觀天象俯察地理效乾坤而立神室𩔖雞子而法形容虛中一寸以安靈汞㕘同契曰居則觀其象準擬其形容是也五岳峙潜洞際㑹有樞轄者地上靈山分為五岳其中皆相潜通古人立表以為象制壇爐鼎竈符合𤣥法委曲相通而使火氣通達無所凝滯若火候散於外則吉凶生于内㕘同契曰立表以為範占候定吉凶是也臣道疏曰天地未分象若雞子天地既分陽火升于上而輕清之氣結而為天陰水沉于下而重濁之氣結而為地是謂天地定位也神室者上釜為天下釜為地兩釜相合其形若雞子中虚寸餘是謂神室定位也天地交則水中生火而升火中生水而降相交于真土之内而生藥物神室交則火自坎生水自離降相交于戊巳之内而生靈汞𤣥妙神秘亦可知也發火初温微章第十九發火初温微亦如爻動時上戴黄金精下負坤元形中和流素津㕘合考三才乾動應三光坤靜含陽氣臣道註曰發火初温微亦如爻動時者凡神丹起火皆依約爻象與十二月同為消息如地雷復卦主冬至之令下一爻變為陽子時之爻也于此時發火未甚有力但温温然是謂柔火以應復卦下一陽爻初生之候也㕘同契曰發號順節令勿失爻動時是也上戴黄金精下負坤元形者黄金乃乾天也上釜也坤元乃坤地也下釜也二釜相合而為神室也㕘同契曰上察河圖文下敘地形流是也中和流素津㕘合考三才者既神室有位則素津靈汞生于其中矣中宫之靈亦喻人心神之所居也故天地人全則萬物名焉金木作焉㕘同契曰中稽于人心㕘合考三才是也乾動應三光坤靜含陽氣者乾天也日也火也乾元運動而水火之精便生于空器之中而作金液也坤地也月也水也坤元靜居而月水金之精和合太陽流珠而又包裹不致飛走也㕘同契曰動則依卦變靜則循彖辭乾坤用施行天地然後治可不謹之乎是也臣道疏曰日為離位在南方居丙丁之中火之正位也日又含火火又變體成汞故曰汞生于日汞者陽也謂之陽魂也離卦二陽一陰以巳土為其神又是坤之中女日又用巳土為其光巳者陰位也故以其象配離卦又為日中之光含其𤣥色為朱從青變赤故為硃砂也月屬坎位在北方居壬癸之中水之正位也月又含水又變體成金故云金生于月金者陰也謂之陰魄也坎卦二陰一陽以戊土為其神又是乾之中男月又用戊土為其精戊土者陽位也故以其象配坎卦又為月中之精含其素色為黒從白變黒故為黒鉛也汞含離氣以應陰爻之位汞之一物非世間水銀及硃砂等物本生于太陽之内離名曰水神是謂真汞也鉛含坎氣以應陽爻之位鉛之一物非嘉州鹹鉛及諸巖間所生者本生于太陰之中坎名曰白金是謂真鉛也鉛分為二二儀神室也汞生于一一氣𤣥液也以象三才為天地人也古文龍虎經註疏巻中
