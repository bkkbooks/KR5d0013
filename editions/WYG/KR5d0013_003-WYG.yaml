body:
  text: 古文龍虎經註疏卷下宋王道撰神室先施行章第二十神室先施行金丹然後成可不堅乎煉化之氣包裹飛凝開闔靈戸希夷之府造化泉窟臣道註曰神室先施行金丹然後成者既立神室而得其法則金液有必成之理也可不堅乎煉化之氣包裹飛凝者煉丹之士必須先堅備鼎器使其中靈汞結凝不得飛走方可成丹也開闔靈戸希夷之府造化泉窟者神室有上下之釜開則為二闔則為一其中虛空水火交神物便生故號希夷白金為丹而生水銀號曰金液此丹之府庫窟穴也臣道疏曰北方之水生成白金謂之真鉛乃至陰之精包含陽和隨混沌分判之氣各歸一元古之至人法象天地生成之道還陽和之氣于真鉛之中含自然之用制成大藥此是真元之氣也非世間凡物可為若修煉之得法制度有理則何患不成大丹乎龍虎二物俱生鉛中因水火升降致使金木交希夷之府日月㑹造化之窟白金為母包裹衆靈而産至寳矣陽氣發坤章第二十一陽氣發坤日晷南極五星連珠日月合璧金砂依分呼吸相應臣道註曰陽氣發坤日晷南極者亥月之末純坤卦終至子月之初夜半子時坤卦下生一陽爻為復卦乃陽火所生之時也至丑歴寅以至于巳陽氣至南方極勝則陰生于午也五星連珠日月合璧者五星運行周天有若連珠遲疾留伏逆順進退也日月度一月一交其合璧與五星共為表裏以證金火一嵗之用也金砂依分呼吸相應者金砂乃日月之精也水火升降一消一息則金砂在鼎中一浮一沉隨象呼吸與外來符火相應也臣道疏曰真鉛母也坤也太陰之體常黒遇陽火而方生形質形質既生而歴六十四卦逐三百八十四爻變化萬狀皆隨日月五星行度之數也若以雜𩔖為丹則安得隨陰陽四時而生乎華盖上臨章第二十二華盖上臨三台下輔統録之司當宻其固詰責能否臣道註曰華盖上臨三台下輔統録之司宻當其固詰責能否者華盖十六星其形如盖在紫微宫中以應帝座三台六星在紫微宫外主調順陰陽燮理萬物喻水火居金鼎上下若燮調得理則神精降内三台為統録之司百僚之帥宰相之任又曰文昌也或五星盈縮失次日月進退失節則四序不應風雨不時是致萬物不生亦猶煉丹之士運行失節使鼎或乾或溢變異不常必敗丹事若總諸節候如運諸掌固宻鼎器不使有虞若一不理則詰責運符之能否也㕘同契曰文昌總録詰責台輔百官有司各典所部是也臣道疏曰世之學道者多矣然得妙理者萬無一二或假其名以資奸利或燒變黄白勾合庚艮者有之或妄指古文修煉五金八石以僥倖大藥費嵗月耗精神終無成效愚者益其過智者損其行躭執至死曽不悔悟迷迷相𫝊無有休止至有失其職業散其貨財失其父母之養割妻子之愛漂流凍餒世世有之殊不知金母大藥非凡鉛凡汞所作乃天地之精神日月之魂魄何患不造其閫域耳火煉中宫土章第二十三火煉中宫土金入北方水水土金三物變化六十日自然之要先存後亡或火數過多分兩違則或水銀不定同處别居剛柔抗衡不相涉入非火之咎譴責于土臣道註曰火煉中宫土金入北方水者火日也金月也金火二性順五行六律之氣而生故火生土金生水各吐其精而為神藥也㕘同契曰日含五行精月受六律紀是也水土金三物變化六十日者中宫只有金母一味而水土二味得火候為和合若一月火候金液不依母數則再須一月起火也㕘同契曰五六三十度度竟復更始是也自然之要先存後亡者金液神丹全在火候火是藥之父母藥是火之子孫乃天地之氣自然而生也或火力停勻而生金汞或火力失度返致散失存亡不定必在六十日之内以度其始終也㕘同契曰原始要終存亡之緒者是也或火數過多分兩違則者陽火數多神氣返傷致使金汞驕溢亢滿鼎中違失範度也㕘同契曰或君驕佚亢滿違道是也或水銀不定同處别居者水銀乃金液也若火數差殊則水銀在鼎室之内隨火不定不依轍而行則或同或别生于不測也㕘同契曰或臣邪佞行不順軌是也剛柔抗衡不相涉入非火之咎譴責于土者金砂不依數生剛柔不相涉入非特火之過也亦是中宫金母不純而精氣少失必在此故不責火而責土也㕘同契曰弦望盈縮乖變凶咎執法刺譏詰過貽主是也臣道疏曰煉丹之士須明日月行度之數知陰陽升降之理曉火候之抽添辨藥物之真偽方有必成之理兹實在于火候運符之人若昧如此執法不定却言𫝊受不真譏刺師言不能自悟也好道之士宜戒之為爾土鎮中宫章第二十四土鎮中宫籠罩四方三光合度以致太平五臓内養四肢調和水涸火滅含曜内朗金木相瑩閉塞流輝調水温火發之俱化道近可求臣道註曰土鎮中宫籠罩四方者土者戊巳也母也母居中宫召四方和氣歸于神室之内化成金液也㕘同契曰辰極處正喻金母盖能優游以懷來臣庶也故曰辰極處正優游任下是也三光合度以致太平者三光則日月星也若三光進退而不失於上則天下太平令行禁止國無亂逆之患也丹之内運亦有三光盖陽火陰水與金胎是象日月星也故外運亦有三光分在動靜爻刻之内陰陽符火之中若運符得理則無逃逸之害如治國之致太平也㕘同契曰明堂布政國無害道是也五臓内養四肢調和者若運行符火盡合周天度數則鼎室之内真人之身五臓四肢調和安順虛無恬淡以致于中故無傷夭之患也㕘同契曰内以養已安靜虛無是也水涸火滅含曜内朗者夫煉大丹火候巳時則水涸亥時則火滅至此二時金火之精氣各得其情光耀遍于一室之中朗照真人之體也㕘同契曰原本𨼆明内照形軀是也金水相瑩閉塞流輝者龍虎之氣相交金木之情契合金來尅木木被金制反能瑩盛致使流輝鎖于鼎中靈根閉于室内皆自金母養毓而成也金母變化不常此之微妙非口訣難𫝊㕘同契曰閉塞其兌築固靈株是也調火温水發之俱化道近可求者金母在鼎内翕三光之氣來日月之精孶生聖胎其狀莫測而子株靈汞在于神室之中𨼆伏難見若火不失其時水不失其候水火俱道升降有法隨順天機樞轄法象則金汞自然而眷戀龍虎情性以交結擬象求之變化之理其道可見矣㕘同契曰三光陸沉温養子珠視之不見近而易求是也臣道疏曰夫人之理可以𩔖推若三光之精未現四象之氣未分𤣥黄混沌清濁未判真鉛之氣混沌其中既分清于天用濁于地陰陽之和以為人三才定位真鉛之氣居于中央當戊巳之位又為神藥之母籠罩四方金木水火之氣而結為金液也五行之中金來尅木木中有火火返尅金金火相尅互相瑩盛水來尅火火中有土土返尅水水土相配互為變化此相生相殺之理皆在口訣不以書𫝊若以天道求之則一味元和之氣耳水土獨相配章第二十五水土獨相配翡翠生景雲黄黒混元精紫華敷太陽水能生萬物聖人獨知之臣道註曰水土獨相配翡翠生景雲者水則𤣥水土則金母也太陽之火與金母相交則神室之内木精化氣而生景雲漸結流珠潤澤丹宫以化金液也㕘同契曰黄中漸通理潤澤達肌膚是也黄黒混元精紫華敷太陽者黄黒亦水土也水土之氣相制而生太陽元精若合法象始終得其妙理則太陽元精漸兆于有無之中以生鄞鄂紫華敷黄液蕩漾是神藥未堅實也㕘同契曰初正則終脩幹立末可持是也水能生萬物聖人獨知之者水一數𤣥天生水而居于北方水中生金金復能生水聖人知之擬象而成神丹非凡愚可測也㕘同契曰一者以掩蔽世人莫知之是也臣道疏曰乾坤二體𤣥象包裹天一生水曰𤣥水地五生土曰真土水土相交是生萬物聖人知此造化遂擬天地而立神室准陰陽而行水火依約爻象中遷四時則元精生焉神汞出焉金徳尚白章第二十六金徳尚白煉鉛以求黄色焉感化生中宫黄金銷不飛灼土煙雲起臣道註曰金徳尚白煉鉛以求黄色焉者煉鉛為白金白金為神室神室中有金水金水既為火所化而色變黄名曰黄轝㕘同契曰下有太陽氣伏蒸須臾間先液而後凝號曰黄轝焉是也感化生中宫黄金銷不飛灼土煙雲起者金液將生隨水火凝于器中本從金生化而成液感結中宫則黄金之液自然不飛走也火灼金華渾氣清徹或為輕煙薄霧在鼎室之内變化無常或鍾乳倒懸或犬牙參錯或變化日月之象而魂魄皆現或化龍虎之形而金水相交精神萬狀不可名言若以五金八石諸𩔖雜物作之者安能臻此神化哉臣道疏曰世間萬物不能壞者惟黄金耳自開闢以來惟金體不損故黄金之母曰真鉛真鉛者先天之一物混沌未判鉛氣在其中及天地分形鉛體亦現天地萬物若無鉛氣則不能成其妙用故真鉛之氣靡所不在也且黒金生白金白金生黄金黄金生至藥若人服之則壽同天地與道同體故金徳之精為衆藥之主萬物之宗也有無互相制章第二十七有無互相制上有青龍居兩無宗一有靈化妙難窺臣道註曰有無互相制上有青龍居者有者白金也無者火氣也故有無之作互相制伏金水相交而生靈汞于中宫汞即青龍也㕘同契曰上閉則稱有下閉則稱無無者以奉上上有神徳居是也兩無宗一有靈化妙難窺者兩無者陰陽氣也日月之魂魄也一有者亦神胎也神胎之中無諸雜物但空體而已因水火之氣引日月之精合陰陽之粹入于神胎金液靈化莫能窺測神室上下水火之氣因金母翕育相須而生㕘同契曰此兩孔穴法金氣亦相須是也臣道疏曰金液名黄轝者乃九轉之名也古之人服丹藥先齋戒清淨于内然後方服外丹庶得内外兼濟真氣薫蒸遍于四肢易以返老還童為純陽之身與天齊壽也煉銀於鉛章第二十八煉銀於鉛神物自生銀者金精鉛包北靈水者道樞其數名一陰陽之始故懷銀精鉛化黄丹寄位五金為鉛外黒色稟北方内懷金精被褐懷玉外為狂夫臣道註曰煉銀于鉛神物自生者白金未見其形𨼆于北方𤣥水之中若知白金黒鉛之内取之為大藥之基運動法象則神物自然生矣㕘同契曰知白守黒神明自來是也銀者金精鉛包北靈者金精乃白金也𤣥水之基乃真鉛也常包北方真水銀也㕘同契曰白者金精黒者水基是也水者道樞陰陽之始故懷銀精者白金自水而産用為神器水體不絶金水兩情為之樞紐陰陽之本故為銀精銀精則藥也㕘同契曰水者道樞其數名一陰陽之始是也鉛化黄丹寄位五金者鉛亦名𤣥位居坎方水火金木之氣𨼆于鉛中為五金八石之主流珠遇之而為根本皆水火之氣結成也㕘同契曰𤣥含黄芽五金之主北方河車是也為鉛外黒色稟北方内懷銀精者鉛外貌黒惡而内有金華常居北方壬癸之位也㕘同契曰故鉛外黒内懷金華是也被褐懷玉外為狂夫者真鉛未定修煉之前混于鑛内而包黒内懷以象被褐懷寳也㕘同契曰被褐懷玉外為狂夫是此意也臣道疏曰夫鼎者藥也藥者鼎也鼎藥一也金液之道若以非𩔖而成則世人服之者升仙多矣故㕘同契曰挺除武都八石棄損則知大丹不用五金八石曽青雌雄之𩔖㫁可見矣或為金丹自赤而變紫色者不過曽青雌雄之氣染入而已且夫自然元氣發生草木枝葉花果顔色艷異豈是曽青雌雄所染哉古詩曰花發何竒異緑葉間紅苞誰人將此染爭知造化燒枝莖花葉所發乃自然變化而成者莫非水火土之氣也金丹之道亦然順天地生成之理合金木自然之方若以水火土歸于一家豈無變化乎五金八石硝礬銅粉等𩔖衆術之中用者有之至若金汞靈液則此等諸𩔖者無所施焉使修煉大丹之士知此𤣥奥之道與夫真鉛所産之地則金液無不成之理故劉知古真人云龍虎者金汞也金液相包得自然之性服之者豈不神異哉銀為鉛母章第二十九銀為鉛母母𨼆鉛中鉛者銀子子藏銀胞真素𣺌邈似有似無灰池炎灼鉛沉銀浮潔白見寳可造黄轝臣道註曰銀為鉛母母𨼆鉛中者銀者金也鉛者水也為水生在金金為水母金返蔵形于鉛水中也㕘同契曰金為水母母𨼆子胎是也鉛者銀子子蔵銀胞者銀者子也水也鉛者母也金也金既生水而子水復居鉛母之中故曰黒鉛也㕘同契曰水者金子子蔵母胞是也謂黒鉛變質之後寄位西方常𨼆迹于水中得水滋養愈見生成名曰黒鉛制成白金而作神室因陽火激發而子水却于白金中流出名曰真水銀也大哉真物是為生天生地之一氣也真素𣺌邈似有似無者真素真汞也在母胞中被外符迫逐或有或無浮沉不定為鼎室所蔽不能見其形儀也㕘同契曰真人至妙若有若無是也灰池炎灼鉛沉銀浮者灰池火熾鉛沉于下銀浮于上名曰白金真一子謂真汞在神鼎之内被陽火陰符薫蒸飛伏不定或沉或浮神室若大淵也㕘同契曰髣髴大淵乍沉乍浮是也潔白見寳可造黄轝者灰池煆煉以為白金取白金而為神室可以造黄轝也㕘同契曰採之𩔖白造之則朱是也臣道疏曰金液之要在乎神水華池華池即金母也金者西方白金也其金有液汞者是也太陽流珠二物雖各有象本同一源至人以養金汞變為丹砂是返本還源歸自然之性白金神母養成大丹大丹成後津液不絶故言金液好道之士審而詳之不可以山澤金銀合和水銀便為之養汞也殻為金精章第三十殻為金精水還黄液徑寸之質以混三才天地未分象若雞子臣道註曰殻為金精水還黄液者真鉛煉為白金以白金為鼎器是金精之母其中有水銀可以變黄液也㕘同契曰煉為表衛白裏真居是也徑寸之質以混三才者神室中空方圓寸餘上釜為天下釜為地中安靈汞以象三才㕘同契曰方圓徑寸混而相扶是也天地未分象若雞子者天地未開闢之前混沌若雞子之形日月之精交于其中萬象之形因以兆矣至人指神室象混沌以體三才之用進陽火退陰符以留日月之精真鉛生天地之先採之有法造之有理非可妄為也㕘同契曰先天地生巍巍尊髙是也臣道疏曰白金既露狀若白馬牙又性好食木精木從北方水中而生因煆煉之後潔白如雪實為丹之寳也陶真人曰以寳煉寳志士得道葛稚川曰石液鬼液金精山蔵審此亦是潔白見寳也既言潔白又言見寳則可以造金液神丹也今之人燒硃砂水銀縱得伏火之法終有本性雖使服之安有砂入五内霧散風雨之效哉圓中髙起章第三十一圓中髙起狀似蓬壺闗閉微宻神運其中爐竈取象固宻全堅委曲相制以使無虞自然之理神化無方臣道註曰圓中髙起狀似蓬壺者凡修大丹先須壇爐鼎竈上下相接如蓬壺之狀也㕘同契曰傍有坦闕狀似蓬壺是也闗閉微宻神運其中者鼎内周旋四通以來火氣闗閉際㑹不使走失也㕘同契曰環帀闗閉四通踟蹰是也爐竈取象固宻全堅者壇上有爐爐上有竈竈中有鼎鼎中有神室神室中有金水互相包裹以閼奸邪又使靈汞易生也㕘同契曰守御固宻閼絶奸邪是也委曲相制以使無虞者金鼎懸於竈中虛其四向以疏火氣安水于金鼎之上運火于金鼎之下壇爐鼎竈遞相包裹以防非常也㕘同契曰曲閤相連以戒不虞是也自然之理神化無方者凡造大藥皆是日月星辰之精五行四象之氣而為金液非有他道也臣道疏曰至人憫夫不知道者利于汨没以致于死不明神之所往性之所有此金液之要所以傳也且黄帝老子亦修此道為後來之師故服丹長生𨼆顯變化入火不焦入水不濡者此也軒轅之前御世之君皆兼此道以相禪受不獨遊方之外而進此道也後世澆薄不純其法頗秘得之者稀至周之時老君降世將度函闗始以金液之法獨𫝊闗令尹真人因得流行于世有縁相值則遞相𫝊受不絶道種今世之人則不然以富貴驕其身名利役其性酒窒其氣色慾迷其情四樂之外惟畏死而已遂妄意延年盡禮于方術之士以求不死之藥有奸利之輩聞風競至偃蹇自如以為其師緘黙不言以視秘奥為之亂真未易識測其實以傍門小術依托為至道以金石草木借名為真藥曽無其効使夫後來不信金液之法亦不足怪也磁石吸鐵章第三十二磁石吸鐵隔礙潜通何況雞子配合而生金土之徳常與汞俱臣道註曰磁石吸鐵隔礙潜通者磁石之力全者可引數斤之鐵于器物之外此物𩔖相感者也㕘同契曰𤣥幽遠𣺌隔閡相連是也何況雞子配合而生者以白金造神室而象雞子之形如天地之配合運動水火而靈汞自生㕘同契曰𩔖如雞子黒白相扶是也且天地之中有太陰𤣥精變化萬狀注于萬物之上隨大隨小莫不由之至人制而食之以駐景修仙也欲制之法惟白金一物力能制之方肯留戀固為變化也金土之徳常與汞居者金乾土坤也乾坤情動而生汞鉛二物相得如成金液而不飛走㕘同契曰動靜休息常與人俱是也臣道疏曰古之真人𤣥奥之法在修金鼎但金鼎難造若能知者可以召萬化之氣知金液之精矣假令混沌之前形質未判天地之狀已若雞子取其根本立為至道故先天地首萬物道術之中惟此最先得之者獨立長世神形不壞亦不難也火記不虚作章第三十三火記不虛作非鄭重前文丹術既著不復重擬故演此訣以附火記焉臣道註曰火記不虛作非鄭重前文者火記有六百篇次第連接運十月火候也每月三十日晝夜各一卦計有六十卦十月計六百卦也二八月亦有篇數縁夘月易水安金至酉月行火止水與寅申月同故不在其數此古文龍虎經言火記上古之人口口相𫝊非虚作之文故鄭重而言之丹法云𫝊藥不傳火者此也丹術既著不復重擬者火記作之于前故于此經不復言也而演此訣以附火記焉者此經只以古文而傳不著作者之姓氏盖古之得道者恐火記沉匿後人不能修金液之道遂作此經以附之耳臣道疏曰世之學道者不得金液之根元而執傍門曲徑迷誤一生有兀坐存想咽津納唾指太淵一竅想臍下之泓池或黙聽靈響之音而分為鉛汞將心腎相交而名曰水火此皆初地之學也復有對境接氣行房中補養之術男女相交作吐納陰丹之法血氣將盡返至禍患朽腐形骸化成灰土此等數多皆為背道欲進却退欲速轉遲蒙昧至真乖違天理以此觀之深可憐憫此經以龍虎為首者龍者日也虎者月也日月是乾坤運動之祖發生萬物之本乾天金體其色青碧包含陰陽和合四象三光二氣皆運其中古之人效天地之運動日月之離安爐立鼎攝二景之光召龍虎之氣而歸神室制而成藥號曰金丹故以龍虎為名也魏真人云芽之靈者龍吟方泉景雲絡霄虎嘯虛無沖風四振陽燧照明朱火鬱起方諸見陰𤣥溢可得此皆自然而然也金丹變化之道其實皆一也若以五金八石及諸鉛鑛并存想採取陰丹而望白日飛昇不亦難乎且此經上中下三篇有鄙俚之談或字不正皆後人託名以竄其中今削去之以魏真人㕘同契相準分為三十三章使後來學者不失其次序也雖然山林髙逸朝市大𨼆可深造其道者亦豈無望于㕘同契印證哉古文龍虎經註疏卷下
