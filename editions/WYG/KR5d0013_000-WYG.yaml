  text: 欽定四庫全書子部十四
  hash: sha256:59b6c5006a29a1c169640e5600631b30d9a17b0b2b0283c6e596da3e89cb6da6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0013_WYG_000-1a, image: WYG1061/WYG1061-0535a.png}
body:
  text: 古文龍虎經注䟽道家𩔖提要臣等謹按古文龍虎經注䟽三卷宋王道撰前有道自序及太乙宫道士周真一奏進劄子又有道後序一篇道本末不可考自題稱保義郎差充恩平郡王府指揮使自序又云一介武弁隸職王府葢本藩邸環衛官而依附道流者也陳振孫書録解題載古文龍虎上經一卷不著名氏道推衍其義為之注又申注意自為之䟽其經分三十三章上卷十三章中卷六章下卷十四章末又載攢簇周天火侯金火相交生藥二圖以明用功之法大㫖謂真鉛真汞止取天地之精日月之華混合造化以成神丹辨藥材之真偽抉金石之異同又稱得真師口訣以龍虎經行世之本謬誤為多故釐而正之分章定句於淳熙間奏進所謂龍虎者即水火之義道家丹訣例用寓名耳注䟽中多引參同契語葢爐火之説自魏伯陽始有書猶彼法中之六經也道又有𥙷注參同契見所作後序今佚不𫝊然大意亦不過如此矣此書宋史藝文志不著録或疑出羽流依託然龍虎經之為古書尚無確驗亦何必究注之真偽且服氣養生山林隐之事也因方士以奏於朝此何意乎其人殊不足道姑以其言成理存之耳乾隆四十四年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀古文龍虎經註疏原序臣道曰道家之學有所謂内外丹者實性命之所繫得之者小則駐景延年大則登仙入聖其徒以書𫝊世無慮千萬卷内丹則莫不以神氣為本外丹則莫不以鉛汞為宗古歌云紅鉛黒汞大丹頭相符紅黒是真修紅鉛取精黒取髓解得紅黒藥無比將紅入黒保長生用黒入紅天仙矣顛倒兩般總成丹火龍變化為天仙此外丹之要㫖也古今學道之士皆以鉛汞為大丹藥曽不知真鉛真汞果是何物臣自志學之年則喜聞其事裒集丹書研詠意味夜以日至忘寢食惟是紙上之語曽無發明紹興壬申有道人為臣言鉛汞者但以山石間所採鑛銀為真鉛朱砂中所描水銀為真汞教臣停取一斤許以鼎器火候煉之臣以為信然遂於㑹稽天慶觀治丹室以其所指試為之費嵗月耗貨財竟無成效非臣心不誠實方之不良也閱乾道甲申復有道人為臣言真鉛不露體真汞不呈形又曰真鉛不見銀真砂不見汞以二物合和為一分九鼎火而取之名曰黄芽以法煉之變為黄轝紫粉亦號明牕塵服之聚精歛神除却萬病以臣觀之此盖青霞子昔所造一中丹爾至淳熙癸巳乃遇真師始悟前所得者皆非真鉛真汞也古歌云真鉛不産五金内生在杳㝠天地先又云聖人奪得造化意手搏日月安爐裏微微騰倒天地精攅簇陰陽走神鬼日魂月魄若箇識識者便是真仙子煉之服之千日餘身既無陰那得死真師以其秘方口訣以授臣言下有悟如夢之覺後讀諸家之書無不相契洞然明白由是而知日魂月魄為真鉛真汞從無質以生而有靈質萬物動靜莫不由之若安爐立鼎製造神室摶日月之根運水火之變不失天符之㫖則大藥神丹可得矣臣三十年間凡三遇人後得真師始契妙道臣一介武弁隸職王府家貧俸薄未能結真友採丹材鑄鼎器造神室屏跡山林以從事於斯也然専心致志晨夕不忘頃因暇日閲龍虎經以行世之本謬悮為多遂用得之於真師者釐而正之分章定句為註解復以魏伯陽㕘同契證其義申而為疏以辨藥材之真偽金石之異同去繁撮要始終相貫集一編為三卷上卷十三章中卷六章下卷十四章總三十三章非敢𫝊之於後世姑示同志之丹友耳臣疎逺之人不識忌諱冒昧萬死謹因髙士周真一印證繕寫上進伏惟萬機之暇留神親省使臣有萬世一遇之幸成就素志是不獨臣之私願亦真師之付囑云淳熙十四年四月初一日保義郎臣王道誠惶誠恐稽首頓首百拜謹序古文龍虎經註疏原序進古文龍虎經註疏奏劄臣真一伏見保義郎王道所撰龍虎經註疏三卷事顯而言直理明而義詳深得㕘同契金碧經之宻意其說外丹皆非以五金八石諸雜𩔖為藥材止取天地之精日月之華混合造化以成神丹此與陰真人無質生質是還丹凡鉛凡汞不勞弄之語正同臣山林老褐雖學道膚淺無可採取然於道書講之舊矣古語有云三折肱為良醫臣與王道相識甚久議論以詳因其以所譔來就臣印證與臣得之於師者首尾符契是用昧死繕寫上進恭望燕閒略垂省鑒自今而後願飭尚藥如金石雜𩔖反惡之劑不使上御以保萬壽實天下幸甚臣以此區區愚忠仰冒聖恩伏惟幸聽干冒天威臣下情震懼之至太乙宫養素菴道士臣周真一劄子進古文龍虎經註疏奏劄
