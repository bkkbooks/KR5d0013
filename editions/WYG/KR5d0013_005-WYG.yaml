body:
  text: 古文龍虎經註疏後序真人彭曉作金鑰匙云余始分擘㕘同契章義畢偶温故經覽太白真人歌遂起意撰黒鉛水虎紅鉛火龍二篇其略曰夫黒鉛水虎者是天地發生之根乃有質而有氣也夫紅鉛火龍者是天地發生之本乃有氣而無質也探賾兩論萬古不易之語也以道觀之有質者非五金八石硝霜漿露陰道九一之術也無質者非六慾七情灰心兀坐存想三一之法也是以古人言有質者真鉛也太陰月之精也為天地萬物育形之母無質者真汞也太陽日之光也為天地萬物發生之父鉛汞二體互相孳𦙍循環不絶可謂生天生地生萬物之祖宗也故我真人上士莫不留心注意採取太陰之精設其法象誘㑹太陽之氣歸于神室之中結為金液神丹太陰之精乃金華黄芽也太陽之氣乃流珠姹女也故經云太陽流珠常欲去人卒得金華轉而相因又云河上姹女靈而最神將欲制之黄芽為根流珠姹女其性不定易得飛走若不以鼎器方便呼召安肯等閒住于雜物之上哉故造大丹先制真鉛擬象天地而為神室上釜象天為雄為乾為離為日為火為陽為木下釜象地為雌為坤為坎為月為水為陰為金兩釜相合象若雞子其中虛空縱廣寸餘以安靈汞又坤母金妻也乾父木夫也火龍既交于神室之下則金虎情合于中交合不已孳産無窮而木中生魂金中生魄魂魄凝然化而為氣漸生鄞鄂交結流珠名曰金液故古歌云束身歛魄充虎饑虎來食啖生髓脂髓脂即金液也又須尋靈山𨕖福地造丹房建星壇安爐竈鑄鼎室交合真友總覽紀綱若頭頭具備方得從事于斯也故真一子作㕘同契後序云術士又須自徹聲色節嗜慾去名利投靈山絶常交結仙友𨼆宻潜修晝夜不怠方可希望也或不如是則虛勞勤爾陰真人曰不得地莫妄為須𨼆宻審䕶持保守莫失天地機此藥變化不思議又曰莫辭得失一志而修還丹可冀兹豈設虛言而惑後世哉道昨遇師㫖頗歴嵗月實縁官小家貧俸薄俗事紛冗食指稍衆荏苒至斯未能措置然而志不墮而心愈堅者姑欲以待便風終成其事耳所有火候一十九圖並具于㕘同契下卷之末兹不復録也止將攅簇周天火候圖金火相交生藥圖二本附于此經之末以明龍虎之動靜証金木之𤣥功也道曽于乙巳嵗三月十八日悞蒙今上皇帝宣見問以修生養性之事道謹用註疏龍虎經補註㕘同契義理進對躬承玉音訓以髙義從容移時幸無疎虞迺宿生千載之慶于當年四月中旬託承受官御藥叨沐寵光以註疏龍虎經繕寫修進訖道疎逺寒微深不自揆僣為註疏罪不容逃賴聖主不即斥逐過蒙省覽道死且不朽矣所有補註㕘同契章句頗多註義稍廣不得同時投進加之俸薄乏力修寫瞻望宸極無縁上達顒顒之心但切馳仰後來頗有増損數字謹别抄録命工鋟木用𫝊同志或有見之者不妨縱轡以先進也或曰古文龍虎上經文奥理深不可輕議今公註疏文疎理淺恐未必然即答之曰道自童稚以來究心篇卷曽無懈怠于今五旬有六又遇明師口訣非不精研也若將妄語以惑後人昭昭上天豈敢欺哉
