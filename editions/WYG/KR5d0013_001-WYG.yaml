body:
  text: 古文龍虎經註疏卷上宋王道撰神室者丹之樞章第一神室者丹之樞紐衆石之父母砂汞别居臣道註曰神室者丹之樞紐神室象乾坤能收日月之精氣以為金液神丹故謂丹之樞紐㕘同契曰乾坤者易之門戸是也衆石之父母者真鉛生於天地之先為萬物之父百昌之母故謂衆石之父母㕘同契曰衆卦之父母是也砂汞别居者砂汞本無形質𨼆於真鉛之内得太陽純一之精方能顯化於神室之中故謂别居也臣道疏曰太極之初化元氣而為天地分陰陽而為日月中産人物通為三才人之最靈故為萬物之首上古之時人之住世動經千百嵗自黄帝之後漸至壽天不齊者何也盖人不能體天地元氣而行遂至夭傷也天地所以能長且久者盡得元氣純粹之大也故能隨順四時生尅五行運動自然也古者通達之士觀天之道執天之行合自然元氣而滋養一身使如天地之壽後世之人則不然少者血氣未成而為淫慾所誘老者血氣將竭而為衰病滋蔓或有知道則已晚矣而自保之者猶得延年是以至人效天地變化安爐立鼎而作神藥老者服之則聚精㑹神還童為少少者服之則得仙尤速故真一子謂修煉神丹與天地造化同途託易象而言之莫不首採天地之根而為大丹之基既以乾坤運動之迹而為大丹之法象坎離而行水火歴卯酉以主刑徳盜四時推移之數歸於掌中託陰陽動靜之機而成冬夏陰生鶉火陽發𤣥枵動則坤變下爻為初九靜則乾歸下爻為初六此皆修丹之大㫖也出陽入陰章第二出陽入陰流曜二方列數有三按象水火臣道註曰出陽入陰流曜二方者陽自子而生出於地上歴丑寅卯辰至巳而陽極則青龍日之精曜於東方陰自午而降入於地中歴未申酉戌至亥而陰極則白虎月之華曜於西方也列數有三按象水火者青龍白虎二物皆因朱雀之氣薫蒸而成質故有三人也大丹自起首以至丹成真鉛神室之外只以水火二象為之非有他物相雜也臣道疏曰凡修金液神丹先須認藥物根元次驗其火候進退陽升陰降不離子午之方日往月來必在卯酉二位用坎離而行水火使龍虎變作夫妻還日精於月窟則鉛内産砂戲朱雀於離宫則砂中生汞金由情也汞由性也情性相包夫婦相眷自然而成金液也故人之情性不離於身丹之砂汞俱生鉛内情性於人非外物也砂汞與鉛非雜𩔖也是知日月升降陰陽往來皆在天地之中也故乾坤精髓常聚於雞足山中𤣥㝠之内而為大藥之祖宗金丹之根蒂也夫日有三照月有三移日月出於東而光曜於西則西方白虎金徳之正氣入於𤣥㝠之内化而為六戊日月入於西而光曜於東則東方青龍木徳之正氣入於𤣥㝠之内化而為六巳日月當於午而光曜於北則是南方朱雀火徳之正氣入於𤣥㝠之内就土成形化而為黒鉛常居杳㝠之内為天地萬彚之根本故魏真人云日潜徳而沉彩月施徳以舒光日受月化體不虧傷是知真元一氣乃生天生地之本也古之至人知神物𨼆於此遂假法象採之而為藥之父母擬乾坤而為神室立鼎足以象雞足取符火准則四時還返金水合於自然運陽火以還日精轉陰符而來月魄使三方之正氣並歸金鼎之中以四象之至和咸結杳㝠之内混沌相交經營鄞鄂以至丹成皆稟自然之變化也今之學者謂世間之水銀可以為金丹世間之黒鉛可以為河車使後來皆謬妄相𫝊以虛為實多方制度至老無成且水銀出自朱砂之内因火化而成其理只名水銀終不能成金液也殊不知金液者稟天地自然之氣憑陰陽純粹之精附陰於月為陰之主伏體中營潜當戊巳為至藥之父母豈有世間水銀及山澤五金八石比並於神藥之母哉神藥是度世延年之寳天地萬靈之祖世人甚難識之後學以諸𩔖雜物製造金液實錯㑹古人之意若使雜物可造金丹則金丹容易得成所云鉛汞二名者古人直說物象後人不解其意以朱砂便為鉛以水銀便為汞此乃以假物合為真名亂其根本所以千舉萬敗終無成理前所論真鉛出産者並是依經節録合於師㫖非敢臆說以誤後學好道之士幸留意焉制由王者章第三制由王者武以討叛文以懷柔土旺四季土徳以王提劍偃戈以鎮四方臣道註曰制由王者武以討叛文以懷柔者制令也猶王者出令以布四方也武剛猛火候也文柔弱火候也喻金鼎堅備神室宻固初進柔順之火以來陽和之氣令住鼎室之中末行剛猛之火金液須欲迸出為坤宫所拘遂留精於内以成造化猶國有叛逆之民被王者防制有方革心聽命故不能逃也土旺四季土徳以王提劍偃戈以鎮四方土徳者戊巳真土也真土者真鉛也真鉛能召至和之氣歸於中宫故青龍白虎朱雀𤣥武四象之氣不得真土終不得成金液也土居中宫故稱黄帝和氣隨四時而生萬物皆有之神室為和氣之主旺於四季能收攝日月之精華歸於鼎中不使流散于外也㕘同契曰土旺四季羅絡始終是也臣道疏曰王者治天下也内修文徳外治武備法三皇而設百僚順四時而播五穀故得國内安康和氣生焉古人以治天下之理而制金液神丹初下手之時必須神室神室之内而有胞胎胞胎之外而有金鼎金鼎之外而有璮竈若一一全備則使金液之精生焉至和之氣合焉王者體中宫神馬能伏流珠不使飛走文火發生之火武火結實之火能使金液成就也昔公孫氏上升之後配為中央土徳是和氣從中而生復有羅絡四季包裹金水和合流珠漸成神藥也姹女流珠飛走之物不常定處惟是土一味可以制之返成變化自然之道也坎離數一二章第四坎離數一二南北獨為經故冠七十二石之長臣道註曰坎離數一二者天一生水於坎故一數主之也地二生火於離故二數主之也南北獨為經者北方陰極之所而生陽氣之始歴子丑寅卯辰巳而終㢲南方陽極之所而生陰氣之始歴午未申酉戌亥而終乾陰陽二氣皆從子午為發生之始終故南北獨為經者也故冠七十二石之長者真鉛先天而生氣後天而成形故為衆物之長還丹之根蒂也臣道疏曰人間之術稱𤣥妙者莫不以燒金煉銀為世寳每見修制者萬無一成縱使有成者且非出世之寳又非延年濟世之術今世學道之士不以性命為急皆迷迷相指終無省悟之理殊不知大丹之道全在陰陽二氣相須而成至藥故真人丹砂訣云煉寳者合於至妙煉妙者合於至靈煉靈者合於至神煉神者合於至道如此至言則可知金丹之真偽妙理之淺深若不遇至人秘訣豈能悟解真詮為出塵之士哉夫坎離卦象乃離火坎水南北二位為水火根本雖則分為二體本同一源而生既分為二各稟情性為一有一無二矣至人於此知是天性自然非假合之所及却以二象配合為一煉成至寳服之長生天産二物都無雜𩔖實日月之精華乃乾坤之骨髓也易曰天垂象聖人則之此乃返本還元自有為而合無為也故水火坎離升降南北獨為丹首而冠七十二石之長悟天地生殺之機日月循環之方則有無之性自可曉也剛柔有表裏章第五剛柔有表裏陰陽稟自然金火當直事金水相含受雌雄併一體用之有條理臣道註曰剛柔有表裏陰陽稟自然者乾陽為剛坤陰為柔互相包裹配合神室使陰陽自然之氣日月施化之精輻輳金胎而結神藥也㕘同契曰乾剛坤柔配合相包是也金火當直事金水相含受者外則水火頻施内則金水常交水汞生青龍之體金精長白虎之胎萌芽漸兆金水留形神室之内金火既交之久而神水自生於母胎之中以至丹成子母兩相慕戀金水自然滋養也雌雄併一體用之有條理者雌雄亦龍虎也乾坤也日月也陰陽也坎離也夫妻也水火也男女也雌雄相雜則變化精氣為物也若用之得理則發生自然也臣道疏曰男屬離卦太陽日之象也女屬坎卦太陰月之象也日月相交金水自生情性相得配合自然更無外物若以雜𩔖而合神藥即非自然之性也只如男至弱冠女至笄年兩情相慕亦是自然而然也古人將此喻大丹與人無異皆自然之性也砂汞在鉛體中因水火激發而有非外物也嬰兒在母腹中亦自水火而有亦非外物也古人知此二種情性根本不相去離因引合龍虎之精還返金水之氣自然成其至藥則一陰一陽之謂道若非自然則不可合也譬男女二精氣交體合日往月來自然變化豈假他物而成胎孕以此明神藥必在乎離火坎水二象而成不在雜𩔖也由是以知日月真精煉成金液與男女胎孕之理實同但有仙凡淨之異爾至人恐後學不悟真理故引此為證其餘法象自可知也變化既未神章第六變化既未神終能復更始初九為期度陽和准旦暮周歴合天心陽爻畢於已正陰發離午自丁終於亥臣道註曰變化既未神終能復更始者凡修大丹須一月而成若火數不准鼎器不宻則神精降少金液結遲須更一月也㕘同契曰既未至晦爽終則復更始是也初九為期度陽和准旦暮者每遇晦朔之夜子時陽火將興便名地雷復卦陽爻生坤初九為下也自子至巳為早為日自午至亥為暮為晚旦以屯卦直事暮以蒙卦直事屯蒙二卦以直一日十二時也為大丹之體象也一日兩卦一月六十卦初則屯蒙終則既未㕘同契曰日辰為期度動靜有早晚是也周歴合天心陽爻畢於已者陽火自子而升至巳為陽極而陰生於午也㕘同契曰春夏據内體從子到辰巳是也正陰發離午自丁終於亥者陰符自午而降至亥為陰極而陽火復生於子也㕘同契曰秋冬當外用自午訖戌亥是也臣道疏曰大丹變化之道在乾坤二卦為首陽火起于子陰生于午陽極乾于巳陰極坤于亥乾坤十二爻隨十二時而變化以造金液也或有造大丹視為等閒之事妄意為之以至費耗貨財形枯骨悴終無成期豈知至道包裹天地吐納陰陽運轉四時斡旋日月發現五行循環晝夜生育萬物皆稟至道之變化也至人知大道之根本可以度世迺法象天地攅簇陰陽採日月之魂魄合水火之靈氣修營至藥歸于自然千經萬論留示將來而學道之士尚不能信但只以有形有質之物假合造化終不合至理縱有成者亦不能令人返老還童久視人間或返成癰毒流血之害煉丹之士可不戒哉水火各一方章第七水火各一方守界成寒暑東西表仁義五行變四時如是則陰陽互用順三一而得其理臣道註曰水火各一方守界成寒暑者水陰也寒極於坎火陽也暑極于離各守一方而成冬夏也㕘同契曰賞罰應春秋昏明順寒暑是也東西表仁義五行變四時者東方屬木發生萬物之所故謂之仁謂之喜西方屬金肅殺萬物之所故謂之義謂之怒金木水火土五行之氣變春夏秋冬而正四時之象㕘同契曰爻辭有仁義隨時發喜怒是也如是陰陽互用順三一而得其理者若四象之數不失其時則陰陽之氣順水火寒暑各得其理也臣道疏曰日月運行寒暑有節日去則月來年移則嵗至以一嵗之氣蹙于一日十二時中排春夏秋冬以應四時之候運動法象一一須及時也日月之度不差寒暑之節有准則大丹必成矣法象動内以知來則精氣生於室中陰陽結於鼎内既得陰陽精氣則鼎内潤澤自然流通漸生變化與四時應候故五章云春以温之仁也夏以暑之禮也秋以涼之義也冬以寒之智也若四時之氣順則一嵗之事成焉又春氣生物之本乃已前陽火之候秋氣殺物之本乃午後陰符候也子丑寅為春卯辰巳為夏午未申為秋酉戌亥為冬於十二時辰内運其火候應以四時五行不得分毫差忒則鼎中漸結金液將凝其丹必成也故歌云聖人奪得造化意手摶日月安爐裏微微騰倒天地精攅簇陰陽走神鬼則知金液神丹若非法象天地準則陰陽造化自然者則無成矣神室設位章第八神室設位變化在乎其中矣神室者上下釡也設位者列雌雄配合之宻也變化為砂汞砂汞者金土二用二用無爻位張翼飛虚危往來既不定上下亦無常獨居不改化歸中宫非土不可制也包囊衆石為丹祖宗臣道註曰神室設位變化在乎其中矣者立神室象天地天地定位則日月之光曜其中矣㕘同契曰天地設位易行乎其中是也神室者上下釜也神室有上下兩釜以應天地也㕘同契曰天地者乾坤是也設位者列雌雄配合之宻也設天地乾坤二位上釜象天為雄為乾下釜象地為雌為坤使上下兩釜雌雄之際配合而為一也㕘同契曰設位者列陰陽配合之位是也變化為砂汞砂汞者金土之二用也立鼎器法乾坤金母居中三才備具則生靈汞也砂汞乃坎離水火為乾坤二用㕘同契曰易謂坎離者乾坤二用是也二用無爻位張翼飛虚危者乾坤也日月也日月升降水火抽添不拘爻位張翼南方離火之位虚危北方坎水之位㕘同契曰二用無爻位周流行六虚是也往來既不定上下亦無常者水火往來神室之内不常定處也㕘同契曰往來既不定上下亦無常是也獨居不改化歸中宫者若火數抽添有理則時時化入中宫而為金液也㕘同契曰幽潜淪匿變化于中是也非土不可制包囊衆石為丹祖宗者中宫神室以真鉛制造故稱土徳也包囊萬彚為金液祖宗也㕘同契曰包裹萬物為道紀綱是也臣道疏曰大丹之道全在鉛銀與砂汞二物砂汞乃日之精鉛銀乃月之華修金液之方不出天地𤣥象之中前篇所論亦甚曉然猶恐學者不悟所以時時比喻如言下曉了則砂汞不勞而可得也且鉛之有砂汞由人之有情性情性發於中而應于外非外來也砂汞生于中而現于外亦非外來也情性二用並在身中砂汞二名俱𨼆鉛内人用情性則發于外鉛有砂汞則營于内然則機用須别其理同契至人之意分明指示用日月至精合而成藥不以雜物他𩔖也有無相制章第九有無相制朱雀炎空紫華曜日砂汞滅亡臣道註曰有無相制朱雀炎空者有者虎也無者龍也有者白金也無者陰陽氣也以白金為神室而未能自生變化因水火升降運轉四時乃得成丹故用空器而制有也朱雀乃神火薫蒸于下神室之内金液從火而生也㕘同契曰以無制有器用者空是也紫華曜日砂汞滅亡者紫華日月之精英在神鼎之内或化金華而現日月之光或變靈液而示龍虎之狀照曜鼎内化為砂汞一消一息一浮一沉隨水火而或滅或亡也㕘同契曰故推消息坎離没亡是也臣道疏曰上古之人以水銀一味而成丹者盖有龍而無虎也而不假五行四象法天則地亦不㑹夫婦陰陽交男合女但取陰陽坎離之氣消長于一身之中龍虎之精滋育于七竅之内信任自然而合大道上古皆長壽無夭殤也中古以來若欲却老還童延年度世升真入妙必須安爐立鼎召天地至和之氣囘日月英靈之華使四象無虞五行全備九轉數終三千時足開爐則紫粉凝霜金華曜日服之長生後天而老況今之人知虎者多識龍者少夫金液為青龍東方木徳之宗即日也黄芽為白虎西方金液之祖即月也此二物之精氣者皆有神通變化之理故經云日月之精救老殘是也製之得法食之亦能變化也所謂丹之變化者丹砂變為水銀乃陽返陰也水銀復變為丹砂乃陰返陽也方號純陽之丹而人服之决得長生聖人喻日月魂魄只在坎離二位更無别物恐後不得真理故直言之以示將來耳訣不輒造章第十訣不輒造理不虚擬約文伸奥扣索神明演成卦爻五行為經坎雄金精離雌火光金木相伐水火相尅土旺金鄉三物俱喪四海輻輳以致太平並由中宫土徳黄帝之功臣道註曰訣不輒造理不虚擬者聖人垂文於世必無苟作妄言以惑後人㕘同契曰言不茍造論不虚生是也約文伸奥扣索神明者剪去繁蕪撮其樞要驗日月之妙理符神明之至精㕘同契曰引驗見效校度神明是也演成卦爻五行為經者體周易六十四卦以為火數依金木水火土五行以為生殺以日月相合而證夫婦以坎離相交而來至精㕘同契曰推𩔖結字原理為徵是也坎雄金精離雌火光者坎藏六戊為月之精雄陽之位居於北方月陰也戊陽也乃陰中之陽象水中之生金虎也離蔵六已為日之光雌陰之位居於南方日陽也已陰也乃陽中之陰象火中之生汞龍也㕘同契曰坎戊月精離巳日光是也金木相伐水火相尅者金白金也木赤汞也二物相伐愈自榮盛水火遞尅大見光明日月相交剛柔互興陰陽得理則相謀合㕘同契曰日月為易剛柔相當是也土旺金鄉三物俱喪者金木火三物被四時尾火包裹經九轉之後俱化為明牕塵㕘同契曰土旺四季羅絡始終是也四海輻輳以致太平者呼吸四方之氣輳歸神鼎之中引龍虎之精而為至藥以五土而終功以四季而結裹故得赤青黒白各得施其功成就神丹也㕘同契曰青赤白黒各居一方是也並由土徳中宫黄帝之功者中宫土徳乃戊巳至和之氣金液變化之道皆稟戊巳也戊巳居中宫故稱黄帝修神丹者採日月之至精合陰陽之靈氣周星數滿水火運終盡歸功于土徳黄帝之功也㕘同契曰皆禀中宫戊巳之功是也臣道疏曰上古之人言不虛發訣不再傳事成之後書之于契以引將來好道之士況文字所𫝊只說大意今直指大藥之源者故令後人不用世間朱砂水銀之𩔖若得𤣥妙法象隨天地陰陽四時運動而得成丹者即是真陰真陽也陰符經云天機張而不死得此道者不可妄𫝊非人㕘同契曰寫情著竹帛又恐泄天符猶豫増歎息俛仰輒思慮是也煉至藥不出水火水火既交則鼎中龍虎之氣便相和合而成金液故真鉛實金丹之父母靈汞之祖宗也化生萬𩔖毓養羣生皆稟此而成也既得真鉛定體而又知水火真方則大丹豈有不成之理乎金火者鉛也章第十一金火者鉛也丹砂著明莫大乎金火言窮微以善化陽動則陰消混沌終一九寶精更相持卦與藥合金有三百八十四銖銖據一斤為十六兩也金精一化二氣成丹青龍受符當斯之時神室煉其精金火相運推雄陽翠𤣥水雌陰赭黄金陰陽混交接精液包元氣萬象憑虚生感化各有𩔖衆丹之靈迹長生莫不由臣道註曰金火者真鉛也金火二字是日月之精金為月之本火為日之根皆生于鉛中魏真人以金火為易以易為藥也㕘同契曰易者象也丹砂著明莫大乎金火者丹砂乃金液也金液大丹一法惟憑日月之精以成也金者鉛也月者水也砂者汞也日者火也外則水火升降内則鉛汞交結除此之外别無雜𩔖可入也金砂變化全在日月之精華而生㕘同契曰懸象著明莫大乎日月是也言窮微以善化陽動則陰消者古之人窮其微妙察其盛衰使陰陽之氣往來動靜循環晝夜周而復始㕘同契曰窮神以知化陽往則陰來是也混沌終一九寳精更相持者坎離龍虎之氣混沌于神室之中隨水火進退下手之初一宫坎位火數發生之初精氣相交乃未有變通至巳之㢲位火數發生之極則龍生汞而虎生鉛鉛汞之精漸萌而鼎内日月之氣輪轉于外水火之精卷舒于内㕘同契曰輻輳而輪轉出入更卷舒是也卦與藥合金有三百八十四銖銖據一斤為十六兩也者卦有三百八十四爻周天一嵗之數總火候一周之用金有三百八十四銖金母一斤之數總大丹一斤之用其火候金母皆相符合也㕘同契曰易有三百八十四爻據爻摘符是也金精一化二氣成丹青龍受符者大陰金虎之液太陽木龍之津化為真丹晦朔起符之初青龍火神當權震卦主之㕘同契曰晦至朔旦震來受符是也當斯之時神室煉其精金火相運推者正當青龍受符行火之時神室之内龍虎之氣相紐金火之精相合而化神丹也㕘同契曰當斯之時天地構其精日月相撢持是也雄陽翠𤣥水雌陰赭黄金雄陽也乾也天也老陽也日也砂也其精曰𤣥水又曰雌汞也雌陰也坤也地也老陰也月也鉛也其精曰黄金又曰白金日月相交于鼎中則日化𤣥水而月化黄金也黄金即真鉛𤣥水即真汞也鉛汞交而為一一乃成丹㕘同契曰雄陽播𤣥施雌陰綂黄化是也陰陽混交接精液包元氣者陰陽龍虎之氣在混沌之中承水火交感互相變化而生津液為丹根基也㕘同契曰混沌相交接權輿樹根基是也萬象憑虛生感化各有𩔖者世間萬物皆憑元氣而生各遂其𩔖而附其形也如在鼎中則木之氣化龍金之氣化虎火之氣化汞水之氣化鉛土之氣化和而五氣皆歸中宫長養鄞鄂以至凝神成真是各遂其𩔖凝而成真也㕘同契曰經營養鄞鄂凝神以成軀是也衆丹之靈迹長生莫不由者金液大丹有二十四品惟此丹是金液之大丹者乃是白日冲天之上道一一明象天地日月星辰五行四時歸於神室之中變化金液長生之道莫不由也㕘同契曰衆夫蹈以出蠕動莫不由是也臣道疏曰金火即鉛火也鉛火即水火也金火相交則丹砂生於真鉛之中古之人所秘者火候而己火數如一斤母數亦一斤以母一斤之數析之為三百八十四銖以火一斤之數析之為三百八十四爻以應一年六十四卦之數故乾之䇿二百一十有六坤之䇿一百四十有四引而伸之觸𩔖而長之也萬有一千五百二十以應萬物之數合天地一周之用古人法象天地準則陰陽用水火之升降合金木之情性備剛柔之體用成大道之造化其乾坤䇿爻一一演火候大丹之數顯金木水火土之精微者天之符也所修至藥運動火候皆應天符之數也若將年月日時之數蹙于一日十二時中進退陽火陰符以煉金液神丹則造化之理立可得也於是𤣥潤光澤章第十二於是𤣥潤光澤元君始煉汞神室含洞虛𤣥白生金公巍巍建始初冠三五相守飛精以濡滋臣道註曰於是𤣥潤光澤元君始煉汞神室含洞虛者黒鉛制為白金精光潤徹方成神室之體中虚徑寸以生真汞也元君乃鍊金丹之主司抱朴子曰元君亦自言我亦煉丹而得仙伏羲畫八卦仲尼演易象皆明此天地之數也㕘同契曰於是仲尼賛鴻濛乾坤徳洞虚是也𤣥白生金公巍巍建始初者𤣥生白金也故能收養日月之精華陽火未動俱𨼆于白金之内而不見形跡水火既行則金華産于白金之中金華乃戊巳之和氣也二物相見感化生丹可謂巍巍尊髙也稽考古初已有斯物包裹陰陽與萬物之形不相去離闗雎之義水火相交則砂汞生焉神明出焉故為萬物之母為陰陽之始也㕘同契曰稽古當元皇關雎建始初是也冠三五相守飛精以濡滋液也於真砂水三也五土也若水火土相交則神精降于鼎器之中故古聖人剙立神室既濟鼎器交男女之體合龍虎之形初則形質未分一如混沌既經運火之後則夫婦之精相紐龍虎之情契合便應元年稽首之初終成神藥也㕘同契曰冠婚氣相紐元年乃芽滋是也臣道疏曰元君亦煉丹而得仙者上古之祖師也擬天地之數約日月之行以鼎器則象乾坤中虛寸餘以安靈汞法象如動即天氣降地氣應天地至精相交而生神液也巍巍尊髙實為𤣥妙也古仙得道者恐後人不悟真理以朱砂水銀諸雜藥物而造大丹不明于真鉛之變化是以取象立言以曉學者若雜𩔖為之是猶入山捕魚龍入水求雉兔皆無可得之理徒勞力爾𤣥女演其序章第十三𤣥女演其序戊巳貴天符天符道漸剝難以應𤣥圖臣道註曰𤣥女演其序戊巳貴天符者𤣥女乃天地之精神陰陽之靈氣神無所不通形無所不𩔖知萬物之情曉衆變之狀為道教之主也戊巳乃和氣大丹之根本天符運動則生戊巳之精也㕘同契曰聖人不虛生上觀顯天符是也天符道漸剝難以應𤣥圖者天符進子陽火日増至已而陽極天符退午陰符日減至亥而陰極五行尅盡四時運終故道漸剝也㕘同契曰天符有進退屈伸以應時故易統天心是也臣道疏曰𤣥女亦上古之神仙為衆仙之長戊巳土也天符火也火乃元氣也大則包含天地小則潜藏一毫萬萬靈𩔖莫不霑其元氣廣大包籠潜布生育刑尅金水運轉陰陽榮瘁萬物變化無方有至大之妙用真人假此神化營修至藥採日月之至精合温涼寒暑抽添水火依春夏秋冬隨順四時盛旺榮衰皆稟自然也若以金銀草木灰霜而造金液神丹安有如此變化哉古文龍虎經註疏卷上
