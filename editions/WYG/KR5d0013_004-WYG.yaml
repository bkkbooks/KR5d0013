body:
  text: 㕘同契大丹火候攅簇周天火候圖攅簇周天火數以合年月日時隨順陰陽抽添水火使龍精漸垂于鼎内金液流暢于胎中火候周天數金丹最要機年中隨月變日内逐時移四季如同處三神似有知火金真秘訣此外更何施叅同契大丹火候金火相交生藥圖日火月金晦夜合交精氣相紐生成萬物一月數終又復如初開闢以來循環無端水火相交濟萌芽從此芳金華施畢昴玉兔現心房魄滅從辛始魂蔵入艮鄉道終歸五六復卦又重張
