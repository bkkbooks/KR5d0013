body:
  text: 保義郎差充皇弟少傅恩平郡王府指揮使臣王道註疏太乙宮養素齋道士臣周眞一印證神室者丹之樞紐章第一神室者丹之樞紐眾石之父母砂汞別居臣道註曰神室者丹之樞紐神室象乾坤能收日月之精氣以爲金液神丹故謂丹之樞紐參同契曰乾坤者易之門戸是也眾石之父母者眞鉛生於天地之先爲萬物之父百昌之母故謂眾石之父母參同契曰眾卦之父母是也砂汞別居者砂汞本無形質隱於眞鉛之內得太陽純一之精方能顯化於神室之中故謂別居也臣道疏曰太極之初化元氣而爲天地分陰陽而爲日月中產人物通爲三才人之最靈故爲萬物之首上古之時人之住世動經千百嵗自黃帝之後漸至夀夭不齊者何也蓋人不能體天地元氣而行遂至夭傷也天地所以能長且久者盡得元氣純粹之大也故能隨順四時生剋五行運動自然也古者通達之士觀天之道執天之行合自然元氣而滋養一身使如天地之夀後世之人則不然少者血氣未成而爲淫慾所誘老者血氣將竭而爲衰病滋蔓或有知道則已晚矣而自保之者猶得延年是以至人效天地變化安爐立鼎而作神藥老者服之則聚精會神還童爲少少者服之則得仙尤速故眞一子謂修煉神丹與天地造化同途託易象而言之莫不首採天地之根而爲大丹之基旣以乾坤運動之迹而爲大丹之法象坎離而行水火厯卯酉以主刑德盜四時推移之數歸於掌中託陰陽動靜之機而成冬夏陰生鶉火陽發玄枵動則坤變下爻爲初九靜則乾歸下爻爲初六此皆修丹之大旨也出陽入陰章第二出陽入陰流曜二方列數有三按象水火臣道註曰出陽入陰流曜二方者陽自子而生出於地上厯丑寅卯辰至巳而陽極則靑龍日之精曜於東方陰自午而降入於地中厯未申酉戌至亥而陰極則白虎月之華曜於西方也列數有三按象水火者靑龍白虎二物皆因朱雀之氣薰蒸而成質故有三人也大丹自起首以至丹成眞鉛神室之外只以水火二象爲之非有他物相雜也臣道疏曰凡修金液神丹先須認藥物根元次驗其火候進退陽升陰降不離子午之方日往月來必在卯酉二位用坎離而行水火使龍虎變作夫妻還日精於月窟則鉛內產砂戲朱雀於離宮則砂中生汞金由情也汞由性也情性相包夫婦相眷自然而成金液也故人之情性不離於身丹之砂汞俱生鉛內情性於人非外物也砂汞與鉛非雜類也是知日月升降陰陽往來皆在天地之中也故乾坤精髓常聚於雞足山中玄寘之內而爲大藥之祖宗金丹之根蒂也夫日有三照月有三移日月出於東而光曜於西則西方白虎金德之正氣入於玄寘之內化而爲六戊日月入於西而光曜於東則東方青龍木德之正氣入於玄冥之內化而爲六己日月當於午而光曜於北則是南方朱雀火德之正氣入於玄冥之内就土成形化而爲黑鉛常居杳冥之內爲天地萬彙之根本故魏眞人云日潛德而沉彩月施德以舒光日受月化體不虧傷是知眞元一氣乃生天生地之本也古之至人知神物隱於此遂假法象採之而爲藥之父母擬乾坤而爲神室立鼎器以象雞足取符火準則四時還返金水合於自然運陽火以還日精轉陰符而來月魄使三方之正氣並歸金鼎之中以四象之至和咸結杳冥之內混混相交經營鄞鄂以至丹成皆稟自然之變化也今之學者謂世間之水銀可以爲金丹世間之黑鉛可以爲河車使後來皆謬妄相傳以虛爲實多方制度至老無成且水銀出自朱砂之內因火化而成其理只名水銀終不能成金液也殊不知金液者稟天地自然之氣憑陰陽純粹之精附陰於月爲陰之主伏體中宮潛當戊己爲至藥之父母豈有世間水銀及山澤五金八石比並於神藥之父母哉神藥是度世延年之寶天地萬靈之祖世人甚難識之後學以諸類雜物製造金液實錯會古人之意若使雜物可造金丹則金丹容易得成所云鉛汞二名者古人直説物象後人不解其意以朱砂便爲鉛以水銀便爲汞此乃以假物合爲眞名亂其根本所以千舉萬敗終無成理前所論眞鉛出產者並是依經節錄合於師旨非敢臆說以誤後學好道之士幸留意焉制由王者章第三制由王者武以討叛文以懷柔土旺四季土德以王提劍偃戈以鎭四方臣道註曰制由王者武以討叛文以懷柔者制令也猶王者出令以布四方也武剛猛火候也文柔弱火候也喻金鼎堅備神室密固初進柔順之火以來陽和之氣令住鼎室之中末行剛猛之火金液須欲迸出爲坤宮所拘遂留精於内以成造化猶國有叛逆之民被王者防制有方革心聽命故不能逃逸也土旺四季土德以王提劍偃戈以鎭四方土德者戊己眞土也眞土者眞鉛也眞鉛能召至和之氣歸於中宮故靑龍白虎朱雀玄武四象之氣不得眞土終不得成金液也土居中宮故稱黃帝和氣隨四時而生萬物皆有之神室爲和氣之主旺於四季能收攝日月之精華歸於鼎中不使流散於外也參同契曰土旺四季羅絡始終是也臣道疏曰王者治天下也内修文德外治武備法三皇而設百僚順四時而播五穀故得國內安康和氣生焉古人以治天下之理而制金液神丹初下手之時必須神室神室之内而有胞胎胞胎之外而有金鼎金鼎之外而有壇竈若一一全備則使金液之精生焉至和之氣合焉王者體中宮神母能伏流珠不使飛走文火發生之火武火結實之火能使金液成就也昔公孫氏生升之後配爲中央土德是和氣從中而生復又羅絡四季包裹金水和合流珠漸成神藥也姹女流珠飛走之物不常定處惟是土一未可以制之返成變化自然之道也坎離數一二章第四坎離數一二南北獨爲經故冠七十二石之長臣道註曰坎離數一二者天一生水於坎故一數主之也地二生火於離故二數主之也南北獨爲經者北方陰極之所而生陽氣之始厯子丑寅卯辰巳而終巽南方陽極之所而生陰氣之始厯午未申酉戌亥而終乾陰陽二氣皆從子午爲發生之始終故南北獨爲經者也故冠七十二石之長者眞鉛先天而生氣後天而成形故爲眾物之長還丹之根蒂也臣道疏曰人間之術稱玄妙者莫不以燒金煉銀爲世寶每見修制者萬無一成縱使有成者且非出世之寶又非延年濟世之術今世學道之士不以性命爲急皆迷迷相指終無省悟之理殊不知大丹之道全在陰陽二氣相須而成至藥故眞人丹砂訣云煉寶者合於至妙煉妙者合於至靈煉靈者合於至神煉神者合於至道如此至言則可以知金丹之眞僞妙理之淺深若不遇至人秘訣豈能悟解眞詮爲出塵之士哉夫坎離卦象乃離火坎水南北二位爲水火根本須則分爲二體本同一源而生旣分爲二各稟性情爲一有無二矣至人於此知是天性自然非假合之所及卻以二象配合爲一煉成至寶服之長生天產二物都無雜類實日月之精華乃乾坤之骨髓也易曰天垂二象聖人則之此乃返本還元自有爲而合無爲也故水火坎離升降南北獨爲丹首而冠七十二石之長悟天地生殺之機日月循還之方則有無之性自可曉也剛柔有表裏章第五剛柔有表裏陰陽稟自然金火當直事金水相含受雌雄併一體用之有條理臣道註曰剛柔有表裏陰陽稟自然者乾陽爲剛坤陰爲柔互相包裹配合神室使陰陽自然之氣日月施化之精輻輳金胎而結神藥也參同契曰乾剛坤柔配合相包是也金火當直事金水相含受者外則水火頻施內則金水常交木汞生靑龍之體金精長白虎之胎萌芽漸兆金木留形神室之內金水旣交之久而神水自生於母胎之中以至丹成子母兩相慕戀金水自然滋養也雌雄併一體用之有條理者雌雄亦龍虎也乾坤也日月也陰陽也坎離也夫妻也水火也男女也雌雄相雜則變化精氣爲物也若用之得理則發生自然也臣道疏曰男屬離卦太陽日之象也女屬坎卦太陰月之象也日月相交金水自生情性相得配合自然更無外物若以雜類而合神藥卽非自然之性也只如男至弱冠女至笄年兩情相慕亦是自然而然也古人將此喻大丹與人無異皆自然之性也砂汞在鉛體中因水火激發而有非外物也嬰兒在母腹中亦自水火而有亦非外物也古人知此二種情性根本不相去離因引合龍虎之精還返金水之氣自然成其至藥則一陰一陽之謂道若非自然則不可合也譬男女二精氣交體合日往月來自然變化豈假他物而成胎孕以此則神藥必在乎離火坎水二象而成不在雜類也由是以知日月眞精煉成金液與男女胎孕之理實同但有仙凡凈穢之異爾至人恐後學不悟眞理故引此爲證其餘法象自可知也變化旣未神章第六變化旣未神終能復更始初九爲期度陽和准旦暮周厯合天心陽爻畢於巳正陰發離午自丁終於亥臣道註曰變化旣未神終能復更始者凡修大丹須一月而成若火數不准鼎器不密則神精降少金液結遲須還一月也參同契曰旣未至晦爽終則復更始是也初九爲期度陽和准旦暮者每遇晦朔之夜子時陽火將興便名地雷復卦陽爻生坤初九爲下也自子至巳爲早爲旦自午至亥爲暮爲晚旦以屯卦直事暮以蒙卦直事屯蒙二卦以直一日十二時也爲大丹之體象也一日兩卦一月六十卦初則屯蒙終則旣未參同契曰日辰爲期度動靜有早晚是也周厯合天心陽爻畢於巳者陽火自子而升至巳爲陽極而陰生於午也參同契曰春夏據內體從子至辰巳是也正陰發離午自丁終於亥者陰符自午而降至亥爲陰極而陽火復生於子也參同契曰秋冬當外用自午訖戌亥是也臣道疏曰大丹變化之道在乾坤二卦爲首陽火起於子陰生於午陽極乾於巳陰極坤於亥乾坤十二爻隨十二時而變化以造金液也或有造大丹視爲等閑之事妄意爲之以至費耗貨財形枯骨悴終無成期豈知至道包裹天地吐納陰陽運轉四時斡旋日月發現五行循環晝夜生育萬物皆稟至道之變化也至人知大道之根本可以度世乃法象天地攢簇陰陽採日月之魂魄合水火之靈氣修營至藥歸於自然千經萬論留示將來而學道之士尙不能信但只以有形有質之物假合造化終不合至理縱有成者亦不能令人返老還童久視人間或返成癰𤸚流血之害煉丹之士可不戒哉水火各一方章第七水火各一方守界成寒暑東西表仁義五行變四時如是則陰陽互用順三一而得其理臣道註曰水火各一方守界成寒暑者水陰也寒極於坎火陽也暑極於離各守一方而成冬夏也參同契曰賞罰應春秋昏明順寒暑是也東西表仁義五行變四時者東方屬木發生萬物之所故謂之仁謂之喜西方屬金肅殺萬物之所故謂之義謂之怒金木水火土五行之氣變春夏秋冬而正四時之象參同契曰爻辭有仁義隨時發喜怒是也如是陰陽互用順三一而得其理者若四象之數不失其時則陰陽之氣順水火寒暑各得其理也臣道疏曰日月運行寒暑有節日去則月來年移則嵗至以一嵗之氣蹙於一日十二時中排春夏秋冬以應四時之候運動法象一一須及時也日月之度不差寒暑之節有准則大丹必成矣法象纔動內以知來則精氣生於室中陰陽結於鼎內旣得陰陽精氣則鼎內潤澤自然流通漸生變化與四時應候故五篇云春以溫之仁也夏以暑之禮也秋以涼之義也冬以寒之智也若四時之氣順則一嵗之事成焉又春氣生物之本乃巳前陽火之候秋氣殺物之本乃午後陰符候也子丑寅爲春卯辰巳爲夏午未申爲秋酉戌亥爲冬於十二時辰內運其火候應以四時五行不得分毫差忒則鼎中漸結金液將凝其丹必成也故歌云聖人奪得造化意手摶日月開爐裏微微騰倒天地精攢簇陰陽走神鬼則知金液神丹若非法象天地準則陰陽造化自然者則無成矣神室設位章第八神室設位變化在乎其中矣神室者上下釡也設位者列雌雄相合之密也變化爲砂汞砂汞者金土二用二用無爻位張翼飛虛危往來旣不定上下亦無常獨居不改化歸中宮非土不可制也包囊眾石爲丹祖宗臣道註曰神室設位變化在乎其中矣者立神室象天地天地定位則日月之光曜其中矣參同契曰天地設位易行乎其中是也神室者上下釡也神室有上下兩釡以應天地也參同契曰天地者乾坤是也設位者列雌雄配合之密也設天地乾坤二位上釡象天爲雄爲乾下釡象地爲雌爲坤使上下兩釡雌雄之際配合而爲一也參同契曰設位者列陰陽配合之位是也變化爲砂汞砂汞者金土之二用也立鼎器法乾坤金母居中三才備具則生靈汞也砂汞乃坎離水火爲乾坤二用參同契曰易謂坎離者乾坤二用是也二用無爻位張翼飛虛危者乾坤也日月也日月升降火水抽添不拘爻位張翼南方危天之位虛危北方坎水之位參同契曰二用無爻位周流遊六虛是也往來旣不定上下亦無常者水火往來神室之內不常定處也參同契曰往來旣不定上下亦無常是也獨居不改化歸中宮者若火數抽添有理則時時化入中宮而爲金液也參同契曰幽潛淪匿升降于中是也非土不可制包囊眾石爲丹祖宗者中宮神室以眞鉛制造故稱土德也包囊萬彙爲金液祖宗也參同契曰包囊萬物爲丹祖宗是也臣道疏曰大丹之道全在鉛銀與砂汞二物砂汞乃日之精鉛銀乃月之華修金液之方不出天地玄象之中前篇所論亦甚曉然猶恐學者不悟所以時時比喻如言下曉了則砂汞不勞而可得也且鉛之有砂汞由人之有情性情性發於中而應於外非外來也砂汞生於中而現於外亦非外來也情性二用並在身中砂汞二名俱隱鉛內人用情性則發於外鉛有砂汞則營於內然則機用須別其理同契至人之意分明指示用日月至精合而成藥不以雜物他類也有無相制章第九有無相制朱雀炎空紫華曜日砂汞滅亡臣道註曰有無相制朱雀炎空者有者虎也無者龍也有者白金也無者陰陽氣也以白金爲神室而未能自生變化因水火升降運轉四時乃得成丹故用空器而制有也朱雀乃神火薰蒸於下神室之內金液從火而生也參同契曰以無制有器用者空是也紫華曜日硃汞滅亡者紫華日月之精英在神鼎之內或化金華而現日月之光或變靈液而示龍虎之狀照曜鼎內化爲砂汞一消一息一浮一沉隨水火而或滅或亡也參同契曰故推消息坎離沒亡是也臣道疏曰上古之人以水銀一味而成丹者蓋有龍而無虎也而不假五行四象法天則地亦不會夫婦陰陽交男合女但取陰陽坎離之氣消長於一身之中龍虎之精滋育於九竅之內信任自然而合大道上古皆長夀無夭殤也中古以來若欲卻老還童延年度世升眞入妙必須安爐立鼎召天地至和之氣囘日月英靈之華使四家無虞五行全備九轉數終三千時足開爐則紫粉凝霜金華曜日服之長生後天而老况今之人知虎者多識龍者少夫金液爲靑龍東方木德之宗卽日也黃芽爲白虎西方金液之祖卽月也此二物之精氣者皆有神通變化之理故經云日月之精救者殘是也製之得法食之亦能變化也所謂丹之變化者丹砂變爲水銀乃陽返陰也水銀復變爲丹砂乃陰返陽也方號純陽之丹而人服之决得長生聖人喻日月魂魄只在坎離二位更無別物恐後不得眞理故直言之以示將來耳訣不輒造章第十訣不輒造理不虛擬約文伸奧扣索神明演成卦爻五行爲經坎雄金精離雌火光金木相伐水火相剋土旺金鄉三物俱喪四海輻輳以致太平並由中宮土德黃帝之功臣道註曰訣不輒造理不虛擬者聖人垂文於世必無苟作妄言以妄後人參同契曰言不苟造論不虛生是也約文伸奧扣索神明者剪去繁蕪撮其樞要驗日月之妙理符神明之至精參同契曰引驗見效校度神明是也演成卦爻五行爲經者體周易六十四卦以爲火候依金木水火土五行以爲生殺以日月相合而證夫婦以坎離相交而來至精參同契曰推類結字原理爲證是也坎雄金精離雌火光者坎藏六戊爲月之精雄陽之位居於北方月陰也戊陽也乃陰中之陽象水中之生金虎也離藏六己爲日之光雌陰之位居於南方日陽也己陰也乃陽中之陰象火中之生汞龍也參同契曰坎戊日精離己月光是也金木相伐水火相剋者金白金也木赤汞也二物相伐愈自榮盛水火遞剋大見光明日月相交剛柔互興陰陽得理則相謀合參同契曰日月爲易剛柔相合是也土旺金鄉三物俱喪者金木火三物被四時尾火包裹經九轉之後俱化爲明窗塵參同契曰土旺四季羅絡始終是也四海輻輳以致太平者呼吸四方之氣輳歸神鼎之中引龍虎之精而爲至藥以五土而終功以四季而結裹故得赤靑黑白各得施其功成就神丹也參同契曰靑赤黑白各居一方是也並由土德中宮黃帝之功者中宮土德乃戊己至和之氣金液變化之道皆稟戊己也戊己居中宮故稱黃帝修神丹者採日月之至精合陰陽之靈氣周星數滿水火運終盡歸功於土德黃帝之功也參同契曰中宮所稟土德黃帝之功是也臣道疏曰上古之人言不虛發訣不再傳事成之後書之於契以引將來好道之士况文字所傳只說大意今直指大藥之源者故令後人不用世間朱砂水銀之類若得玄妙法象隨天地陰陽四時運動而得成丹者卽是眞陰眞陽也陰符經云天機張而不死得此道者不可妄傳非人參同契曰欲寫之竹帛惟恐洩天符猶豫增歎息俛仰發思慮是也鍊至藥不出水火水火旣交則鼎中龍虎之氣便相和合而成金液故眞鉛實金丹之父母靈汞之祖宗也化生萬類毓養羣生皆稟此而成也旣得眞鉛定體而又知水火眞方則大丹豈無不成之理乎金火者鉛也章第十一金火者鉛也丹砂著明莫大乎金火言窮微以善化陽動則陰消混沌終一九寶精更相持卦與藥合金有三百八十四銖銖據一斤爲十六兩也金精一化二氣成丹靑龍受符當斯之時神室煉其精金火相運推雄陽翠玄水雌陰赭黃金陰陽混交接精液包元氣萬象憑虛生感化各有類眾丹之靈迹長生莫不由臣道註曰金火者眞鉛也金火二字是日月之精金爲月之本火爲日之根皆生於鉛中魏眞人以金火爲易以易爲藥也參同契曰易者象也丹砂著明莫大乎金火者丹砂乃金液也金液大丹一法唯憑日月之精以成也金者鉛也月者水也砂者汞也日者火也外則水火升降內則鉛汞交結除此之外別無雜類可入也金砂變化全在日月之精華而生參同契曰懸象著明莫大乎日月是也言窮微以善化陽動則陰消者古之人窮其微妙察其盛衰使陰陽之氣往來動靜循環晝夜周而復始參同契曰窮神以知化陽往則陰來是也混沌終一九寶精更相持者坎離龍虎之氣混沌於神室之中隨水火進退下手之初一宮坎位火數發生之初精氣相交未乃有變通至已之巽位火數發生之極則龍生汞而虎生鉛鉛汞之精漸萌而鼎內日月之氣輪轉於外水火之精卷舒于內參同契曰輻輳如輪轉出入更卷舒是也卦與藥合金有三百八十四銖銖據一斤爲十六兩也者卦有三百八十四爻周天一嵗之數總火候一周之用金有三百八十四銖金母一斤之數總大丹一斤之用其火候金母皆相符合也參同契曰易有三百八十四爻據爻摘符是也金精一化二氣成丹靑龍受符者太陰金虎之液太陽木龍之津化爲眞丹晦朔起符之初靑龍火神當權震卦主之參同契曰晦至朔旦震來受符是也當斯之時神室煉其精金火相運推者正當靑龍受符行火之時神室之內龍虎之氣相紐金火之精相合而化神丹也參同契曰當時之際天地交其精日月相撢持是也雄陽翠玄水雌陰赭黃金雄陽也乾也天也老陽也日也砂也其精曰玄水又曰雌汞也雌陰也坤也地也老陰也月也鉛也其精曰黃金又曰白金日月相交於鼎中則日化玄水而月化黃金也黃金卽眞鉛玄水卽眞汞也鉛汞交而爲一一乃成丹參同契曰雄陽播玄施雌陰化黃包是也陰陽混交接精液包元氣者陰陽龍虎之氣在混沌之中承水火交感互相變化而生津液爲丹根基也參同契曰混沌相交接權輿樹根基是也萬象憑虛生感化各有類者世間萬物皆憑元氣而生各遂其願而附其形也如在鼎中則木之氣化龍金之氣化虎火之氣化汞水之氣化鉛土之氣化和而五氣皆歸中宮長養鄞鄂以至凝神成眞是各遂其類凝而成眞也參同契曰經營養鄞鄂凝神以成軀是也眾丹之靈迹長生莫不由者金液大丹有二十四品唯此丹是金液之大丹者乃是白日冲天之上道一一明象天地日月星辰五行四時歸於神室之中變化金液長生之道莫不由也參同契曰眾夫蹈以出蠕動莫不由是也臣道疏曰金火卽鉛火也鉛火卽水火也金火相交則丹砂生於金液之中古之人所秘者火候而已火數如一斤母數亦一斤以母一斤之數拆之爲三百八十四銖以火一斤之數拆之爲三百八十四爻以應一年六十四卦之數故乾之策二百一十有六坤之策一百四十有四引而伸之觸類而長之也萬有一千五百二十以應萬物之數合天地一周之用古人法象天地準則陰陽用水火之升降合金木之性情備剛柔之體用成大道之造化其乾坤策爻一一演火候大丹之數顯金木水火土之精微者天之符也所修至藥運動火候皆應天符之數也若將年月日時之數蹙於一日十二時中進退陽火陰符以煉金液神丹則造化之理立可得也於是玄潤光澤章第十二於是玄潤光澤元君始煉汞神室含洞虛玄白生金公巍巍建始初冠三五相守飛精以濡滋臣道註曰於是玄潤光澤元君始鍊汞神室含洞虛者黑鉛制爲白金精光潤徹方成神室之體中虛徑寸以生眞汞也元君乃煉金丹之主司抱朴子曰元君亦自言我亦煉丹而得仙伏羲畫八卦仲尼演易象皆明此天地之數也參同契曰於是仲尼贊洪濛乾坤昭洞虛是也玄白生金公巍巍建始初者玄生白金也故能收養日月之精華陽火未動俱隱於白金之內而不見形迹水火旣形則金華產於白金之中金華乃戊己之和氣也二物相見感化生丹可謂巍巍尊高也稽考古初已有斯物包裹陰陽與萬物之形不相去離關雎之義水火相交則砂汞生焉神明出焉故爲萬物之母爲陰陽之始也故參同契曰稽古當之精鼎器之類初是也冠三五相守飛精以濡滋液也於眞砂水三也五土也若水火土相交則神精降於鼎器之中故古聖人剏立神室旣濟鼎器交男女之體合龍虎之形初則形質未分一如混沌旣經運火之後則夫婦之精相紐龍虎之情契合便應元年稽首之初終成神藥也參同契曰冠婚氣相紐元年乃芽滋是也臣道疏曰元君亦煉丹而得仙者上古之祖師也擬天地之數約日月之行以鼎器則象乾坤中虛寸餘以安靈汞法象如動卽天氣降地氣應天地至精相交而生神液也巍巍尊高實爲玄妙也古仙得道者恐後人不悟眞理以朱砂水銀諸雜藥物而造大丹不明於眞鉛之變化是以取象立言以曉學者若雜類爲之是猶入山捕魚龍入水求雉兔皆無可得之理徒勞力耳玄女演其序章第十三玄女演其序戊己貴天符天符道漸剝難以應玄圖臣道註曰玄女演其序戊己貴天符者玄女乃天地之精神陰陽之靈氣神無所不通形無所不類知萬物之情曉眾變之狀爲道教之主也戊己乃和氣太丹之根本天符運動則生戊己之精也參同契曰聖人不虛生仰觀顯天符是也天符道漸剝難以應玄圖者天符進子陽火日增至巳而陽極天符退午陰符日滅至亥而陰極五行剋盡四時運終故道漸剝也參同契曰天符有進退屈伸以應時故易統天心是也臣道疏曰玄女亦上古之神仙爲眾仙之長戊己土也天符火也火乃元氣也大則包涵天地小則濳藏一毫萬萬靈類莫不霑其元氣廣大包籠濳布生育刑剋金水運轉陰陽榮瘁萬物變化無方有至大之妙用眞人假此神化營修至藥採日月之至精合温良寒暑抽添水火依春夏秋冬隨順四時盛旺榮衰皆稟自然也若以金銀草木灰霜而造金液神丹安有如此變化哉
