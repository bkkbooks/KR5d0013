front:
  text: 金碧古文龍虎上經卷中
  hash: sha256:2ef6cfca66e918ba985212408cd2d715486ef37e7ca0fe8e2dd82095f8de1889
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0013_YP-C_08douji-04-0063a, image: JY112/08douji-04-0063a.png}
body:
  text: 保義郎差充皇帝少傅恩平郡王府指揮使臣王道註疏太乙宮養素齋道士臣周眞一印証故演作丹意章第十四故演作丹意乾坤不復言丹砂流汞父戊己黃金母鍾律還二六斗樞建三九赤童戲朱雀變化爲靑龍臣道註曰故演作丹意乾坤不復言者前篇言大丹之意置立神室妙盡其理故於此篇不復言也丹砂流汞父戊己黃金母者丹砂日也流汞日之魂也戊己月也黃金月之魄也丹砂戊己能生此二味魂魄而爲至藥故謂之父母也鍾律還二六斗樞建三九者二六者乃子寅辰午申戌爲六律丑卯巳未酉亥爲六呂又子爲黃鍾午爲㽔賓之類主十二時也三九一十二也斗之所指爲建正月建寅二月建卯經厯十二辰也參同契曰消息應鍾律升降據斗樞是也赤童戲朱雀變化爲靑龍者赤童日也朱雀火也火旣運動則日生汞於神室之中故名爲靑龍也古詩云五行顚倒述龍從火裏出是也臣道疏曰夫太極生兩儀兩儀生四象四象生八卦八卦定吉凶故乾天也其靜而專其動而直坤地也其靜而翕其動而闢故經云乾坤天地之體坎離天地之用道生天天生地地生萬物是以乾坤動靜生乎萬物者也天也者虛也陽也剛也日也父也地也者實也陰也柔也月也母也自虛而下皆地也自實而上皆天也是以虛實皆通而有六爻之變故乾用七九坤用六八也四象之數通乾坤之數而老少陰陽之策見矣四而通六得二十四故爲老陰一爻之策四而通八得三十二爲少陰一爻之策四而通七得二十八爲少陽一爻之策四而通九得三十六爲老陽一爻之策四變之策乾坤之成數也六九之變六爻之生數也以老陰老陽九六隨乾坤二卦爲變而老陰少陽七八不入也乾有六爻而地得其三坤有六爻而天得其三乾坤二卦爲天地變通之體常混而爲一布於六虛之內隨陰陽二氣升降變化於六爻之中方其乾之動也直而不屈陽火赫赫發乎地下變坤下爻而爲復是曰初九爲陽六爻之主微陽方生二變爲臨陽氣方行三變則陰陽交通而成泰萬物萌甲破地而出四變爲大壯萬物叢生五變爲夬則萬卉見眞以至上九變爲純乾陽光熹熹遍布卯酉之南草木茂盛陽光升於上五色曜於首井泉若氷是爲乾卦周是之時也方其坤之動也闢而不塞陰靜肅肅發於天上變乾下爻而爲姤是曰初六爲陰六爻之主微陰方生二變爲遁陰氣方行三變則陰陽不通而成否萬物成實結而垂下四變爲觀萬物衰落五變爲剝則萬卉歸藏以至於上六變爲純坤則陰精凜凜遍布卯酉之南草木萎黃陰精沉於下五色藏於根井泉若温是爲坤卦周是之時也故經曰日入地中結精之象再變爲復發生萬物者也是知乾坤二體隨陰陽之氣以變動升降於六虛一晦一明循環晝夜日往月來如環如端而莫知乎紀極也惟一味元和之氣以成變化爾上古至人知天地之消息陰陽之舒慘故托易象法乾坤准陰陽擬水火召天地至和之氣引日月純粹之精歸於神室之內以變金液點化凡軀而作聖體功德備具位號眞人孰不謂之神乎坤初變成震章第十五坤初變成震三日月出庚東西分卯酉龍虎自相尋坤再變成兌八日月出丁上弦金半斤坤三變成乾十五三陽備圓照東方甲金水温太陽赤髓流爲汞姹女弄金璫月盈自合虧臣道註曰坤初變成震三日月出庚者朔前夜半子時運行陽火之初日月合璧於昴畢之上乾交坤之下爻而爲震卦震卦主事一陽爻生於下則月至三日現於庚方也參同契曰三日出爲爽震受庚西方是也東西分卯酉龍虎自相尋者東西二八之門日月出入之方金水正位旣經五日運行火候則龍虎之氣兩相慕戀聚於鼎中也坤再變成兌八日月出丁上弦金半斤者自六日至八日成上弦乾交坤之二爻爲兌卦主事二陽爻生於中則月光得半弦平如繩而月現於丁方喻鼎中金火各半也參同契曰八日兌受丁上弦平如繩是也坤三變成乾十五三陽備圓照東方甲者自十三日到十五日乾交坤之上爻而爲乾卦主事三陽爻生於上則月光圓滿而月現於甲方喻鼎中金德圓滿得火候也參同契曰十五乾體就盛滿甲東方是也金水温太陽赤髓流爲汞姹女弄金璫月盈自合虧者金液神丹至此太陽之精盛滿神室之內金火之氣而化爲汞汞與其母兩相留戀以變金體蟾蜍免魄互相包裹光曜鼎中姹女之體自成首飾化現金璫喻鼎中金色漸榮而變成丹參同契曰蟾蜍與兔影漸榮而變成金丹參同契曰蟾蜍與兔影炳煥兩氣俱蟾蜍視卦節兔魄吐生光是也太陰自初一日至十五日光滿至十六日自合虧也參同契曰七八到已訖屈坤降是也十六轉相減章第十六十六轉相減乾初缺成巽平明月現辛乾再損成艮二十三下弦下弦水半斤月出於丙南乾三損成坤成坤三十日東北喪其明月沒於乙地坤乙月旣晦土木金將化繼坤生震龍臣道註曰十六轉相減乾初缺成巽平明月現辛者謂十六日以後坤交乾之下爻而爲巽卦巽卦主事一陰爻發生於下陽火初退陰符始生平明則月現於辛方也亦如陽火初進之時月生三日同也參同契曰十六轉受統巽辛現平明是也乾再損成艮二十三下弦下弦水半斤月出於丙南者自十六日陰符退至二十三日坤交乾之中爻而爲艮卦艮卦主事二陰爻生於中則月現於丙方復與上弦同義蓋鼎中金水各半也參同契曰艮直於丙南下弦二十三是也乾三損成坤成坤三十日東北喪其明月沒於乙地者自二十六至二十八日坤交乾之上爻而爲坤卦坤卦主事三陰爻生於上月光將盡則月現於乙方至於東北陽光旣盡是謂喪明也參同契曰坤乙三十日東北喪其明是也坤乙月旣晦土木金將化繼坤生震龍者自二十八日至三十日陰符到此消盡陰陽之氣各停土與金木相合爲液六陽之氣不合於月太陰之體全黑循厯東北再經昴畢之上日月相合水火重施復如其初又以復卦爲首繼坤而生震卦也震屬水位在東方故稱龍也又陽火爲龍參同契曰節盡當禪與繼體復生龍是也臣道疏曰自子至巳陽火六時而爲進震兌乾主之太陽行度爲金液之象也復臨泰壯夬乾爲太陽行度陽火之象也自午至亥陰符六時而爲退巽艮坤主之太陰行度爲金液之象也姤遁否觀剝坤爲太陰行度陰符之象也鼎中金水之變十二爻十二時主之天上月華之動六卦十二時主之參同契曰言之甚詳但人不能洞察之耳修眞之士欲煉此大丹必上知天文下知地理中知人情方能變通造化手握陰陽運日月於爐中而孳生龍虎交乾坤於室內而長養精神金母無虛育之勞木父有成功之逸金液化現砂汞成形九轉數終陽光變是黃轝立號明窗塵不唯點石化金服之與天齊老變化之妙無以加矣乾坤括終始章第十七乾坤括終始故曰震龍也如上三十日坤生震兌乾乾生巽艮坤八卦布列曜運移不失中臣道註曰乾坤括終始故曰震龍也乾坤二卦爲眾卦之父母二卦相索而成八卦乾先索坤之下爻而爲震卦以爲朔自一日夜半子時陽火發生之始坤又索乾之下爻而爲巽卦自十六日夜子時陰符發生之始也乾納甲壬坤納乙癸參同契曰壬癸配甲乙乾坤括終始是也如上三十日坤生震兌乾乾生巽艮坤者坤生震卦而爲初五日直符坎生兌卦而爲中五日直符又生乾卦而爲末五日直符太陽立十五日圓滿於甲上鼎中金液亦盛蓋隨卦後而增也乾生巽卦而爲初五日直符坎生艮卦而爲中五日直符又生坤卦而爲末五日直符太陰立十五日光盡於東北艮鄉鼎中金液盛實亦隨卦後而成也乾坤自相生滅爲三十日一月之候也參同契曰七八數十五九六亦相應四者合三十陽氣索滅藏是也八卦布列曜運移不失中者如上八卦布列於一月三十日中運動陽火陰符一一輳歸神室之內爲大丹金液之變化參同契曰八卦布列曜運移不失其中也臣道疏曰人之一身亦體天地其中陰陽升降亦與造化之符契但以六慾七情發之於外而精氣耗損於內終日汨汨不知省覺也能知此道隨順陰陽恬淡守素則天地外交而身中內合一一皆應其升降若少思慮無𢦤賊亦自然延年矣况安爐立鼎法象天地召日月之至精引陰陽之和氣成神藥而服之安得不爲仙哉造金液者須知乾坤八卦約一月三十日行度之數日行一度而月行十三度雖一月一終終而同宮謂之合朔日行三十度月行三百九十五度厯十二月再與日合於斗宿之上爲冬至之日也故至人以日月躔度之數爲一月運火之期前十五日震兌乾主之後十五日巽艮坤主之坎離定位陽火陰符隨時進退皆依約爻象也調火六十日章第十八調火六十日變化自爲証神室有所象雞子爲形容五岳峙潛洞際會有樞轄臣道註曰調火六十日變化自爲証者元精在鼎中難覩其狀如一月數終開鼎視之或金華降少玉液結遲乃陰符陽火有太過不及之患再須一月運行結丹之火候也故元精在鼎中受外來符火一一變化難覩其狀以十二時爻象火候卽知其動靜沉浮參同契曰元精渺難覩推度效符證是也神室有所象雞子爲形容者古之至人仰觀天象俯察地理效乾坤而立神室類雞子而法形容虛中一寸以安靈汞參同契曰虛則觀其象推擬其形容是也五岳峙潛洞際會有樞轄者地上靈山分爲五嶽其中皆相潛通古人立表以爲象制壇爐鼎竈符合玄法委曲相通而使火氣通達無所凝滯若火候散於外則吉凶生於內參同契曰立表以爲範占候定吉凶是也臣道疏曰天地未分象若雞子天地旣分陽火升於上而輕淸之氣結而爲天陰水沉於下而重濁之氣結而爲地是謂天地定位也神室者上釡爲天下釡爲地兩釡相合其形若雞子中虛寸餘是謂神室定位也天地交則水中生火而升火中生水而降相交於眞土之內而生藥物神室交則火自坎生水自離降相交於戊己之內而生靈汞玄妙神秘可知也發火初温微章第十九發火初温微亦如爻動時上戴黃金精下負坤元形中和流素津參合考三才乾動應三光坤靜含陽氣臣道註曰發火初温微亦如爻動時者凡神丹起火皆依約爻象與十二月同爲消息如地雷復卦主冬至之令下一爻變爲陽子時之爻也於此時發火未甚有力但温温然是謂柔火以應復卦下一陽爻初生之候也參同契曰發號順時令勿失爻動時是也上戴黃金精下負坤元形者黃金乃乾天也上釡也坤元乃坤地也下釡也二釡相合而爲神室也參同契曰上察河圖文下敘地形流是也中和流素津參合考三才者旣神室有位則素津靈汞生於其中矣中宮之靈亦喻人心神之所居也故天地人全則萬物名焉金木作焉參同契曰中稽於人心參合考三才是也乾動應三光坤靜含陽氣者乾天也日也火也乾元運動而木火之精便生於空虛之中而作金液也坤地也月也水也坤元靜居而月水金之精和合太陽流珠而又包裹不致飛走也參同契曰動則循卦節靜則象爻辭乾坤用施行天地然後理可不謹之乎是也臣道疏曰日爲離位在南方居丙丁之中火之正位也日又含火火又變體成汞故曰汞生於日汞者陽也謂之陽魂也離卦二陽一陰以己土爲其神又是坤之中女日又用己土爲其光已者陰位也故以其象配離卦又爲日中之光含其玄色爲朱從靑變赤故爲硃砂也月屬坎位在北方居壬癸之中水之正位也月又含水又變體成金故云金生於月金者陰也謂之陰魄也坎卦二陰一陽以戊土爲其神又是乾之中男月又用戊土爲其精戊土者陽位也故以其象配坎卦又爲月中之精含其素色爲黑從白變黑故爲黑鉛也汞含離氣以應陰爻之位汞之一物非世間水銀及硃砂等物本生於太陽之內離名曰水神是謂眞汞也鉛含坎氣以應陽爻之位鉛之一物非嘉州鹹鉛及諸岩間所生者本生於太陰之中坎名曰白金是謂眞鉛也鉛分爲二二儀神室也汞生於一一氣玄液也以象三才爲天地人也
