front:
  text: 金碧古文龍虎上經卷下
  hash: sha256:0987ae1a41f49d9c09b04d461cac14781e86cc8f33285a244059e622f6dbe011
body:
  text: 保義郎差充皇弟少傅恩平郡王府指揮使臣王道註疏太乙宮養素齋道士臣周眞一印證神室先施行金丹然後成可不堅乎鍊化之氣包裹飛凝開闔靈戸希夷之府造化泉窟臣道註曰神室先施行金丹然後成者旣立神室而得其法則金液有必成之理也可不堅乎煉化之氣包裹飛凝者鍊丹之士必須先堅備鼎器使其中靈汞結凝不得飛走方可成丹也開闔靈戸希夷之府造化泉窟者神室有上下之釡開則爲二闔則爲一其中虛空水火纔交神物便生故號希夷白金爲丹而生水銀號曰金液此丹之府庫窟穴也臣道疏曰北方之水生成白金謂之眞鉛乃至陰之精包含陽和隨混沌分判之氣各歸一元古之至人法象天地生成之道還陽和之氣於眞鉛之中合自然之用制成大藥此則眞元之氣也非世間凡物可爲若修煉之得法制度有理則何患不成大丹乎龍虎二物俱生鉛中因水火升降致使金木交希夷之府日月會造化之窟白金爲母包裹眾靈而產至寶矣陽氣發坤日晷南極五星連珠日月合璧金砂依分呼吸相應臣道註曰陽氣發坤日晷南極者亥月之末純坤卦終至子月之初夜半子時坤卦下生一陽爻爲復卦乃陽火所生之時也至丑厯寅以至於巳陽氣至南方極勝則陰生於午也五星連珠日月合璧者五星運行周天有若連珠遲疾留伏逆順進退也日月躔度一月一交其合璧與五星共爲表裏以證金火一嵗之用也金砂依分呼吸相應者金砂乃日月之精也水火升降一消一息則金砂在鼎中一浮一沉隨象呼吸與外來符火相應也臣道疏曰眞鉛母也坤也太陰之體常黑遇陽火而方生形質形質旣生而厯六十四卦逐三百八十四爻變化萬狀皆隨日月五星行度之數也若以雜類爲丹則安得隨陰陽四時而生乎華蓋上臨三台下輔統錄之司當密其固詰責能否臣道註曰華蓋上臨三台下輔統錄之司當密其固詰責能否者華蓋十六星其形如蓋在紫微宮中以應帝座三台六星在紫微宮外主調順陰陽爕理萬物踰水火居金鼎上下若爕調得理則神精降內三台爲統錄之司百僚之帥宰相之任又曰文昌也或五星盈縮失次日月進退失節則四序不應風雨不時是致萬物不生亦猶鍊丹之士運行失節使鼎或乾或溢變異不常必敗丹事若總諸節候如運諸掌固密鼎器不使有虞若一不理則詰責運符之能否也參同契曰文昌總錄詰責台輔百官有司各典所部是也臣道疏曰世之學道者多矣然得妙理者萬無一二或假其名以資奸利或燒變黃白勾合庚艮者有之或妄指古文修煉五金八石以僥倖大藥費嵗月耗精神終無成效愚者益其過智者損其行躭執至死曾不悔悟迷迷相傳無有休止至有失其職業散其貨財失其父母之養割妻子之愛漂流凍餒世世有之殊不知金母大藥非凡鉛凡汞所作乃天地之精神日月之魂魄何患不造其閫域耶火煉中宮土金入北方水水土金三物變化六十日自然之要先存後亡或火數過多分兩違則或水銀不定同處別居剛柔抗衡不相涉入非火之咎譴責於土臣道註曰火煉中宮土金入北方水者火日也金月也金火二性順五行六律之氣而生故火生土金生水各吐其精而爲神藥也參同契曰日合五行精月受六律紀是也水土金三物變化六十日者中宮只有金母一味而水土二味得火候而和合若一月火候金液不依母數則再須一月起火也參同契曰五六三十度度竟復終始是也自然之要先存後亡者金液神丹全在火候火是藥之父母藥是火之子孫乃天地之氣自然而生也或火力停匀而生金汞或火力失度返致散失存亡不定必在六十日之內以度其始終也參同契曰原始要終存亡之緒者是也或火數過多分兩違則者陽火數多神氣返傷致使金汞驕溢亢滿鼎中違失範度也參同契曰或君驕佚亢滿違道是也或水銀不定同處別居者水銀乃金液也若火數差殊則水銀在鼎室之內隨火不定不依軌轍而行則或同或別生於不測也參同契曰或臣邪佞行不順軌是也剛柔抗衡不相涉入非火之咎譴責於土者金砂不依數生剛柔不相涉入非特火之過也亦是中宮金母不純而精氣少失必在此故不責火而責土也參同契曰弦望盈縮乖變悔吝執法刺譏詰過移主是也臣道疏曰鍊丹之士須明日月行度之數知陰陽升降之理曉火候之抽添辨藥物之眞僞方有必成之理兹實在於火候運符之人若昧于此執法不定卻言傳受不眞譏刺師言不能自悟也好道之士宜戒之焉爾土鎭中宮籠罩四方三光合度以致太平五臟內養四肢調和水涸火滅含曜內朗金木相瑩閉塞流輝調水温火發之俱化道近可求臣道註曰土鎭中宮籠罩四方者土者戊己也母也母居中宮召四方和氣歸於神室之內化成金液也參同契曰辰極受正喻金母蓋能優游以懷來臣庶也故曰辰極受正優游任下是也三光合度以致太平者三光則日月星也若三光進退而不失於上則天下太平令行禁止固無亂逆之患也丹之內運亦有三光蓋陽火陰水與金胎是象日月星也故外運亦有三光分在動靜爻刻之內陰陽符火之中若運符得理則無逃逸之害如治國之致太平也參同契曰克明正德國無害道是也五臟內養四肢調和者若運行符火盡合周天度數則鼎室之內眞人之身五臟四肢調和安順虛無恬淡以致於中故無傷夭之患也參同契曰內以養已安靜虛無是也水涸火滅至此二時金火之精氣各得其情光耀遍於一室之中朗照眞人之體也參同契曰原本隱明內照形軀是也金木相瑩閉塞流輝者龍虎之氣相交金木之情契合金來剋木木被金制反能瑩盛致使流輝鎖於鼎中靈根閉於室內皆自金母養毓而成也金母變化不常此之微妙非口訣難傳參同契曰閉塞其兌築固靈根是也調水温火發之俱化道近可求者金母在鼎內翕三光之氣來日月之精孳生聖胎其狀莫測而子株靈汞在於神室之中隱伏難見若水不失其時火不失其候水火俱進升降有法隨順天機樞轄法象則金汞自然而眷戀龍虎情性以交結擬象求之變化之理其道可見矣參同契曰三光陸沉温養子珠視之不見近而易求是也臣道疏曰夫人之理可以類推若三光之精未現四象之氣未分玄黃混沌淸濁未判眞鉛之氣混沌其中旣分淸於天用濁於地陰陽之和以爲人三才定位眞鉛之氣居於中央當戊己之位又爲神藥之母籠罩四方金木水火之氣而結爲金液也五行之中金來剋木木中有火火返剋金金火相剋互相瑩盛水來剋火火中有土土返剋水水土相配互爲變化此相生相殺之理皆在口訣不以書傳若以天道求之則一味元和之氣耳水土獨相配翡翠生景雲黃黑混元精紫華敷太陽水能生萬物聖人獨知之臣道註曰水土獨相配翡翠生景雲者水則玄水土則金母也太陽之火與金母相交則神室之內木精化氣而生景雲漸結流珠潤澤丹宮以化金液也參同契曰黃中漸通理潤澤達肌膚是也黃黑混元精紫華敷太陽者黃黑亦水土也水土之氣相制而生太陽元精若合法象始終得其妙理則太陽元精漸兆於有無之中以生鄞鄂紫華敷腴黃液蕩漾是神藥未堅實也參同契曰初正則終循幹立未可持是也水能生萬物聖人獨知之者水一數玄天生水而居於北方水中生金金復能生水聖人知之擬象而成神丹非凡愚可測也參同契曰一者以掩蔽世人莫知之是也臣道疏曰乾坤二體玄象包裹天一生水曰玄水地五生土曰眞土水土相交是生萬物聖人知此造化遂擬天地而立神室准陰陽而行水火依約爻象中遷四時則元精生焉神汞出焉金德尙白鍊鉛以求黃色焉感化生中宮黃金銷不飛灼土煙雲起臣道註曰金德尚白鍊鉛以求黃色焉者鍊鉛爲白金白金爲神室神室中有金水金水旣爲火所化而色變黃名曰黃轝參同契曰下有太陽氣復蒸須臾間先液而後凝號曰黃轝焉是也感化生中宮黃金銷不飛灼土煙雲起者金液將生隨水火凝於器中本從金生化而成液感結中宮則黃金之液自然不飛走也火灼金華渾氣淸徹或爲輕煙薄霧在鼎室之內變化無常或鍾乳倒懸或犬牙參錯或變化日月之象而魂魄皆現或化龍虎之形而金木相交精神萬狀不可名言若以五金八石諸類雜物作之者安能臻此神化哉臣道疏曰世間萬物不能壞者惟黃金耳自開闢以來唯金體不虧損故黃金之母曰眞鉛眞鉛者先天之一物混沌未判鉛氣在其中及天地分形鉛體亦現天地萬物若無鉛氣則不能成其妙用故眞鉛之氣靡所不在也且黑金生白金白金生黃金黃金生至藥若人服之則夀同天地與道同體故金德之精爲眾藥之主萬物之宗也有無互相制上有靑龍居兩無宗一有靈化玅難窺臣道註曰有無互相制上有靑龍居者有者白金也無者火氣也故有無之作互相制伏金水相交而生靈汞於中宮汞卽靑龍也參同契曰上閉則稱有下閉則稱無無者以奉上上有神德居是也兩無宗一有靈化妙難窺者兩無者陰陽氣也日月之魂魄也一有者亦神胎也神胎之中無諸雜物但空體而已因水火之氣引日月之精合陰陽之粹入于神胎金液靈化莫能窺測神室上下水火之氣金母翕育相須而生參同契曰此兩孔竅法金氣亦相須是也臣道疏曰金液名黃轝者乃九轉之名也古之人服丹藥先齋戒淸淨於內然後方服外丹庶得內外兼濟眞氣薰蒸遍於四肢易以返老還童爲純陽之身與天齊夀也鍊銀於鉛神物自生銀者金精鉛包北靈水者道樞其數名一陰陽之始故懷銀精鉛化黃丹寄位五金爲鉛外黑色稟北方內懷金精被褐懷玉外爲狂夫臣道註曰鍊銀於鉛神物自生者白金未見其形隱於北方玄水之中若知白金黑鉛之內取之爲大藥之基運動法象則神物自然生矣參同契曰知白守黑神明自來是也銀者金精鉛包北靈者金精乃白金也玄水之基乃眞鉛也常包北方眞水銀也參同契曰白者金精黑者水基是也水者道樞陰陽之始故懷銀精者白金自水而產用爲神器水體不絶金水兩情爲之樞紐陰陽之本故爲銀精銀精則藥也參同契曰水者道樞其數名一陰陽之始是也銀化黃丹寄位五金者鉛亦名玄位居坎方水火金木之氣隱於鉛中爲五金八石之主流珠遇之而爲根本皆水火之氣結成也參同契曰鉛含黃芽五金之主北方河車是也爲鉛外黑色稟北方內懷銀精者鉛外貌黑惡而內有金華常居北方壬癸之位也參同契曰故鉛外黑內懷金華是也被褐懷玉外爲狂夫者眞鉛未定修煉之前混於鑛內而包黑內懷以象被褐懷寶也參同契曰被褐懷玉外爲狂夫是此意也臣道疏曰夫鼎者藥也藥者鼎也鼎藥一也金液之道若以非類而成則世人服之者升仙多矣故參同契曰挺除武都八石棄損則知大丹不用五金八石曾靑雌雄之類斷可見矣或爲金丹自赤而變紫色者不過曾靑雌雄之氣染入而已且夫自然元氣發生草木枝葉花果顏色豓異豈是曾靑雌雄所染哉古詩曰花發何奇異綠葉間紅苞誰人將此染爭知造化燒枝莖花葉所發乃自然變化而成者莫非水火土之氣也金丹之道亦然順天地生成之理合金木自然之方若以水火土歸於一家豈無變化乎五金八石硝礬銅粉等類眾術之中用者有之至若金汞靈液則此等諸類者無所施焉彼修煉大丹之士知此玄奧之道與夫眞鉛所產之地則金液無不成之理故劉知古眞人云龍虎者金汞也金液相包得自然之性服之者豈不神異哉銀爲鉛母母隱鉛中鉛者銀子子藏銀胞眞素渺邈似有似無灰池𤆌灼鉛沉銀浮潔白見寶可造黃轝臣道註曰銀爲鉛母母隱鉛中者銀者金也鉛者水也爲水生在金金爲水母金返藏形於鉛水中也參同契曰金爲水母母隱子胎是也鉛者銀子子藏銀胞者銀者子也水也鉛者母也金也金旣生水而子水復居鉛母之中故曰黑鉛也參同契曰水者金子子藏母胞是也謂黑鉛變質之後寄位西方常隱迹於水中得水滋養愈見生成名曰黑鉛制成白金而作神室因陽火激發而子水卻於白金中流出名曰眞水銀也大哉眞物是爲生天生地之一氣也眞素辶𦕈邈似有似無者眞素眞汞也在母胞中被外符迫逐或有或無浮沈不定爲鼎室所蔽不能見其形儀也參同契曰眞人至妙若有若無是也灰池𤆌灼鉛沉銀浮者灰池火熾鉛沉於下銀浮於上名曰白金眞一子謂眞汞在神鼎之內被陽火陰符薰蒸飛伏不定或沉或浮神室若太淵也參同契曰髣髴太淵乍沉乍浮是也潔白見寶可造黃轝者灰池煅煉以爲白金乃取白金而爲神室可以造黃轝也參同契曰採之類白造之則朱是也臣道疏曰金液之要在乎神水華池華池卽金母也金者西方白金也其金有液汞者是也太陽流珠二物雖各有象本同一源至人以金養汞變爲丹砂是返本還源歸自然之性白金神母義成大丹大丹成後津液不絕故言金液好道之士審而詳之不可以山澤金銀合和水銀便爲之養汞也殻爲金精水還黃液徑寸之質以混三才天地未分象若雞子臣道註曰殻爲金精水還黃液者眞鉛鍊爲白金以白金爲鼎器是金精之母其中有水銀可以變黃液參同契曰鍊爲表衞白裏眞居是也徑寸之質以混三才者神室中空方圓寸餘上釡爲天下釡爲地中安靈汞以象三才參同契曰方圓徑寸混而相扶是也天地未分象若雞子者天地未開闢之前混沌若雞子之形日月之精交於其中萬象之形因以兆矣至人指神室象混沌以體三才之用進陽火退陰符以留日月之精眞鉛生天地之先採之有法造之有理非可妄爲也參同契曰先天地生巍巍尊高是也臣道疏曰白金旣露狀若白馬牙又性好食木精木從北方水中而生因煅煉之後潔白如雪實爲丹之寶也陶眞人曰以寶煉寶志士得道葛稚川曰石液鬼隱金精山藏審此亦是潔白見寶也旣言潔白又言見寶則可以造金液神丹也今之人燒硃砂水銀縱得伏火之法終有本性雖使服之安有砂入五內霧散若風雨之效哉圓中高起狀似蓬壺關閉微密神運其中爐竈取象固密全堅委曲相制以使無虞自然之理神化無方臣道註曰圓中高起狀似蓬壺者凡修大丹先須壇爐鼎竈上下相接如蓬壺之狀也參同契曰傍有坦闕狀似蓬壺是也關閉微密神運其中者鼎內周旋四通以來火氣關閉際會不使走失也參同契曰環匝關閉四通踟躕是也爐竈取象固密全堅者壇上有爐爐上有竈竈中有鼎鼎中有神室神室中有金水互相包裹以閼奸邪又使靈汞易生也參同契曰守御固密閼絕奸邪是也委曲相制以使無虞者金鼎懸於竈中虛其四向以疏火氣安水於金鼎之上運火於金鼎之下壇爐鼎竈遞相包裹以防非常也參同契曰曲閣相通以戒不虞是也自然之理神化無方者凡造大藥皆是日月星辰之精五行四象之氣而爲金液非有他道也臣道疏曰至人憫夫不知道者利於汨沒以致於死不明神之所往性之所有此金液之要所以傳也且黃帝老子亦修此道爲後來之師故服丹長生隱顯變化入火不焦入水不濡者此也軒轅之前御世之君皆兼此道以相禪受不獨遊方之外而進此道也後世澆薄不純其法頗秘得之者稀至周之時老君降世將度函關始以金液之法獨傳關令尹眞人因得流行於世有緣相值則遞相傳受不絶道種今世之人則不然以富貴驕其身名利役其性酒肉密其氣色慾迷其情四樂之外惟畏死而已遂妄意延年盡禮於方術之士以求不死之藥有奸利之輩聞風競至偃蹇自如以爲其師緘默不言以視秘奧僞之亂眞未易識測其實以傍門小術依托爲至道以金石草木借名爲眞藥曾無其效使夫後來不信金液之法亦不足怪也磁石吸鐵隔礙潛通何况雞子配合而生金土之德常與汞俱臣道註曰磁石吸鐵隔礙相通者磁石之力全者可引數斤之鐵於器物之外此物類相感者也參同契曰幽玄遠渺隔礙相連是也何况雞子配合而生者以白金造神室而象雞子之形如天地之配合運動水火而靈汞自生參同契曰類如雞子黑白相符是也且天地之中有太陰玄精變化萬狀注於萬物之上隨大隨小莫不由之至人制而食之以駐景修仙也欲制之法唯白金一物力能制之方肯留戀同爲變化也金土之德常與汞居者金乾土坤也乾坤情動而生汞鉛二物相得如成金液而不飛走參同契曰動靜休息常與人俱是也臣道疏曰古之眞人玄奧之法在修金鼎但金鼎難造若能知者可以召萬化之氣知金液之精矣假令混沌之前形質未判天地之狀已若雞子取其根本立爲至道故先天地首萬物道術之中唯此最先得之者獨立長世神形不壞亦不難也火記不虛作非鄭重前文丹術旣著不復重擬故演此訣以附火記焉臣道註曰火記不虛作非鄭重前文者火記有六百篇次第連接運十月火候也每月三十日晝夜各一卦計有六十卦十月計六百卦也二八月亦有篇數緣卯月易水安金至酉月行火止水與寅申月同故不在其數此古文龍虎經言火記上古之人口口相傳非虛作之文故鄭重而言之丹法云傳藥不傳火者此也丹術旣著不復重擬者火記作之於前故於此經不復言也而演此訣以附火記焉者此經只以古文而傳不著作者之姓氏蓋古之得道者恐火記沉匿後人不能修金液之道遂作此經以附之耳臣道疏曰世之學道者不得金液之根元而執傍門曲逕迷誤一生有兀坐存想咽津納唾指太淵一竅想臍下之泓池或默聽靈響之音而分爲鉛汞將心腎相交而名曰水火此皆初地之學也復有對境接氣行房中補養之術男女相交作吐納陰丹之法血氣將盡返至禍患杇腐形骸化成灰土此等數多皆爲背道欲進卻退欲速轉遲蒙昧至眞乖違天理以此觀之深可憐憫此經以龍虎爲首者龍者日也虎者月也日月是乾坤運動之祖發生萬物之本乾天金體其色靑碧包含陰陽和合四象三光二氣皆運其中古之人效天地之運動日月之躔離安爐立鼎攝二景之光召龍虎之氣而歸神室制而成藥號曰金丹故以龍虎爲名也魏眞人云芽之靈者龍吟方泉景雲絡霄虎嘯虛無冲風四振陽燧照明珠火鬱起方諸見陰玄溢可得此皆自然而然也金丹變化之道其實皆一也若以五金八石及諸鉛鑛并存想採取陰丹而望白日飛昇不亦難乎且此經上中下三篇有鄙俚之談或字不正皆後人託名以竄其中今削去之以魏眞人參同契相準分爲三十三章使後來學者不失其次序也雖然山林高逸朝市大隱可深造其道者亦豈無望於參同契印證哉
