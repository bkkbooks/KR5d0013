body:
  text: 保義郎差充皇弟少傅恩平郡王府指揮使臣王道註疏臣道曰道家之學有所謂內外丹者實性命之所繫得之者小則駐景延年大則登仙入聖其徒以書傳世無慮千萬卷內丹則莫不以神氣爲本外丹則莫不以鉛汞爲宗古歌云紅鉛黑汞大丹頭相符紅黑是眞修紅鉛取精黑取髓解得紅黑藥無比將紅入黑保長生用黑入紅天仙矣顚倒兩般總成丹火龍變化爲天仙此外丹之要旨也古今學道之士皆以鉛汞爲大丹藥曾不知眞鉛眞汞果是何物臣自志學之年則喜聞其事廣集丹書研詠意味夜以繼日至忘寢食唯是紙上之語曾無發明紹興壬申有道人爲臣言鉛汞者但以山石間所採鑛銀爲眞鉛朱砂中所抽水銀爲眞汞教臣停取一斤許以鼎器火候煉之臣以爲信然遂於會稽天慶觀治丹室依其所指試爲之費嵗月耗貨財竟無成效非臣心不誠實方之不良也閱乾道甲申復有道人爲臣言眞鉛不露體眞汞不呈形又曰眞鉛不見銀眞砂不見汞以二物合和爲一分九鼎火而取之名曰黃芽依法鍊之變爲黃轝紫粉亦號明窗塵服之聚精歛神除卻萬病以臣觀之此蓋靑霞子昔所造一中丹爾至湻熙癸巳乃遇眞師始悟前所得者皆非眞鉛眞汞也古歌云眞鉛不產五金內生在杳冥天地先又云聖人奪得造化意手摶日月安爐裏微微騰倒天地精攢簇陰陽走神鬼日魂月魄若箇識識者便是眞仙子煉之服之千餘日身旣無陰那得死眞師以其秘方口訣以授臣言下有悟如夢之覺後讀諸家之書無不相契洞然明白由是而知日魂月魄爲眞鉛眞汞從無質以生而有靈質萬物動靜莫不由之若安爐立鼎製造神室摶日月之根運水火之變不失天符之旨則大藥神丹可得矣臣三十年間凡三遇人後得眞師始契妙道臣一介武弁錄職王府家貧俸薄未能結眞友採丹材鑄鼎器造神室屛迹山林以從事於斯也然專心至志晨夕不忘頃因暇日閱龍虎經以行世之本謬誤爲多遂用得之於眞師者釐而正之分章定句爲註解復以魏伯陽參同契証其義申而爲疏以辨藥材之眞僞金石之異同去繁撮要始終相貫集一編爲三卷上卷十三章中卷六章下卷十四章總三十三章非敢傳之於後世姑示同志之丹友耳臣疎遠之人不識忌諱冒昧萬死謹因高士周眞一印證繕寫上進伏惟萬機之暇留神觀省使臣有萬世一遇之幸成就素志是不獨臣之私願亦眞師之咐囑云湻熙十四年四月初一日保義郎臣王道誠惶誠恐稽首頓首百拜謹序經進古文龍虎經註疏奏劄臣眞一復見保義郎王道所譔龍虎經註疏三卷事顯而言直理明而義詳深得參同契金碧經之密意其說外丹皆非以五金八石諸雜類爲藥材上取天地之精日月之華混合造化以成神丹此與陰眞人無質生質是還丹凡鉛凡汞不勞弄之語正同臣山林老褐須學道膚淺無可採取然於道書講之舊矣古語有云三折肱爲良醫臣與王道相識甚久議論以詳因其以所譔來就臣印證與臣得之於師者首尾符契是用昧死繕寫上進恭望燕閑畧垂省覽自今而後願飭尚藥如金石雜類反惡之劑不使上御以保萬夀實天下幸甚臣以此區區愚忠仰冒聖恩伏惟幸聽干冒大威臣下情震懼之至太乙宮養素齋道士臣周眞一劄子
