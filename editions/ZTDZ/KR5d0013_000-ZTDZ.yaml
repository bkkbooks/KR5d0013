front:
  text: 古文龍虎經註䟽奏劄映一臣眞一伏見保義郞王道所撰古文龍虎經注䟽三卷事顯而言直理明而義詳深得參同契金碧經之密意其說外丹皆不以五金八石諸雜類爲藥材止取天地之精日月之華混合造化以成神丹此與陰眞人無質生質是還丹凡鉛凡汞不勞弄之語正同臣山林老褐雖道學膚淺無可採取然於道書講之舊矣古語有云三折肱爲良醫臣與王道相識甚久議論亦詳因其以所撰來就臣印
  hash: sha256:47e90282fbb90d275325344955865790d11e04de3b7ed771b2553736f8a03b5c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0013_SJB_000-200033c, image: sjb/20/200033c.png}
body:
  text: 證與臣得之於師者首尾符契是用昧死繕寫上進恭望宴閑略垂省覽自今而後願飾尚藥如金石雜類反惡之劑不使上御以保萬壽實天下幸甚臣以此區區愚忠仰報聖恩伏惟幸聽干冒天威臣下情震懼之至註䟽序臣道曰道家之學有所謂内外丹者寔性命之所繫得之者小則駐景延年大則登仙入妙其徒以書傳無慮千萬卷内丹則莫不以神炁爲本外丹則莫不以鉛汞爲宗故古謌云紅鉛黑汞大丹頭相符紅黑是眞修紅鉛取精黑取髓解得紅黑藥無比將紅入黑保長生用黑入紅天仙已顚倒兩般總成還火龍變化爲天仙此外丹之要㫖也古今學道之士皆以鉛汞爲大藥曾不知眞鉛眞汞果是何物臣自志學之年則喜聞其事裒集丹書研詠義味夜以繼日至忘寢食惟是紙上之語曾無發明紹興壬申有道人爲臣言鉛汞者但以山石間所採鑛銀爲眞鉛朱砂中所抽水銀爲眞汞教臣停取一斤許以鼎器火候煉之臣以爲信然遂以會稽天慶觀治丹室依其所指試爲之費歲月耗貲財竟無成效非臣心之不誠實方之不良也閲乾道甲申復有道人爲臣言眞鉛不露體眞汞不呈形又言眞鉛不見銀眞砂不見汞以二物和合爲一分九鼎火而取之名曰黄芽依法煉之變爲黄轝紫粉亦號明窗塵服之聚精歛神却除萬病以臣觀之此蓋青霞子昔所造一中丹耳至淳熙癸巳迺遇眞師始悟前所得者皆非眞鉛眞汞也古謌云眞鉛内産五金内生在杳冥天地先又云聖人奪得造化意手摶日月安爐裹微微騰倒天地精攢簇陰陽走神鬼日魂月魄若箇識識者便是神仙子煉之餌之千日餘身已無陰那得死眞師以其祕方口訣授臣言下有悟如夢之覺後讀諸家之書無不相契洞然明白由是而知日魂月魄爲眞鉛眞汞從無質以生有質萬物動靜莫不由之若安爐立鼎製造神室摶日月運水火不失天符之㫖則大藥神丹可得矣臣三十年間凡三遇人後得眞師始契妙道臣以一介武弁隸職王府家貧俸薄未能結眞友採丹材鑄鼎器造神室屏跡山林以從事於斯也然專心致志晨夕以之須因暇日閲古文龍虎經以行世之本謬誤爲多遂用得之於眞師者釐而正之分章定句爲註解復以魏伯陽參同契證其義申而爲疏以辨藥地之眞僞金石之異同去繁撮要始終相貫集爲一編三卷上卷十三章中卷六章下卷十四章總三十三章非敢傳之于後世始示同志之丹友耳臣踈遠之人不識忌諱冒昧萬死謹因高士周眞一印證繕寫上進伏惟萬機之暇留神觀省使臣有萬世一遇之幸成就素志是不獨臣之私願亦眞師之付囑云淳熙十二年四月初一日保義郞臣王道誠惶誠恐稽首頓首百拜謹叙
