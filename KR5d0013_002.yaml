front:
  text: 古文龍虎經註䟽卷中映二
  hash: sha256:56e00b8497677f4dcdc18a5d41cc912c6c64fdd3dae7706ce8eec03a6f9e3f4e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0013_HFL_002-001a, image: hfl/0620/0620-066.png}
body:
  text: 宋保義郎差充皇弟少傅恩平郡王府指揮使臣王道註䟽太乙宫養素齋道士臣周眞一即證故演作丹意章第十四故演作丹意乾坤不復言丹砂流汞父戊己黄金母鍾律還二六斗樞建三九赤童戲朱雀變化爲青龍註曰故演作丹意乾坤不復言者前篇言大丹之意置立神室妙盡其理故於此篇不復言也丹砂流汞父戊己黄金母者丹砂日也流汞日之魂也戊己月也黄金月之魄也丹砂戊己能生此二物魂魄而爲至藥故謂之父母也鍾律還二六斗樞建三九者二六者乃子寅辰午申戌爲六律丑卯巳未酉亥爲六吕又子爲黄鍾午爲甤賓之類主十二時也三九亦十二也斗之所指爲建正月建寅二月建卯經歷十二辰也參同契曰消息應鍾律升降據斗樞是也赤童戲朱雀變化爲青龍者赤童日也朱雀火也火既運動則日生汞於神室之中故名爲青龍也古謌云五行顚倒術龍從火裏出是也䟽曰夫太極生兩儀兩儀生四象四象生八卦定吉凶故乾天也其靜而專其動而直坤地也其靜而翕其動而闢故經云乾坤天地之本以離天地之用道生天天生地地生萬物是以乾坤動靜生乎萬物者也天也者虚也陽也剛也父也地也者實也陰也柔也母也自虚而下皆地也自實而上皆天也是以虚實相通而有六爻之變故乾用七九而坤用六八也以四象之數通乾坤之數而老少陰陽之策見矣四而通六得二十四爲老陰一爻之策四而通八得三十二爲少陰一爻之策四而通七得二十八爲少陽一爻之策四而通九得三十六爲老陽一爻之策四變之策乾坤之成數六九之變六爻之生數也以老陽老陰九六隨乾坤二卦爲變而少陰少陽七八不入也乾有六爻而地得其三坤有六爻而天得其三乾坤兩卦爲天地變通之體常混而爲一布於六虚之内隨陰陽二炁升降變化於六爻之中方其乾之動也直而不屈陽光赫赫發於地下變坤下爻而爲復是曰初九爲陽六爻之主微陽方生二變爲臨陽炁方行三變則陰陽交通而成泰萬物萌甲破地而出四變爲大壯萬物叢生五變爲夬則萬卉見眞以至上九變爲純乾陽光熹熹遍布卯酉之南草木茂盛陽光升于上五色耀于首井泉若氷是謂乾卦用事之時也方其坤之動也闢而不塞陰精肅肅發于天上變乾下爻而爲姤是曰初六爲陰六爻之主微陰方生二變爲遁陰炁方行三變則陰陽不通而成否萬物成實結而垂下四變爲觀萬物衰落五變爲剥則卉歸藏以至於上六變而爲純坤則陰精凛凛遍布卯酉之南草木萎黄陰精沉於下五色藏於根井泉若湯是謂坤卦用事之時也故經曰日入地中結精之象再變爲復發生萬物者也是知乾坤二體隨陰陽之炁以變動升降於六虚一晦一明循環晝夜日往月來循環無端而莫知乎紀極者唯一味光和之炁以成變化耳上古至人知天地之消息陰陽之慘舒故託易象法乾坤凖陰陽擬水火自天地至和之炁引日月純粹之精歸於神室之内以變金液點化凡軀而作聖體功德備具位號眞人孰不謂之神乎坤初變成震章第十五坤初變成震三日月出庚東西分卯酉龍虎自相尋坤再變成兊八日月出丁上弦金半斤坤三變成乾十五三陽備圓照東方甲金水温太陽赤髓流爲汞姹女弄金璫月盈自合虧註曰坤初變成震三日月出庚者朔前夜半子時運行陽火之初日月合璧於畢昴之上乾變坤之下爻而爲震卦震卦主事一陽爻生於下則月至三日現於庚方也參同契曰三日出爲爽震受庚西方是也東西分卯酉龍虎自相尋者東西二八之門日月出金木正位既經五日運行火候則龍虎之炁兩相慕應聚於鼎中也坤再變成兊八日月出丁上弦金半斤者自六日至八日成上弦乾交坤之二爻而爲兊卦兊卦立事二陽爻生於中則月光得半弦平如繩而月現於丁方喻鼎中金火各半也參同契曰八日兊受丁上弦平如繩是也坤三變成乾十五三陽備圓照東方甲者自十一日至十五日乾交坤之上爻而爲乾卦乾卦主事三陽爻生於上則月光圓滿而月現於甲方喻鼎中金德圓滿得火候也參同契曰十五乾體就盛滿甲東方是也金水温太陽赤體流爲汞姹女弄金璫月盈自合虧者金液神丹至此太陽之精盛滿神室之内金火之炁化而爲汞汞與其母兩相留戀以變金體蟾蜍兔魄互相包褁光耀鼎中姹女之體自成首飾化現金璫喻鼎中金炁漸榮而變成丹參同契曰蟾蜍與兔影焕炳兩炁俱蟾蜍視卦節兔魄吐生光是也太陰自初一日至十五日光滿至十六日自合虧也參同契曰七八道已記屈伸低下降是也十六轉相减章第十六十六轉相减乾初缺成巽平明月見辛乾再損成艮二十三下弦下弦水半斤月出於丙南乾三損成坤成坤三十日東北䘮其朋月没於乙地坤乙月既晦土木金將化繼坤生震龍註曰十六轉相减乾初缺成巽平明月見辛者謂十六日已後坤交乾之下爻而爲巽卦巽卦主事一陰爻發生於下陽火初退陰符始生平明則月現於辛方也亦如陽火初進之時月生三日同也參同契曰十六轉受統巽辛見平明是也乾再存損成艮二十三下弦下弦水半斤月出於丙南者自十一二日陰符再退至二十三日坤交乾之中爻而爲艮卦艮卦主事二陰爻生於中則月見於丙方復與上弦同義蓋鼎金水各半也參同契曰艮直於丙南下弦二十三是也乾三損成坤成坤三十日東北䘮其朋月没於乙地者自二十六至二十八日坤交乾之上爻而爲坤卦坤卦主事三陰爻生於上月光將盡則月現於乙方至於東北陽光既盡是謂䘮朋也參同契曰坤乙三十日東北䘮其朋是也坤乙月既晦土木金將化繼坤生震龍者自二十八日至三十日陰符到此消盡陰陽之炁各停土與木金相和爲液太陽之炁不令於月則太陰之體全無循歷東北再經畢昴之上日月相合水火重施復如其初又以復卦爲首繼坤而生震卦也震屬木位在東方故稱龍也又陽火爲龍參同契曰節盡相禪與繼體復生是也䟽曰自子至巳陽火六時而爲進震兊乾主之太陰行度爲金液之象也復臨泰壯夬乾爲太陽行度陽火之象也自午至亥陰符六時而爲退巽良坤主之太陰行度爲金液之象也姤遁否觀剥坤爲太陰行度陰符之象也鼎中金水之變十二爻十二時主之天上月華之動六卦十二時主之參同契言之甚詳但人不能洞察之耳凡修眞之士欲煉養大丹必上知天文下知地理中知人情方能變通造化手握陰陽運日月於爐中而孳生龍虎交乾坤於室内而長養精津金母無虚育之勞木父有成功之逸金液化現砂汞成形九轉告終陽光變足黄轝立號同明䆫塵不惟㸃石爲金服之與天齊老變化之妙無以加此乾坤括終始章第十七乾坤括終始故曰震龍也如上三十日坤生震兊乾乾生巽艮坤八卦列布曜運移不失中註曰乾坤括終始故曰震龍也者乾坤二卦爲衆卦之父母二卦相索而成八卦乾先索坤之下爻而爲震卦以爲朔日一日夜半子時陽火發生之始坤又索乾之下爻而爲巽卦自十六日夜半子時陰符發生之始也乾納甲壬坤納乙癸參同契曰壬癸配甲乙乾坤括終始是也如上三十日坤生震兊乾乾生巽良坤者坤生震卦而爲初五日直符次生兊卦而爲中五日直符又生乾卦而爲末五日直符太陰歷十五日圓滿於甲上鼎中金液亦盛蓋隨卦候而增也乾生巽卦而爲初五日直符次生艮卦而爲中五日直符又生坤卦而爲末五日直符太陰歷十五日光盡於東北艮郷鼎中金液盛實亦隨卦候而成也乾坤自相生滅爲三十日一月之候也參同契曰七八數十五九六亦相應四者合三十易炁索滅藏是也八卦列布曜運移不失中者如上八卦列布於一月三十日中運動陽火陰符一一湊歸神室之内爲大丹金液之變化也參同契曰八卦列布曜運移不失中是也䟽曰人之一身亦體天地其中陰陽升降亦與之符契但以六欲七情發之於外而精炁耗損於内終日汩汩不知省覺也能知此道隨順陰陽恬淡守素則天地外交而身中内合一一皆應其升降若少思慮無牋賊亦自然延年矣况安爐立鼎法象天地召日月至精引陰陽和炁成神藥而服之安得不爲仙哉造金液者須知乾坤八卦納一月三十日日月行度之數日行一度而月行十三度强一月一終終而同宫謂之合朔日行三十度月行三百九十五度歷十二月再與日合於斗宿之次爲冬至之日也故至人以日月𨇠度之數爲一月運火之期前十五日震兊乾主之後十五日巽艮坤主之離坎定位陽火陰符隨時進退皆依約爻象也調火六十日章第十八調火六十日變化自爲證神室有所象雞子爲容形五嶽峙潜洞際會有樞轄註曰調火六十日變化自爲證者元精在鼎中難覩其狀如一月數中開鼎視之或金華降少五液結遲乃陽火陰符有太過不及之患再須一月運行結丹之火候也故元精在鼎中受外來符火一一變化難覩其狀以十二時爻象火數即知其動靜浮沉也參同契曰元精妙難覩推度効符證是也神室有形象雞子爲形容者古之至人仰觀天象俯察地理效乾坤而立神至類雞子而法形容虚中一寸而安靈汞參同契曰居則觀其象凖儀其形容是也五嶽峙潜洞際會有樞轄者地上靈仙分爲五嶽其中皆相潜通古人立表爲象製壇爐鼎竈符合玄法亦委由相通而使火炁通遠無所凝滯若火散於外則吉凶生於内參同契曰立表以爲範占候定吉凶是也䟽曰天地未分象若雞子天地既分陽火升於上而輕清之炁結而爲天陰水沉於下而重濁之炁結而爲地是謂天地定位也神室者上釜爲天下釜爲地兩釜相合其形亦象雞子中虚寸餘是謂神室定位也天地交則水中相火而升火中生水而降相交於眞土之内而生萬物神室交則火自坎生水自離降相交於戊己之内而生靈汞玄妙神祕亦可知也發火初温微章第十九發火初温微亦如爻動時上戴黄金精下負坤元形中和流素津參合考三才乾動應三光坤靜含陽炁註曰發火初温微亦如爻動時者凡神丹起火皆依約爻象與十二時同爲消息如地雷復卦主冬之令下一爻變而爲陽子時之爻也於此時發火未甚有力但温温然是謂柔火以應復卦下一陽爻物生之候也參同契曰發號順時令勿失爻動時是也上戴黄金精下自坤元形者黄金乃乾天也上釜也坤元者乃坤地也下釜也二釜相合而爲神室也參同契曰上察河圖文下叙地形流是也中和流素津參合考三才者既神室有位則素津靈汞生於其中矣中宫之靈亦喻人心神之所居也故天地人全則萬物名焉金水作焉參同契曰中稽於人情參合考三才是也乾動應三光坤靜含陽炁者乾天也日也火也乾天運動而木火之精便生於空器之中而作金液也坤地也月也水也神地靜居而月水金之精和合太陽流珠而又包褁不至飛走也參同契曰動則循卦節靜則象爻辭乾坤用施行天地然後理可不謹之乎是也䟽曰日屬離位在南方居丙丁之中火之正位也日又含火火又變體成汞故云汞生於日夜者陽也謂之陰魂也離卦二陽一陰以己土爲其神又是坤之中女日又用己上爲其光己土者陰位也故以其象配離卦又爲日中之光含其玄色爲朱從青變赤故爲朱砂也月屬坎位在北方居壬癸之中水之正位也月又含水水又變體成金故云金生於月金者陰也謂之陰魄也坎卦二陰一陽以戊土爲其神又是乾之中男月又用戊土爲其精戊土者陽位也故以其象配坎卦又爲月中之精含其素色爲黑從白變黑故爲黑鉛也汞合離炁以應陰爻之位汞之一物非世間水銀朱砂等物木生於太陽之内名曰神水是謂眞汞也鉛合坎炁以應陽爻之位鉛之一物非嘉州鹹鉛及諸山石間所生也木生於太陰之中名曰白金是謂眞鉛也鉛分爲二儀神室也汞生爲一炁玄液也以象三才天地人也古文龍虎經註䟽卷中
