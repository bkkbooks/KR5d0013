body:
  text: 宋保義郎差充皇弟少傅恩平郡王府指揮使臣王道注疏太乙宫養素齋道士臣周真一即證神室者丹之樞紐章第一神室者丹之樞紐衆石之父母砂汞别居注曰神室者丹之樞紐神室象乾坤能收日月之精氣以為金液神丹故謂丹之樞紐參同契曰乾坤者易之門户是也衆石之父母者真鉛生於天地之先為萬物之父百昌之母故謂衆石之父母參同契曰衆卦之交母是也砂汞别居者砂汞本無形質隱於真鉛之內得太陽純一之精方能化現於神室之中故謂别居也疏曰太極之初化元氣而為天地分陰陽而為日月中産人物通為三才人之最靈故為萬物之首上古之時人之住世動經千百歲自黃帝之後漸至壽夭不齊者何也蓋人不能體天地元氣而行遂至夭傷也天地所以能長且久者盡得元氣純粹之大也故能隨順四時生尅五行運動自然也古者通達之士觀天之道執天之行合自然元氣而滋養一身使如天地之壽後世之人則不然少者血氣未定而為淫欲所移老者血氣將竭而為衰病滋蔓或有知道則已晚矣晚而自保猶得延年是以至人效天地變化安爐製鼎而作神藥老者服之則聚精會神還童為少少者服之則得仙猶速故真一子謂修煉神丹與天地造化同途託易象而言之莫不首採天地之根而為大丹之基既以乾坤運動之迹而為大丹法象循坎離而行水火歷卯酉以立刑德盜四時推移之數歸于掌中托陰陽動靜之機而成冬夏陰生鶉火陽發玄枵動則坤變下爻為陽九靜則乾歸下爻為陰六此皆修丹之大旨也出陽入陰章第二出陽入陰流曜二方列數有三按象水火注曰出陽入陰流曜二方者陽自子而生出於地上歷丑寅卯辰至巳而陽極則青龍日之精曜於東方陰自午而降入于地中歷未申酉戌至亥而陰極則白虎月之華曜于西方也列數有三按象水火者青龍白虎二物皆因朱雀之氣薰蒸而成質故有三也大丹自起首以至丹成真鉛神室之外只以水火二象為之非有他物相雜也疏曰凡修金液神丹先須認藥物根無次驗其火候進退陽升陰降不離子午之方日往月來必在卯酉二位用坎離而行水火使龍虎變作夫妻還日精於月窟則鉛內産砂戲朱雀於離宫則砂中生汞金由性也汞由情也情性相包夫婦相眷自然而成金液也故人之情性不離于身丹之砂汞俱生鉛內情性於人非外物也砂汞於鉛非雜類也是知日月升降陰陽往來皆在天地之中故乾坤精髓常聚於雞足山中玄冥之內而為大藥之祖宗金丹之根蒂也夫日有三照月有三移日月出于東而光曜於西則西方曰虎金德之正氣入於玄冥之內化而為六戊日月入於西而光耀於東則東方青龍木德之正氣入於玄冥之內化而為六己日月當於午而光耀於北則南方朱雀火德之正氣入於玄冥之內就土成形化而為黑鉛常居杳冥之內為天地萬彙之根本故魏真人云日潛道而沉彩月施德以舒光日受月化體不虧傷是知真元一氣乃生天生地之本也古之至人知神物隱於此遂假法象採之而為藥之父母擬乾坤而為神室立鼎器以象雞足取符天候凖則四時還返金水合於自然運陽火以還日精轉陰符而來月魄使三方之正氣並居金鼎之中四象之至和咸結杳冥之內混沌相交經營鄞鄂以至丹成皆稟自然之變化也今之學者謂世間之水銀可以為金丹世間之黑鉛可以為河車使後來皆謬妄相傳以虛為實多方製度至老無成且水銀出自朱砂之內因火化而成其理只名水銀終不能成金液也殊不知金液者稟天地自然之氣憑陰陽純粹之精附形於月為陰之主伏體中宫潛當戊己為至藥之母豈有以世間水銀及山澤五金八石比並於神藥之母哉神藥是度世延年之寶天地萬靈之祖世人甚難識之後學以諸類雜物製造金液實錯會古人之意若使雜物可造金丹則金丹應容易得成所云鉛汞二名者古人説物象後人不解其意以朱砂便為鉛以水銀便為汞此乃以假物合真名亂其根本所以千舉萬敗終無成理前所論真鉛出産並係依經節録合於師旨非敢臆説以誤後學好道之士幸留意焉制猶王者章第三制猶王者武以討叛文以懷柔土旺四季土德以王提劍偃戈以鎮四方注曰制猶王者武以討叛文以懷柔者制令也猶王者出令以布四方也武剛猛火候也文柔弱火候也喻金鼎堅備神室固密初進柔順之火以來陽和之氣令住鼎室之中末行剛猛之火金液雖欲迸出為坤宫所拘遂留精於內以成造化猶國有叛逆之民彼王者防制有方萃心聽命故不能逃逸也土旺四季土德以王提劒偃戈以鎮四方者土德者戊己真土也真土者真鉛也真鉛能召至和歸之中宫故青龍白虎朱雀玄武四象之氣不得真土終不得成金液也土居中宫故稱黃帝和氣隨四時而生萬物皆有之神室為和氣之主旺於四季能收攝日月之精華歸于鼎中不使流散於外也參同契曰土旺四季羅絡始終是也疏曰王者之治天下也內修文德外治武備法三皇而設百僚順四時而播五穀故得國內安康和氣生焉古人以治天下之理而製金液神丹初下手之時必須神室神室之外而有胞胎胞胎之外而有金鼎金鼎之外而有壇竈若一一全備則使金液之精生焉至和之氣合焉王者體中宫神母能制伏流珠不使飛走文火發生之火武火結實之火能使金液成就也昔公孫氏上升之後配為中央土德是和氣從中而生後又羅絡四季包裹金水和合流珠漸成神藥也姹女流珠飛走之物不常定處唯是真土一味可以制之遂成變化自然之道也坎離數一二章第四坎離數一二南北獨為經故冠七十二石之長注曰坎離數一二者天一生水於坎故一數主之也地二生火於離故二數主之也南北獨為經者北方陰極之所而生陽氣之始歷子丑寅卯辰巳而終巽南方陽極之所而生陰氣之始歷午未申酉戌亥而終乾陰陽二氣皆從子午為發生之終始故南北獨為經者也故冠七十二石之長者真鉛先天而生氣後天而成形故為衆物之長還丹之根蒂也疏曰人間之術稱玄妙者莫不以燒金煉銀為世寶每見修制者萬無一成縱使有成者且非出世寶又非延命濟世之術今世學道之士不以性命為急皆迷迷相指終無省悟之理殊不知大丹之道全在陰陽二氣相須而成至藥故真人丹砂訣云煉空者合於至妙煉妙者合於至靈煉靈者合於至神煉神者合於至道如此至言則可知金丹之真偽妙理之淺深若不遇至人祕訣豈能悟解真詮為出塵之士哉夫坎離卦象乃離火坎水南北二位為水火之根本雖則分為二體本同一源而生既分為二各稟性情為一有一無矣至人於此知是天性自然非假合之所及却以二象配合為一煉之至寶服之長生天産二物都無雜類實日月之精華乾坤之骨髓也易曰天垂象聖人則之此乃返本還源自有為而合無為也故水火坎離升降南北獨為丹首而冠七十二石但悟天地生殺之機日月循環之方則有無之性自曉可也剛柔有表裏章第五剛柔有表裏陰陽稟自然金火當直事金水相含受雌雄併一體用之有條理注曰剛柔有表裏陰陽稟自然者乾陽為剛坤陰為柔互相包褁配合神室使陰陽自然之氣日月施化之精輻輳金胎而結神藥也參同契曰乾剛坤柔配合相包是也金火當直事金水相含受者外則水火頻施內則金火常交木汞生青龍之體金精長白虎之胎萌芽漸兆金木留形神室之內金火既交之久而神水自生於母胎之中以至丹成子母兩相慕戀金水自然滋養也雌雄併一體用之有條理者雌雄亦龍虎也乾坤也日月也陰陽也坎離也夫妻也水火也男女也雌雄相錯則變化精氣為物也若用之得理則發生自然也疏曰男屬坎卦太陽日之象也日月相交金水自生情性相得配合自然更無外物若以雜類而合神藥即非自然之性也只如男至弱冠女至笄年兩情相慕亦是自然而然古人將此喻大丹興人無異皆自然之性也砂汞在鉛體中因水火激發而有非外物也嬰兒在母腹中亦自水火而有非外物也古人知此二種情性根本不相去離因引合龍虎之精還返金水之氣自然成其至藥則一陰一陽之謂道若非自然則不可合也譬之男女二情氣交體合日往月來自然變化豈假他物而成胎孕以此則神藥必在乎離火坎水二象而成不在雜類也由是以知日月真精煉成金液與男女胎孕之理實同但有仙凡靜穢之異耳至人恐後學不悟真理故引此為證其於法象自可知也變化既未神章第六變化既未神終則復更始初九為期度陽和準旦暮周歷合天心陽爻畢於巳正陰發離午自丁終於亥注曰變化既未神終則復更始者凡修大丹須一月而成若火數不凖鼎器不密則神精降少金液結遲須臾一月也參同契曰既未至晦爽終則復更始是也初九為期度陽和準旦暮者每遇晦朔之夜子時陽火將興便名地雷復卦陽爻生坤初九於下也自子至巳為旦為早自午至亥為暮為晚旦以屯卦直事暮以蒙卦直事屯蒙二卦以直一日十二時也為大丹之體象也一日兩卦一月六十卦初則屯蒙終則既未參同契曰日辰為期度動靜有早晚是也周歷合天心陽爻畢於巳者陽火自子而升至巳為陽極而陰生於午也參同契曰春夏據內體從子至辰巳是也正陽發離午自丁終於亥者陰符自午而降至亥為陰極而陽復生於子也參同契曰秋冬外當用自午訖戌亥是也疏曰大丹變化之道在乾坤二卦為首陽火起於子陰符生於午陽極乾於巳陰極坤於亥乾坤十二爻隨十二辰而變化以造金液也或有造大藥視為等間之事妄意為之以至費耗資財形枯骨瘁終無成期豈知至道包褁天地吐納陰陽運轉四時斡旋日月發現五行循環晝夜生育萬物皆稟至道之變化至人知大道之本可以康世乃法象天地攢簇陰陽採日月之魂魄合水火之靈氣修營至藥歸於自然千經萬論留示將來而學道之士尚不能信但只以有形有質之物假合造作終不合至理縱有成者亦不能令人返老還童久視人間或反成癰毒流血之害鍊丹之士可不戒哉水火各一方章第七水火各一方守界成寒暑東西表仁義五行變四時如是則陰陽互用順三一而得其理注曰水火各一方守界成寒暑者水陰也寒極於坎火陽也暑極於離各守一方而成冬夏者也參同契曰賞罰應春秋昏明順寒暑是也東西表仁義五行變四時者東方屬木發生萬物之所故謂之仁謂之喜西方屬金肅殺萬物之所故謂之義謂之怒金木水火土五行之氣變春夏秋冬而正四時之象參同契曰爻辭有仁義隨時發喜怒是也如是則陰陽互用順三一而得其理者若四象之數不失其時則陰陽之氣順水火寒暑各得其理也參同契曰如是則四時之氣順五行而得其理是也疏曰日月運行寒暑有節日去則月來年移則歲至以一歲之氣蹙於一日十二時中排春夏秋冬以應四時之候運動法象一一須及時也日月之度不差寒暑之節有準則大丹必成矣法象才動內以知來則精氣生於室中陰陽結於鼎內既得陰陽精氣則鼎內潤澤自然流通漸生變化與四時應候故五篇云春以溫之仁也夏以暑之禮也秋以涼之義也冬以寒之智也若四時之氣順則一歲之事成焉又春氣生物之本乃已前陽火候也秋氣殺物之本乃午後陰符候也子丑寅為春卯辰巳為夏午未申為秋酉戌亥為冬於十二時辰內運其火候應以四時五行不得分毫參差則鼎中流珠漸結金液將凝其丹必成也故歌曰聖人奪得造化意手摶日月安爐裏微微騰倒天地精攢簇陰陽走神鬼則知金液神丹若非法象天地凖則陰陽造化自然者則無以成也神室設位章第八神室設位變化在乎其中矣神室者上下釜也設位者列雌雄配合之密也變化為砂汞砂汞者金土二用二用無爻位張翼飛虛危往來既不定上下亦無常獨居不改化歸中宫宫非土不可制包囊衆石為丹祖宗注曰神室設位變化在乎其中矣者立神室象天地天地位定則日月之光耀其中矣參同契曰天地設位易行乎其中矣是也神室者上下釜也神室有上下兩釜以應天地也參同契曰天地者乾坤是也設位者列雌雄配合之密也者設天地乾坤二位上釜象天為雄為乾下釜象地為雌為坤使上下兩釜雌雄之際配合而為一也參同契曰設位者列陰陽配合之位是也變化為砂汞砂汞者金土二用者立鼎器法乾坤金母居中三方備用則生靈汞也砂汞乃坎離二火為乾坤二用參同契曰易謂坎離者乾坤二用是也二用無爻位張翼飛虛危者乾坤也日月也日月升降水火抽添不拘爻位張翼南方離火之位虛危北方坎水之位參同契曰二丹無爻位周流行六虛是也往來既不定上下亦無常者水火往來神室之內不常定處也參同契曰往來既不定上下亦無常是也獨居不改化歸中宫者若火數抽添有理則時時化入中宫而為金液也參同契曰幽潛論匿升降於中是也宫非土不可制包囊衆石為丹祖宗者中宫神室以真鉛制造故稱土德包囊萬彙為金液祖宗也參同契曰包囊萬物為丹祖宗是也疏曰大丹之道全在鉛銀與砂汞二物砂汞乃日之精鉛銀乃月之華修金液之方不出天地玄象之中前篇所論亦甚曉然猶恐學者不悟所以時時叱喻如言下曉了則砂汞不勞而可得也且鉛之有砂汞由人之有情性情性發於中而應於外非外來也砂汞生於中而現於外亦非外來也情性二用並在身中砂汞二名俱隱鉛內人用情性則發於外鉛有砂汞則營於內然則機用雖别其理同契至人之意分明指示用日月至精合而成藥不以雜他類也有無相制章第九有無相制朱雀炎空紫華曜日砂汞滅亡注曰有者虎也無者龍也有者白金也無者陰陽氣也以白金為神室而未能自生變化因水火升降運轉四時乃得成丹故用空器而制有也朱雀乃火神薰蒸於下神室之內金液從火而生也參同契曰以無制有器用者空是也紫華耀日砂汞滅亡者紫華日之精英在神鼎內或化金華而現日月之光或變靈液而示龍虎之狀照耀鼎中化為砂汞一消一息一浮一沉隨水火而或滅或亡也參同契曰故推消息坎離沒亡是也疏曰上古之人以水銀一味而成丹者蓋有龍而無虎也亦不假五行四象法天則地亦不假夫婦陰陽交男合女但使陰陽坎離之氣消長於一身之中龍虎之精滋育於七竅之內信任自然而合大道所以上古皆長壽無夭傷也中古以來若欲却老還童延年度世升真入妙必須安爐立鼎召天地至和之氣回日月英靈之華使四象無虞五行全備九轉數終三千時足開爐則紫粉凝霜金華爍日服之長生後天而老况今之人知虎者多識龍者少夫金液為青龍東方木德之宗即日也黃芽為白虎西方金液之祖即月也然此二物之精氣皆有神通變化之理故經云日月之精救老殘是也製之得法食之亦能變化也所謂丹之變化者丹砂變為水銀乃陽返陰也水銀復變為丹砂乃陰返陽也方號純陽之丹而人服之決得長生聖人喻日月魂魄只在坎離二位更無别物恐後來不得真理故直言之以示將來訣不輒造章第十訣不輒造理不虛擬約文伸奧叩索神明演成卦爻五行為經坎雄金精離雌火光金木相伐水火相尅土旺金鄉三物俱喪四海輻輳以致太平並由中宫土德黃帝之功注曰訣不輒造理不虛擬者聖人垂文於世必無苟作妄言以惑後人參同契曰言不苟造諭不虛生是也約文伸奧叩索神明者剪去繁蕪撮其樞要驗日月之妙理符神明之至精參同契曰引驗見效校度神明是也演成卦爻五行為經者體周易六十四卦以為火數依金木水火土五行以為生殺以日月相合而證夫婦以離坎相交而來至精參同契曰推類結字原理為證是也坎雄金精離雌火光者坎藏六戊為月之精雄陽之位居於北方月陰也戊陽也乃陰中之陽象水中之生金虎也離藏六己為日之光雌陰之位居於南方日陽也己陰也乃陽中之陰象火中之生汞龍也參同契曰坎戊月精離己日火是也金木相伐水火相尅者金白金也木赤汞也二物相伐愈自榮盛水火遞尅大見光明日月相交剛柔互興陰陽得理則相謀合參同契曰日月為易剛柔相合是也土旺金鄉三物俱喪者金木火三物被四時尾火包褁經九轉之後俱化為明窗塵參同契曰土旺四季羅絡始終是也四海輻輳以致太平者呼吸四方之氣輳歸神鼎之中引龍虎之精而為至藥以五土而終功以四季而結褁故得青赤白黑各得施其功以成就神丹也參同契曰青赤白黑各居一方是也並由中宫土德黃帝之功者中宫土德乃戌巳至和之氣金液變化之道皆稟戊己也戊己居中宫故稱黃帝修神丹者採日月之至精合陰陽之靈氣周星數滿水火運終盡歸功於土德黃帝之功也參同契曰中宫所稟黃帝之功是也疏日上古之人言不虛發訣不再傳事成之後書之于契以引將來好道之士況文字所傳只説大意今直指大藥之原者故令後人不用朱砂水銀之類若得玄妙法象隨天地陰陽四時運動而得成丹者即是真陰真陽也陰符經云天機張而不死得此道者不可妄傳非人參同契曰欲寫之竹帛恐泄天之符猶豫增歎息俯仰輟思慮是也鍊至藥不出水火水火既交則鼎內龍虎之氣便相和合而成金液故真鉛實金丹之父母靈汞之祖宗也化生萬類育養羣生皆稟此而成也既得真鉛定體而又知水火真方則大丹豈無可成之理乎金火者真鉛也章第十一金火者真鉛也丹砂著明莫大乎金火言窮微以任化陽動則陰消混沌終一九寶精更相持卦與藥合金有三百八十四銖銖據一斤為十六兩也金精一化二氣成丹青龍受符當斯之時神室鍊其精金火相運推雄陽翠玄水雌陰赭黃金陰陽混交接精液包元氣萬象憑虛生感化各有類衆丹之靈迹長生莫不由注曰金火者真鉛也者金火二字是日月之稱金為丹之本火為日之根皆於鉛中魏真人以金火為易以易為藥也參同契曰易者象也是也丹砂著明莫大乎金火者丹砂乃金液也金液大丹一法唯憑日月陰陽之精以成也金者鉛也月者水也砂者汞也日者火也外則水火升降內則鉛汞交結除此之外别無雜類可入也金砂變化全自日月精華而生參同契曰懸象著明莫大乎日月是也言窮微以善化陽動則陰消者古之人窮其微妙察其盛衰使陰陽之氣往來動靜循環晝夜周而復始參同契曰窮神以知化陽往則陰來是也混沌終一九寶精更相持者坎離龍虎之氣混沌於神室之中隨水火進退下手之初一宫坎位火數發生之微精氣相交未有變通至巳之巽位火數發生之極則龍生汞而虎生鉛鉛汞之精漸萌鼎內日月之氣輪轉於外水火之精卷舒於內參同契曰輻輳日輪轉出入更卷舒是也卦與藥合金有三百八十四銖銖據一斤為十六兩也者卦有三百八十四爻周天一歲之數總火候一周之用金有三百八十四銖金母一斤之數總大丹一斤之用其火候金母皆相符合也參同契曰卦有三百八十四爻爻據摘符是也金精一化二氣成丹青龍受符者太陰金虎之液太陽木龍之津化為真丹晦朔起符之初青龍大神當權震卦主之參同契曰晦至朔日震來受符是也當斯之時神室鍊其精金火相運推者正當青龍受符得火之時神室之內龍虎二氣相紐金火之精相合而化神丹也參同契曰當斯之際天地交其精日月相禪持是也雄陽翠玄水雌陰赭黃金者雄陽乾也天也老陽也日也砂也其精曰玄水又曰雌汞雌陰坤也地也老陰也月也鉛也則日化玄水而月化黃金也黃金即真鉛玄水即真汞也鉛汞合而為一乃成丹參同契曰雄陽播玄施雌陰化黃包是也陰陽混交接精液包元氣者陰陽龍虎之氣在混沌之中水火交感互相變化而生津液為丹根基也參同契曰混沌相交接權輿樹根基是也萬象憑虛生感化各有類者世間萬物皆憑元氣而生各逐其類而附其形也如在鼎中則木之氣化龍金之氣化虎火之氣化汞水之氣化鉛土之氣化和而五氣皆歸中宫長養鄞鄂以至凝神成真是各逐其類凝而成真也參同契曰經營養鄞鄂凝神以成軀是也衆丹之靈迹長生莫不由者金液大丹有二十四品唯此母是金液之大者乃白日沖天之上道一一明象天地日月星辰五行四時歸於神室之中變化金液長生之道莫不由也參同契曰衆夫蹈已出蠕動莫不由是也疏曰金火即鉛火也鉛火即水火也金火相交則丹砂生於真鉛之中古之人所祕者祕在火候而已火數如一斤母數亦一斤以母一斤之數析之為三百八十四銖以火一斤之數析之為三百八十四爻以應一年六十四卦之數故乾之策二百一十有六坤之策一百四十有四引而伸之觸類而長之萬有一千五百二十以應萬物之數合天地一周之用古今法象天地準則陰陽用水火之升降合金木之情性備剛柔之體成大丹之造化其乾坤爻策一一演大丹之數顯金木水火土之精微者天之符也所修至藥運動火候皆應天符之數也若將年月日時之數蹙於一日十二時中進退陽火陰符以煉金液神丹則造化之理立可待也於是玄潤光澤章第十二於是玄潤光澤元君始煉汞神室含洞虛玄生白金公巍巍建始初冠三五相守飛精以濡滋注曰於是玄潤光澤元君始煉汞神室含洞虛者黑鉛制為白金精光瑩徹方成神室神室之體中虛徑寸以生真汞也元君乃煉丹之主司抱朴子云元君亦自言我亦煉丹而得仙伏羲晝八卦仲尼演易象皆明此天地之數也參同契曰於是仲尼始蒙鴻乾坤昭洞虛是也玄生白金公巍巍建始初者玄生白金也故能收養日月之精華陽火未動俱隱於白金之內而不見其形迹水火既行則金華産於白金之中金華乃戊己之和氣也二物相見感化生丹可謂巍巍尊高者也稽考古初已有斯物包褁陰陽與萬物之形不相去離關雎建義水火相交則砂汞生神明出焉故為萬物之母為陰陽之始也參同契曰稽古當元皇關睢建始初是也冠三五相守飛精以濡滋者水一火二乃三也五土也若水火土相交則神精降於器中故古之聖人創立神室既濟鼎器交男女之體合龍虎之形初則形質未分一如混沌既經運火之後則夫婦之情相紐龍虎之精契合便應元年起首之初終成神藥也參同契曰冠婚氣相紐元年乃芽孳是也疏曰元君亦煉丹而得仙者上古之祖師也擬天地之數納日月之行以鼎器擬象乾坤中虛寸餘其火候法象如動即天氣降地氣應天地至精相交而生神液也巍巍尊高實為玄妙也古得道者恐後人不悟真理以采砂水銀諸雜藥物而造大藥不明真鉛之變化是以取象立言以曉學者若雜類為之是由入山捕魚龍入水求雉兔皆無可得之理虛勞力耳玄女演其序章第十三玄女演其序戊己貴天符天符道漸剝難以應玄圖注曰玄女演其序戊己貴天符者玄女乃天地之精神陰陽之靈氣神無所不通形無所不類知萬物之情曉衆變之狀為道教之主也戊己乃和氣大丹之根本天符運動則生戊己之精也參同契曰聖人不虛生仰觀顯天符是也天符道漸剝難以應玄圖者天符進子陽火日增至巳而陽極天符退午陰符日減至亥而陰極五行尅盡四時運終故道漸剝也參同契曰天符有進退屈伸以應時故易統天心是也疏曰玄女亦上古之神仙為衆真之長戊己土也天符火也火乃元氣也大則包含天地小則潛藏一毫萬萬靈類無不霑其元氣廣大包籠潛布生育刑尅金木運轉陰陽榮萬物衰萬物變化無方有莫大之妙用真人擬此神化營修至藥採日月至精合溫涼寒暑抽添水火依春夏秋冬隨順四時盛旺衰榮皆秉自然也若以金銀土石草木灰霜而造金液神丹安有如此變化哉古文龍虎經注疏卷上
